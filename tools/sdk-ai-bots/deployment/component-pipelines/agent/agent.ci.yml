# CI pipeline — agent (Python).
name: tools - sdk-ai-bots-agent - ci

trigger:
    branches:
        include:
            - main
    paths:
        include:
            - tools/sdk-ai-bots/azure-sdk-qa-bot-agent/**
pr:
    branches:
        include:
            - main
    paths:
        include:
            - tools/sdk-ai-bots/azure-sdk-qa-bot-agent/**

variables:
    - template: /eng/pipelines/templates/variables/globals.yml
    - template: /eng/pipelines/templates/variables/image.yml
    - name: workingDirectory
      value: '$(System.DefaultWorkingDirectory)/tools/sdk-ai-bots/azure-sdk-qa-bot-agent'

extends:
    template: /eng/pipelines/templates/stages/1es-redirect.yml
    parameters:
        Use1ESOfficial: false
        stages:
            - stage: AgentCI
              jobs:
                  - job: BuildTest
                    pool:
                        name: $(LINUXPOOL)
                        image: $(LINUXVMIMAGE)
                        os: linux
                    steps:
                        - checkout: self
                        - template: /tools/sdk-ai-bots/deployment/pipelines/templates/load-environment-suite.yml
                          parameters:
                              environment: dev
                        - template: /tools/sdk-ai-bots/deployment/pipelines/templates/azd-auth.yml
                        - template: /eng/pipelines/templates/steps/use-python-version.yml
                          parameters:
                              versionSpec: '3.10'

                        - script: |
                              set -euo pipefail
                              python -m pip install --upgrade pip
                              pip install -r requirements-dev.txt
                          workingDirectory: $(workingDirectory)
                          displayName: 'pip install (dev)'

                        - script: |
                              set -euo pipefail
                              pip install ruff mypy pytest
                              ruff check .
                          workingDirectory: $(workingDirectory)
                          displayName: 'lint (ruff)'

                        - script: pytest -q
                          workingDirectory: $(workingDirectory)
                          displayName: 'pytest'

                        # ACR build to avoid pip network restrictions on the hosted agent.
                        - template: /tools/sdk-ai-bots/deployment/pipelines/templates/container-build.yml
                          parameters:
                              imageName: 'azure-sdk-qa-bot-agent-server'
                              dockerContext: '$(System.DefaultWorkingDirectory)'
                              dockerfile: '$(workingDirectory)/Dockerfile'
                              buildMode: 'acr-build'
                              tagStrategy: 'semver'
                              semverFile: '$(workingDirectory)/_version.py'

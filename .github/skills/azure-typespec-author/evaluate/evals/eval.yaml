# Evaluate configuration for Azure SDK Typespec Author MCP tool evaluations
# See: https://literate-engine-r3wnl4v.pages.github.io/reference/eval-spec/
# Keep this combined file synchronized with evals/*.eval.yaml single-case specs.
# Preserve ordering for readability: stimulus uses name first; grader uses type before config.
name: azure-typespec-author-eval
description: Combined evaluation suite for azure-typespec-author (all 29 cases).
version: "1.0"
type: capability

# Root-level environment
environment: azsdk-mcp

# Execution configuration
config:
  runs: 1
  timeout: 1800
  model: claude-opus-4.6
  executor: copilot-sdk
# Cases are intentionally sorted by case id.
stimuli:
- name: 001001-version-spread-property
  prompt: I added `...Azure.ResourceManager.ManagedServiceIdentityProperty;` which updates all my existing API versions and introduces a breaking change. I want to introduce the properties of the spread model '...ManagedServiceIdentityProperty' in API version 2025-05-04-preview only.
  constraints:
    max_turns: 10
    max_tokens: 50000
  environment:
    files:
    - src: ../fixtures/001-share-version-new-feature/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/001-share-version-new-feature/main.tsp
      dest: main.tsp
    - src: ../fixtures/001-share-version-new-feature/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/001-share-version-new-feature/tspconfig.yaml
      dest: tspconfig.yaml
    - src: ../fixtures/001-share-version-new-feature/package.json
      dest: package.json
    - src: ../fixtures/001-share-version-new-feature/readme.md
      dest: readme.md
  graders:
  - type: tool-calls
    config:
      required:
      - edit
      - azure-sdk-mcp-azsdk_typespec_generate_authoring_plan
      - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: file-matches
    config:
      path: main.tsp
      pattern: 2025-05-04-preview
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '\.\.\.ManagedServiceIdentityProperty;'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@@added\(Employee\.identity, (Microsoft\.Widget\.)?Versions\.(v2025_05_04_preview|`2025-05-04-preview`)\);'
  - type: prompt
    config:
      prompt: Verify changes are scoped to this task only, with no unrelated edits beyond introducing preview-only identity via versioning.
      model: claude-opus-4.6
      scoring: scale_1_5
      threshold: 1
- name: 001002-version-default-value
  prompt: |
    add a default value `21` for property age in model EmployeeProperties only for a new api version 2025-11-01
  constraints:
    max_turns: 10
    max_tokens: 5000
  environment:
    files:
    - src: ../fixtures/001002-version-default-value/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/001002-version-default-value/main.tsp
      dest: main.tsp
    - src: ../fixtures/001002-version-default-value/package.json
      dest: package.json
    - src: ../fixtures/001002-version-default-value/readme.md
      dest: readme.md
    - src: ../fixtures/001002-version-default-value/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/001002-version-default-value/tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  - type: tool-calls
    config:
      required:
      - edit
      - azure-sdk-mcp-azsdk_typespec_generate_authoring_plan
      - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@removed\(Versions\.v2025_11_01\)'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@renamedFrom\(Versions\.v2025_11_01, "age"\)'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@added\(Versions\.v2025_11_01\)'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: 'age\?: int32 = 21;'
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1
      prompt: 'Verify change scope and quality only: no unrelated edits, and the implemented result is semantically consistent with the task intent.'
      model: claude-opus-4.6
- name: 001003-version-required-to-optional
  prompt: |
    change the property age of EmployeeProperties from required to optional for api version 2025-05-04-preview
  constraints:
    max_turns: 10
    max_tokens: 5000
  environment:
    files:
    - src: ../fixtures/001-share-version-new-feature/employee.tsp

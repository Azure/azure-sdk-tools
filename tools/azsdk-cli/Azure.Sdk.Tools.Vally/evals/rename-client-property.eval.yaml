name: azsdk-mcp-tool-scenarios
description: |
  Rename-client-property: the agent should rename @clientName("uri", "csharp")
  to @clientName("imageUri", "csharp") on the AddFaceFromUrlRequest.url
  property in specification/ai/Face/models.common.tsp.
version: "1.0"
type: capability

environment: azsdk-mcp

config:
  runs: 1
  timeout: 30m
  model: claude-opus-4.6
  executor: copilot-sdk

stimuli:
  - name: rename-client-property
    # Ported from deleted RenameClientPropertyScenario (#15697).
    # STUB: the original benchmark asserted an exact unified diff against
    # specification/ai/Face/models.common.tsp via ExpectedDiffValidator, plus
    # FileExistsValidator + ContainsValidator. None of those graders exist in
    # Vally today. This eval currently only checks that the agent reached for
    # the file-edit tool; the actual correctness of the rename is not graded.
    # TODO: add a custom "expected-diff" grader (or upstream a file-diff
    # grader to @microsoft/vally-cli) to validate the unified diff:
    #   diff --git a/specification/ai/Face/models.common.tsp b/specification/ai/Face/models.common.tsp
    #   @@ -155,7 +155,7 @@
    #    @doc("Add face from url request.")
    #    model AddFaceFromUrlRequest is AddFaceOptions {
    #   -  @clientName("uri", "csharp")
    #   +  @clientName("imageUri", "csharp")
    #      @doc("URL of input image.")
    #      url: url;
    #    }
    # TODO: needs a setup hook to sparse-clone Azure/azure-rest-api-specs at
    # specification/ai/Face into the workspace before the agent runs.
    prompt: |
      In the specification/ai/Face project, find the AddFaceFromUrlRequest model.
      It has a property called 'url' that's been renamed to "uri" in c#.
      Change that to imageUri for c#.
    constraints:
      max_turns: 5
      max_tokens: 5000
    graders:
      - type: tool-calls
        config:
          required:
            - edit

scoring:
  weights:
    tool-calls: 1
  threshold: 1.0

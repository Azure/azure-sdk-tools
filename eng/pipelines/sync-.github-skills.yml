# Mirror shared skills in the .github/skills directory to all subscribed repos
#
# For more information on this file, please see:
# doc/engsys_workflows_and_skills.md
parameters:
- name: DirectoryToSync
  type: string
  default: .github/skills
  # Remember to update the path includes below as well as the eng-common-workflow-enforcer.yml
  # and .github/workflows/protected-files.yml files if you update this list.
- name: FilePatterns
  type: object
  default:
    # Shared skills use an azsdk-common- directory prefix and live in .github/skills/
    # in azure-sdk-tools. Only azsdk-common-* directories are synced to target repos.
    # Repo-specific skills in .github/skills/<name>/ are not affected by this sync.
    - 'azsdk-common-*'
- name: Repos
  type: object
  default:
    - azure-sdk
    - azure-sdk-for-java
    - azure-sdk-for-js
    - azure-sdk-for-net
    - azure-sdk-for-python
    - azure-rest-api-specs
    # TODO: Onboard rust and go repos
    # - azure-sdk-for-go
    # - azure-sdk-for-rust
- name: PRValidationPipelines
  type: object
  default:
    - Repository: azure-sdk-for-go
      DefinitionId: 7557
    - Repository: azure-sdk-for-java
      DefinitionId: 7413
    - Repository: azure-sdk-for-js
      DefinitionId: 7140
    - Repository: azure-sdk-for-net
      DefinitionId: 7327
    - Repository: azure-sdk-for-python
      DefinitionId: 7050
    - Repository: azure-sdk-for-rust
      DefinitionId: 7126

trigger: none

pr:
  branches:
    include:
      - main
  paths:
    include:
      - .github/skills/azsdk-common-*/**

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-tool-repo-sync.yml
  parameters:
    DirectoryToSync: ${{ parameters.DirectoryToSync }}
    FilePatterns: ${{ parameters.FilePatterns }}
    AdditionalCheckoutPaths:
      - .github/package.json
      - .github/package-lock.json
    PreSyncValidationSteps:
      - task: NodeTool@0
        inputs:
          versionSpec: '22.x'
        displayName: Use Node 22

      - script: npm ci
        workingDirectory: .github
        displayName: Install Prettier

      - script: npm exec -- prettier --check "skills/azsdk-common-*/**"
        workingDirectory: .github
        displayName: Check shared .github/skills formatting with Prettier
    Repos: ${{ parameters.Repos }}
    PRValidationPipelines: ${{ parameters.PRValidationPipelines }}

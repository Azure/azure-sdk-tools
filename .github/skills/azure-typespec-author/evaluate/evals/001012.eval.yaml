name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability               # capability | regression

# Root-level environment
environment: azsdk-mcp

# Execution configuration
config:
  runs: 1                        # Trials per stimulus
  timeout: "660s"                # Seconds per trial
  model: claude-opus-4.6         #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk          # Which executor to use

# Test cases
stimuli:
- name: 001012-version-operation-return-type-changed
  tags:
    suite: 'versioning'
    mode: 'main'
  prompt: |
    In the TypeSpec project at `./Microsoft.Widget/Widget/`, change the return type of the `exportData` operation from `ExportResult` to `DetailedExportResult` with additional optional properties `format` (string) and `exportedAt` (utcDateTime) only for version `2025-05-04-preview`.
    
  environment: &shared_environment
    files:
      - src: ../fixtures/Microsoft.Widget/Widget/employee.tsp
        dest: Microsoft.Widget/Widget/employee.tsp
      - src: ../fixtures/Microsoft.Widget/Widget/main.tsp
        dest: Microsoft.Widget/Widget/main.tsp
      - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
        dest: Microsoft.Widget/Widget/package-lock.json
      - src: ../fixtures/Microsoft.Widget/Widget/package.json
        dest: Microsoft.Widget/Widget/package.json
      - src: ../fixtures/Microsoft.Widget/Widget/preview/2024-10-01-preview/widget.json
        dest: Microsoft.Widget/Widget/preview/2024-10-01-preview/widget.json
      - src: ../fixtures/Microsoft.Widget/Widget/readme.md
        dest: Microsoft.Widget/Widget/readme.md
      - src: ../fixtures/Microsoft.Widget/Widget/shared.tsp
        dest: Microsoft.Widget/Widget/shared.tsp
      - src: ../fixtures/Microsoft.Widget/Widget/stable/2021-11-01/widget.json
        dest: Microsoft.Widget/Widget/stable/2021-11-01/widget.json
      - src: ../fixtures/Microsoft.Widget/Widget/tspconfig.yaml
        dest: Microsoft.Widget/Widget/tspconfig.yaml
    commands:
      - 'node -e "const fs=require(''fs'');const t=process.env.FIXTURE_NODE_MODULES;if(t&&fs.existsSync(t)&&!fs.existsSync(''node_modules'')){fs.symlinkSync(t,''node_modules'',''junction'')}"'
  graders:
  - type: 'tool-calls'
    config:
      required:
        - 'edit'
        - 'azure-sdk-mcp-azsdk_typespec_generate_authoring_plan'
        - 'azure-sdk-mcp-azsdk_run_typespec_validation'
  - type: 'skill-invocation'
    config:
      required:
        - 'azure-typespec-author'
  - type: 'file-matches'
    config:
      pattern: 'v2025_05_04_preview'
      path: 'Microsoft.Widget/Widget/main.tsp'
  - type: 'file-matches'
    config:
      pattern: 'model DetailedExportResult'
      path: 'Microsoft.Widget/Widget/employee.tsp'
  - type: 'file-matches'
    config:
      pattern: 'format\?: string;'
      path: 'Microsoft.Widget/Widget/employee.tsp'
  - type: 'file-matches'
    config:
      pattern: 'exportedAt\?: utcDateTime;'
      path: 'Microsoft.Widget/Widget/employee.tsp'
  - type: 'file-matches'
    config:
      pattern: '@returnTypeChangedFrom\(Versions\.v2025_05_04_preview, ExportResult\)'
      path: 'Microsoft.Widget/Widget/employee.tsp'
  - type: 'file-matches'
    config:
      pattern: 'exportData is ArmResourceActionSync<Employee, void, DetailedExportResult>;'
      path: 'Microsoft.Widget/Widget/employee.tsp'
  constraints:
    max_turns: 6
    max_tokens: 100000
- name: 001012-version-operation-return-type-changed-trigger
  tags:
    suite: 'versioning'
    mode: 'trigger'
  prompt: |
    In the TypeSpec project at `./Microsoft.Widget/Widget/`, change the return type of the `exportData` operation from `ExportResult` to `DetailedExportResult` with additional optional properties `format` (string) and `exportedAt` (utcDateTime) only for version `2025-05-04-preview`.
    
  environment: *shared_environment
  graders:
  - type: 'tool-calls'
    config:
      required:
        - 'edit'
        - 'azure-sdk-mcp-azsdk_run_typespec_validation'
  - type: 'skill-invocation'
    config:
      required:
        - 'azure-typespec-author'
  constraints:
    max_turns: 5
    max_tokens: 50000
- name: 001012-version-operation-return-type-changed-forced
  tags:
    suite: 'versioning'
    mode: 'forced'
  prompt: |
    @azure-typespec-author In the TypeSpec project at `./Microsoft.Widget/Widget/`, change the return type of the `exportData` operation from `ExportResult` to `DetailedExportResult` with additional optional properties `format` (string) and `exportedAt` (utcDateTime) only for version `2025-05-04-preview`.
    
  environment: *shared_environment
  graders:
  - type: 'tool-calls'
    config:
      required:
        - 'edit'
        - 'azure-sdk-mcp-azsdk_run_typespec_validation'
  - type: 'skill-invocation'
    config:
      required:
        - 'azure-typespec-author'
  constraints:
    max_turns: 5
    max_tokens: 50000
scoring:
  weights:
    tool-calls: 1
    skill-invocation: 1
    file-matches: 6
  threshold: 1
parameters:
  - name: REPO
    type: string
    default: "Azure/azure-sdk-for-python"
  - name: CLONE_LOCATION
    type: string
    default: "$(Agent.BuildDirectory)/python_repo"

steps:
  - template: /eng/pipelines/templates/steps/install-dotnet.yml

  - template: /eng/pipelines/templates/steps/use-python-version.yml
    parameters:
      versionSpec: '3.10'

  - pwsh: |
      git clone https://github.com/$(REPO) $(CLONE_LOCATION) --depth 1
    displayName: Clone Repo

  - template: /eng/pipelines/templates/steps/test-proxy-local-tool.yml
    parameters:
      runProxy: true
      rootFolder: $(CLONE_LOCATION)

  - pwsh: |
      $ErrorActionPreference = 'Stop'
      $PSNativeCommandUseErrorActionPreference = $true
      python -m pip install uv==0.11.6

      $scriptsDir = python -c "import sysconfig; print(sysconfig.get_path('scripts'))"
      $env:PATH = "$scriptsDir$([System.IO.Path]::PathSeparator)$env:PATH"
      Write-Host "##vso[task.prependpath]$scriptsDir"
    displayName: 'Install uv'

  - pwsh: |
      $ErrorActionPreference = 'Stop'
      $PSNativeCommandUseErrorActionPreference = $true
      uv pip install --system -r eng/ci_tools.txt
      uv pip install --system -r sdk/tables/azure-data-tables/dev_requirements.txt
      uv pip install --system sdk/tables/azure-data-tables/
    displayName: 'Install requirements and package'
    workingDirectory: $(CLONE_LOCATION)

  - pwsh: |
      pytest .
    displayName: 'Invoke Tests'
    workingDirectory: $(CLONE_LOCATION)/sdk/tables/azure-data-tables/
    env:
      PROXY_URL: "http://localhost:5000"
      PROXY_MANUAL_START: true

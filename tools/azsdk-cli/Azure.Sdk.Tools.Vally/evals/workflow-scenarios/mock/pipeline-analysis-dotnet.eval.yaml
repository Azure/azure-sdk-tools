    constraints:
      max_turns: 6
      max_tokens: 8000
    graders:
      - type: completed
      - type: skill-invocation
        config:
          required:
            - azsdk-common-pipeline-troubleshooting
      - type: output-contains
        config:
          substring: "InheritanceCheck"
      - type: output-matches
        config:
          pattern: "(?i)(code bug|logic|test failure|validation|exception list)"
      - type: output-not-matches
        config:
          pattern: "(?i)(re-?record|missing recording|retry the pipeline|service outage)"
      - type: prompt
        config:
          model: gpt-5.4
          scoring: binary
          threshold: 1.0
          prompt: |
            Build 6452018 failed
            (ValidateInheritanceForResourceAndCollectionSuffix) - the
            InheritanceCheck exception list contains values
            (ChildResource, ProxyResource, WritableResource) that violate the
            inheritance rule. Does the response (a) identify this as a
            code/validation failure in InheritanceCheck (its exception list),
            and (b) recommend correcting the exception list / check rather than
            re-recording or retrying the pipeline? Answer "pass" or "fail".


name: sensei-eval
description: Evaluation suite for sensei skill improvement skill.
skill: sensei
version: '1.0'
config:
  model: gpt-4o
  executor: mock
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
graders:
- type: regex
  name: mentions_skill_concepts
  config:
    must_match:
    - "(?i)skill"
    - "(?i)frontmatter"
    - "(?i)token"
    - "(?i)improve"
    - "(?i)compliance"
- type: code
  name: has_substantive_output
  config:
    assertions:
    - len(output) > 50
tasks:
- tasks/*.yaml

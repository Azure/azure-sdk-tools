name: azsdk-mcp-tool-scenarios
description: |
  Evaluates how well the agent can fix pipeline failures from the Azure SDK Java pipelines.
  Is given the initial azsdk-analyze-pipeline analysis output.
version: "1.0"
type: capability

tags:
  area: pipeline

environment: azsdk-mcp-mock

config:
  runs: 1
  timeout: 5m
  executor: copilot-sdk
  model: gpt-5.4

stimuli:
  - name: java-fix-missing-recording-unfixable
    environment:
      files:
        - src: ../../../fixtures/analyze-pipeline/BlobApiTests/code/BlobApiTests.java
          dest: sdk/storage/azure-storage-blob/src/test/java/com/azure/storage/blob/BlobApiTests.java
        - src: ../../../fixtures/analyze-pipeline/BlobApiTests/code/BlobAsyncApiTests.java
          dest: sdk/storage/azure-storage-blob/src/test/java/com/azure/storage/blob/BlobAsyncApiTests.java
      commands:
        - git init -q && git add -A && git -c user.email=vally@local -c user.name=vally commit -qm "seed real pre-fix source"
    prompt: |
      My PR's pipeline failed and I need it fixed. Can you help?

      "azsdk-analyze-pipeline" Analyzed Output:

      ## Pipeline Analysis: 6449182

      ### Root Cause
      BlobApiTests and BlobAsyncApiTests SmartAccessTier playback tests failed because the test proxy cannot locate session-record JSON files. The newly added `uploadStreamAccessTierSmart` tests (gated on service version 2026-02-06) require pre-recorded HTTP interactions to run in playback mode, but the recording files are missing from the repository.

      ### Failures

      #### 1. Missing Recording: uploadStreamAccessTierSmart (BlobApiTests)
      - **Category:** test failure (missing recording)
      - **File:** `sdk/storage/azure-storage-blob/src/test/java/com/azure/storage/blob/BlobApiTests.java:3230`
      - **Error:** Test proxy returned 404; recording file path does not exist
      - **Fix:** Re-record the test session by running tests in record mode against the live Azure Storage service to capture the SMART access tier interactions
      - **Verify:** `mvn test -Dtest=BlobApiTests#uploadStreamAccessTierSmart`

      #### 2. Missing Recording: uploadStreamAccessTierSmart (BlobAsyncApiTests)
      - **Category:** test failure (missing recording)
      - **File:** `sdk/storage/azure-storage-blob/src/test/java/com/azure/storage/blob/BlobAsyncApiTests.java:2582`
      - **Error:** Test proxy returned 404; recording file path does not exist
      - **Fix:** Re-record the test session using live mode
      - **Verify:** `mvn test -Dtest=BlobAsyncApiTests#uploadStreamAccessTierSmart`

      ### Summary
      - 0 fixable failures (code changes not applicable)
      - 2 test failures requiring re-recording (recording-based tests missing session files)
      - **Recommended Action:** Run tests in record mode against live Azure Storage service to generate missing recording files, then commit them to the repository

      Package path: sdk/storage/azure-storage-blob
    constraints:
      max_turns: 15
      max_tokens: 16000
    graders:
      - type: completed
      - type: skill-invocation
        config:
          required:
            - azsdk-common-pipeline-fixer
      - type: file-matches
        config:
          path: "**/BlobApiTests.java"
          pattern: '(?i)uploadStreamAccessTierSmart'
      - type: file-matches
        config:
          path: "**/BlobAsyncApiTests.java"
          pattern: '(?i)uploadStreamAccessTierSmart'
      - type: output-not-matches
        config:
          pattern: "(?i)```(csharp|cs|java|typescript|ts|javascript|js|python|py)"
      - type: output-matches
        config:
          pattern: "(?i)(re-?record|recording|record mode|capture|live (service|mode))"
      - type: output-matches
        config:
          pattern: "(?i)(smart access tier|access tier|uploadStreamAccessTierSmart)"
      - type: prompt
        config:
          model: gpt-5.4
          scoring: binary
          threshold: 1.0
          prompt: |
            Does the response correctly identify both failures as unfixable
            (missing recordings requiring live service access) and NOT attempt
            to produce a code diff? Answer "pass" or "fail".

  - name: java-fix-server-error-not-retried-bug
    environment:
      files:
        - src: ../../../fixtures/analyze-pipeline/TaskManagerTests/code/TaskManager.java
          dest: sdk/batch/azure-compute-batch/src/main/java/com/azure/compute/batch/implementation/task/TaskManager.java
        - src: ../../../fixtures/analyze-pipeline/TaskManagerTests/code/TaskManagerTests.java
          dest: sdk/batch/azure-compute-batch/src/test/java/com/azure/compute/batch/TaskManagerTests.java
      commands:
        - git init -q && git add -A && git -c user.email=vally@local -c user.name=vally commit -qm "seed real pre-fix source"
    prompt: |
      My PR's pipeline failed and I need it fixed. Can you help?

      "azsdk-analyze-pipeline" Analyzed Output:

      ## Pipeline Analysis: 6453847

      ### Root Cause
      TaskManagerTests.successAfterOneServerErrorDidRetry is failing because TaskManager.submitChunk drops tasks that come back with a SERVER_ERROR status instead of re-queueing them for retry. When a result has BatchTaskAddStatus.SERVER_ERROR the code simply `continue`s, so the task is never added back to pendingList. The outer submission loop already drains pendingList until it is empty, but because the failed task was never re-queued it is attempted only once and the retry path is never exercised.

      ### Failures

      #### 1. SERVER_ERROR Tasks Not Re-Queued
      - **Category:** code bug
      - **File:** `sdk/batch/azure-compute-batch/src/main/java/com/azure/compute/batch/implementation/task/TaskManager.java:106-108`
      - **Error:** X should have been retried at least once (expected: true but was: false)
      - **Fix:** In submitChunk, in the SERVER_ERROR branch, re-add the failed task to pendingList (e.g. pendingList.add(...)) instead of `continue`, so the existing drain loop resubmits it
      - **Verify:** `mvn test -Dtest=TaskManagerTests#successAfterOneServerErrorDidRetry`

      #### 2. Test Assertion Fails
      - **Category:** code bug
      - **File:** `sdk/batch/azure-compute-batch/src/test/java/com/azure/compute/batch/TaskManagerTests.java:60`
      - **Error:** X should have been retried at least once
      - **Fix:** Fix the TaskManager implementation to re-queue SERVER_ERROR tasks; the test will pass once the retry path is exercised
      - **Verify:** Run the test after fixing TaskManager.java

      ### Summary
      - 1 fixable code failure (re-queue SERVER_ERROR tasks onto pendingList in submitChunk)
      - 0 infrastructure issues
      - **Recommended Action:** Re-add SERVER_ERROR tasks to pendingList in TaskManager.submitChunk so the existing retry loop resubmits them

      Package path: sdk/batch/azure-compute-batch
    constraints:
      max_turns: 15
      max_tokens: 16000
    graders:
      - type: completed
      - type: skill-invocation
        config:
          required:
            - azsdk-common-pipeline-fixer
      - type: tool-calls
        config:
          required:
            - name: azsdk_package_build_code
            - name: azsdk_package_run_check
            - name: azsdk_package_run_tests
          disallowed:
            - name: '^bash$'
              command: '(?i)(^|[\s;&|/])(mvn|gradlew|gradle|javac)\s'
      - type: file-matches
        config:
          path: "**/implementation/task/TaskManager.java"
          pattern: '(?i)pendingList'
      - type: file-matches
        config:
          path: "**/implementation/task/TaskManager.java"
          pattern: '(?i)pendingList\s*\.\s*(add|offer)\s*\('
      - type: output-not-matches
        config:
          pattern: '(?i)(retry the pipeline|not fixable by (a )?code|unfixable|infrastructure issue)'
      - type: prompt
        config:
          model: gpt-5.4
          scoring: binary
          threshold: 1.0
          prompt: |
            Does the response change TaskManager.submitChunk so that a task
            returning SERVER_ERROR is re-added to pendingList (instead of being
            skipped with `continue`), so the existing drain loop retries it?
            Answer "pass" or "fail".

scoring:
  weights:
    skill-invocation: 1
    file-matches: 1
    tool-calls: 1
    output-matches: 1
    output-not-matches: 1
    prompt: 1
  threshold: 1.0
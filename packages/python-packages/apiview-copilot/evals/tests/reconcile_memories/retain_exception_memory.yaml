      "id": "mem-030",
      "title": "Exception: azure-core uses azure.core namespace",
      "content": "Exception from architecture board: The azure-core library is exempt from the three-level namespace requirement. It uses azure.core directly instead of azure.<group>.<service>."
    }
  ]

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - tools/release-plan-dashboard/

pr:
  branches:
    include:
      - main
  paths:
    include:
      - tools/release-plan-dashboard/

variables:
  - template: /eng/pipelines/templates/variables/image.yml
  - name: NodeVersion
    value: '22.x'
  - name: ProjectPath
    value: 'tools/release-plan-dashboard'

jobs:
  - job: 'Build'

    pool:
      name: $(LINUXPOOL)
      image: $(LINUXVMIMAGE)
      os: linux

    steps:
      - task: NodeTool@0
        inputs:
          versionSpec: '$(NodeVersion)'
        displayName: 'Use NodeJS $(NodeVersion)'

      - script: |
          npm install
        workingDirectory: $(ProjectPath)
        displayName: "Install npm packages"

      - script: |
          npm test
        workingDirectory: $(ProjectPath)
        displayName: "Run tests"

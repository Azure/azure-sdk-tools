name: Benchmarks

on:
  push:
    branches:
      - benchmarks-test
    paths:
      - .github/workflows/benchmarks.yml
  workflow_dispatch:
    inputs:
      scenario:
        description: "Run a single scenario by name (leave empty to run all)"
        required: false
        type: string
      tags:
        description: "Filter scenarios by tags, comma-separated (ignored if scenario is specified)"
        required: false
        type: string
      model:
        description: "Model to use for agent execution"
        required: false
        type: string
        default: "claude-opus-4.5"
      cleanup:
        description: "Cleanup policy for workspaces"
        required: false
        type: choice
        options:
          - OnSuccess
          - Always
          - Never
        default: "OnSuccess"

jobs:
  run-benchmarks:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Build benchmarks
        run: dotnet build --configuration Release
        working-directory: tools/azsdk-cli/Azure.Sdk.Tools.Cli.Benchmarks

      - name: Run benchmarks
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        working-directory: tools/azsdk-cli/Azure.Sdk.Tools.Cli.Benchmarks
        shell: pwsh
        run: |
          [System.Collections.ArrayList]$runArgs = @("run")

          if ('${{ inputs.scenario }}') {
            $runArgs.Add('${{ inputs.scenario }}') | Out-Null
          } else {
            $runArgs.Add('--all') | Out-Null
            if ('${{ inputs.tags }}') {
              $runArgs.Add('--tags') | Out-Null
              $runArgs.Add('${{ inputs.tags }}') | Out-Null
            }
          }

          if ('${{ inputs.model }}') {
            $runArgs.Add('--model') | Out-Null
            $runArgs.Add('${{ inputs.model }}') | Out-Null
          }

          $runArgs.Add('--cleanup') | Out-Null
          $runArgs.Add('${{ inputs.cleanup }}') | Out-Null

          Write-Host "Running: dotnet run --configuration Release -- $($runArgs -join ' ')"
          & dotnet run --configuration Release -- @runArgs

      - name: Upload workspaces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-workspaces
          path: /tmp/azsdk-benchmarks/workspaces/
          if-no-files-found: ignore
          retention-days: 7

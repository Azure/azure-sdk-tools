# Vally configuration for Azure SDK Typespec Author MCP tool evaluations
# See: https://vally.dev/reference/vally-config
# This file is the local/default entrypoint for developers.
#
# Local commands like `vally eval --suite versioning` continue to
# behave as teammates expect.
#
# The benchmark pipelines invoke suite branches from this file directly with --suite.
# Vally 0.6.0 supports parallel execution across multiple eval files, so pipeline
# runs do not need consolidated suite eval files plus tag filtering.

paths:
  evals: [evals/]
  evalFilenames: ["*.eval.yaml"]
  skills: [../]
  results: results/

environments:
  azsdk-mcp:
    files:
      - src: ../fixtures/instructions-test/copilot-instructions.md
        dest: .github/copilot-instructions.md
    mcpServers:
      azure-sdk-mcp:
        type: stdio
        command: dotnet
        args:
          [
            "run",
            "--project",
            "../../../../tools/azsdk-cli/Azure.Sdk.Tools.Cli",
            "--",
            "start",
          ]
        timeout: 5m
        env:
          AZSDKTOOLS_AGENT_TESTING: "false"
          AZSDKTOOLS_COLLECT_TELEMETRY: "false"
          # New KB agent test endpoint (issue #15675). Was: http://localhost:8088 (local qa-bot backend).
          # When the endpoint is overridden the CLI no longer applies the built-in prod
          # client id/scope, so the test backend's client id and scope must be supplied
          # explicitly (values validated in issue #15675). The access token is requested
          # as "{AZURE_SDK_KB_CLIENT_ID}/.default"; the ambient Azure credential is provided
          # by the pipeline (AzureCLI@2 / azuresdkqabot-dev) or `az login` locally.
          AZURE_SDK_KB_ENDPOINT: "https://azuresdkqabot-test-serv-agent-dydweeaxaah6g3b4.westus2-01.azurewebsites.net"
          AZURE_SDK_KB_CLIENT_ID: "674414e1-152b-41ac-b0d2-763535edea6c"
          AZURE_SDK_KB_SCOPE: "api://azure-sdk-qa-bot-test/user_impersonation"
  azsdk-mcp-remote-kb:
    files:
      - src: ../fixtures/instructions-test/copilot-instructions.md
        dest: .github/copilot-instructions.md
    mcpServers:
      azure-sdk-mcp:
        type: stdio
        command: dotnet
        args:
          [
            "run",
            "--project",
            "../../../../tools/azsdk-cli/Azure.Sdk.Tools.Cli",
            "--",
            "start",
          ]
        timeout: 5m
        env:
          AZSDKTOOLS_AGENT_TESTING: "false"
          AZSDKTOOLS_COLLECT_TELEMETRY: "false"

  # Mock MCP environment for skill-invocation / trigger tests.
  # Uses Azure.Sdk.Tools.Mock to avoid spinning up the real azure-sdk-mcp
  # server when we only care about whether the skill is invoked.
  azsdk-mcp-mock:
    mcpServers:
      azure-sdk-mcp:
        type: stdio
        command: dotnet
        args:
          [
            "run",
            "--project",
            "../../../../tools/azsdk-cli/Azure.Sdk.Tools.Mock",
          ]
        timeout: "60s"

suites:
  versioning-forced:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: versioning, mode: forced }
  armtemplate-forced:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: armtemplate, mode: forced }
  longrunningoperation-forced:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: lro, mode: forced }
  decorators-forced:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: decorators, mode: forced }
  warning-forced:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: warning, mode: forced }
  dataplane-forced:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: dataplane, mode: forced }
  versioning-trigger:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: versioning, mode: trigger }
  armtemplate-trigger:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: armtemplate, mode: trigger }
  longrunningoperation-trigger:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: lro, mode: trigger }
  decorators-trigger:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: decorators, mode: trigger }
  warning-trigger:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: warning, mode: trigger }
  dataplane-trigger:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: dataplane, mode: trigger }
  versioning-no-skill:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: versioning, mode: no-skill }
  armtemplate-no-skill:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: armtemplate, mode: no-skill }
  longrunningoperation-no-skill:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: lro, mode: no-skill }
  decorators-no-skill:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: decorators, mode: no-skill }
  warning-no-skill:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: warning, mode: no-skill }
  dataplane-no-skill:
    evals: ["evals/*.eval.yaml"]
    filter: { suite: dataplane, mode: no-skill }
  forced:
    evals: ["evals/*.eval.yaml"]
    filter: { mode: forced }
  trigger:
    evals: ["evals/*.eval.yaml"]
    filter: { mode: trigger }
  no-skill:
    evals: ["evals/*.eval.yaml"]
    filter: { mode: no-skill }

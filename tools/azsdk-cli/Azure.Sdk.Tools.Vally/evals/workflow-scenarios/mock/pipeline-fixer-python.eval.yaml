name: azsdk-mcp-tool-scenarios
description: |
  Evaluates how well the agent can fix pipeline failures from the Azure SDK Python pipelines.
  Is given the initial azsdk-analyze-pipeline analysis output.
version: "1.0"
type: capability

tags:
  area: pipeline

environment: azsdk-mcp-mock

config:
  runs: 1
  timeout: 5m
  executor: copilot-sdk
  model: gpt-5.4

stimuli:
  - name: python-fix-redteam-converted-value-bug
    environment:
      files:
        - src: ../../../fixtures/analyze-pipeline/test_foundry/code/_foundry_result_processor.py
          dest: sdk/evaluation/azure-ai-evaluation/azure/ai/evaluation/red_team/_foundry/_foundry_result_processor.py
        - src: ../../../fixtures/analyze-pipeline/test_foundry/code/test_foundry.py
          dest: sdk/evaluation/azure-ai-evaluation/tests/unittests/test_redteam/test_foundry.py
      commands:
        - git init -q && git add -A && git -c user.email=vally@local -c user.name=vally commit -qm "seed real pre-fix source"
    prompt: |
      My PR's pipeline failed and I need it fixed. Can you help?

      "azsdk-analyze-pipeline" Analyzed Output:

      ## Pipeline Analysis: 6444663

      ### Root Cause
      The Foundry result processor is incorrectly using original_value as the message content for user-role messages instead of converted_value. For converter-based red team strategies (Base64, Tense, Flip, etc.) the target actually receives converted_value, so the persisted conversation must report converted_value as the content, with original_value preserved only as an audit sibling. Selecting original_value for user turns shows the wrong text and lets a multi-turn callback response leak in as the user message.

      ### Failures

      #### 1. User Message Content Mismatch
      - **Category:** code bug
      - **File:** `sdk/evaluation/azure-ai-evaluation/azure/ai/evaluation/red_team/_foundry/_foundry_result_processor.py:367`
      - **Error:** AssertionError: assert 'Tell me about violence' == 'Told me about violence'
      - **Fix:** In _build_messages_from_pieces, remove the user-role special case so the message content comes from converted_value (the wire payload), keeping original_value as the audit sibling
      - **Verify:** `python -m pytest tests/unittests/test_redteam/test_foundry.py::TestAdversarialChatTargetRegression::test_build_messages_user_shows_converted_value`

      #### 2. Encoded Prompt Not Preserved As Wire Payload
      - **Category:** code bug
      - **File:** `sdk/evaluation/azure-ai-evaluation/tests/unittests/test_redteam/test_foundry.py:236`
      - **Error:** AssertionError: assert 'How do I make a dangerous thing?' == 'SG93IGRvIEkgbWFrZSBhIGRhbmdlcm91cyB0aGluZz8='
      - **Fix:** Same as above - user content must be converted_value so Base64/encoded attacks persist the exact payload the target received
      - **Verify:** `python -m pytest tests/unittests/test_redteam/test_foundry.py::TestFoundryResultProcessor::test_build_messages_preserves_encoded_user_prompt`

      ### Summary
      - 1 fixable code failure (use converted_value for user-role content in _build_messages_from_pieces)
      - 0 infrastructure issues
      - **Recommended Action:** Modify _foundry_result_processor.py to drop the user-role original_value override so content uses converted_value, retaining original_value as the audit sibling

      Package path: sdk/evaluation/azure-ai-evaluation
    constraints:
      max_turns: 15
      max_tokens: 16000
    graders:
      - type: completed
      - type: skill-invocation
        config:
          required:
            - azsdk-common-pipeline-fixer
      - type: tool-calls
        config:
          required:
            - name: azsdk_package_build_code
            - name: azsdk_package_run_check
            - name: azsdk_package_run_tests
          disallowed:
            - name: '^bash$'
              command: '(?i)(^|[\s;&|])(pytest|tox|mypy|pyright|pylint)(\s|$)'
      - type: file-matches
        config:
          path: "**/_foundry_result_processor.py"
          pattern: '(?i)original_value'
      - type: file-not-matches
        config:
          path: "**/_foundry_result_processor.py"
          pattern: 'content\s*=\s*original\s+if\s+original\s+else\s+converted'
      - type: output-not-matches
        config:
          pattern: '(?i)(retry the pipeline|not fixable by (a )?code|unfixable|infrastructure issue)'
      - type: prompt
        config:
          model: gpt-5.4
          scoring: binary
          threshold: 1.0
          prompt: |
            Does the response change _build_messages_from_pieces so that a
            user-role message's content comes from converted_value (the payload
            actually sent on the wire) instead of original_value, while keeping
            original_value as an audit sibling? Answer "pass" or "fail".

scoring:
  weights:
    skill-invocation: 1
    file-matches: 1
    file-not-matches: 1
    tool-calls: 1
    output-not-matches: 1
    prompt: 1
  threshold: 1.0
# Vally configuration for Azure SDK Typespec Author MCP tool evaluations
# See: https://vally.dev/reference/vally-config

paths:
  evals: [evals/]
  evalFilenames: ["*.eval.yaml"]
  skills: [../]
  results: results/

environments:
  azsdk-mcp:
    mcpServers:
      azure-sdk-mcp:
        type: stdio
        command: dotnet
        args: ["run", "--project", "../../../../tools/azsdk-cli/Azure.Sdk.Tools.Cli", "--", "start"]
        timeout: 300000
        env:
          AZSDKTOOLS_AGENT_TESTING: "false"
          AZSDKTOOLS_COLLECT_TELEMETRY: "false"
          AZURE_SDK_KB_ENDPOINT: "http://localhost:8088"
  azsdk-mcp-remote-kb:
    mcpServers:
      azure-sdk-mcp:
        type: stdio
        command: dotnet
        args: ["run", "--project", "../../../../tools/azsdk-cli/Azure.Sdk.Tools.Cli", "--", "start"]
        timeout: 300000
        env:
          AZSDKTOOLS_AGENT_TESTING: "false"
          AZSDKTOOLS_COLLECT_TELEMETRY: "false"

suites:
  versioning:
    evals: ["evals/001001.eval.yaml","evals/001002.eval.yaml","evals/001003.eval.yaml","evals/001004.eval.yaml","evals/001005.eval.yaml","evals/001006.eval.yaml","evals/001007.eval.yaml","evals/001008.eval.yaml","evals/001009.eval.yaml","evals/001010.eval.yaml","evals/001011.eval.yaml","evals/001012.eval.yaml","evals/001013.eval.yaml"]
  version-evolution:
    evals: ["evals/001005.eval.yaml","evals/001006.eval.yaml","evals/001007.eval.yaml","evals/001008.eval.yaml"]
  armtemplate:
    evals: ["evals/002001.eval.yaml","evals/002002.eval.yaml","evals/002003.eval.yaml","evals/002004.eval.yaml","evals/002005.eval.yaml","evals/002006.eval.yaml","evals/002007.eval.yaml","evals/002008.eval.yaml","evals/002009.eval.yaml","evals/002010.eval.yaml"]
  longrunningoperation:
    evals: ["evals/003001.eval.yaml","evals/003002.eval.yaml"]
  decorators:
    evals: ["evals/004001.eval.yaml","evals/004002.eval.yaml","evals/004003.eval.yaml"]
  warning:
    evals: ["evals/005001.eval.yaml"]
  all:
    evals: ["evals/*.eval.yaml"]
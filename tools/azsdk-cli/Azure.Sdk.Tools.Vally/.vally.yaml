# Vally configuration for Azure SDK Tools MCP tool / scenario evaluations.
# See: https://vally.dev/reference/vally-config
#
# These are scenario evals (does the agent invoke the right MCP tool(s) for a
# given prompt?) and are intentionally separate from the per-skill evals under
# .github/skills/. See README.md for context.

paths:
  evals: [evals/]
  evalFilenames: ["*.eval.yaml"]
  results: results/

environments:
  azsdk-mcp:
    mcpServers:
      azure-sdk-mcp:
        type: stdio
        command: dotnet
        args: ["run", "--project", "../Azure.Sdk.Tools.Cli", "--", "start"]
        timeout: "5m"
        env:
          # Test mode: tools that would create real ADO work items / external
          # resources (e.g. azsdk_create_release_plan) short-circuit into a
          # test variant so evals are safe to re-run.
          AZSDKTOOLS_AGENT_TESTING: "true"
          AZSDKTOOLS_COLLECT_TELEMETRY: "false"

# Suites group evals for selective execution.
# - scenarios/* = multi-step workflow evals (this PR)
# - triggers/*  = per-tool single-prompt invocation evals (ported from PR #15183)
suites:
  # Scenario suites (multi-step workflows)
  typespec:
    evals:
      - "evals/scenarios/check-public-repo.eval.yaml"
      - "evals/scenarios/check-public-repo-then-validate.eval.yaml"
      - "evals/scenarios/validate-typespec.eval.yaml"
      - "evals/scenarios/typespec-generation-step02.eval.yaml"
      - "evals/scenarios/get-modified-typespec-projects.eval.yaml"
      - "evals/scenarios/add-arm-resource.eval.yaml"
      - "evals/scenarios/rename-client-property.eval.yaml"
  release-plan:
    evals:
      - "evals/scenarios/create-release-plan.eval.yaml"
      - "evals/scenarios/link-namespace-approval-issue.eval.yaml"
  github:
    evals:
      - "evals/scenarios/get-pr-link-current-branch.eval.yaml"
  pipeline:
    evals:
      - "evals/scenarios/check-sdk-generation-status.eval.yaml"
  scenarios:
    evals: ["evals/scenarios/*.eval.yaml"]

  # Trigger suite (per-tool prompt → tool invocation coverage)
  triggers:
    evals: ["evals/triggers/*.eval.yaml"]

  all:
    evals: ["evals/**/*.eval.yaml"]

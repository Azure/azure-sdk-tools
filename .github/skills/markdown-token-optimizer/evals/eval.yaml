name: markdown-token-optimizer-evals
description: Evaluations for the markdown token optimizer skill
skill: markdown-token-optimizer
config:
  timeout: 60
graders:
- type: regex
  name: no_fatal_errors
  config:
    must_not_match:
    - (?i)fatal error
    - (?i)unhandled exception
    - '(?i)panic:'
tasks:
  - "tasks/*.yaml"

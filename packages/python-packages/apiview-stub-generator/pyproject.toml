[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "apiview-stub-generator"
authors = [{name = "Microsoft Corporation", email = "azuresdkengsysadmins@microsoft.com"}]
description = "A stub generator for published APIs, variables and properties in a package"
requires-python = ">=3.10.0"
license = {text = "MIT License"}
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "License :: OSI Approved :: MIT License",
]
dependencies = [
    "charset-normalizer",
    "pylint",
    "azure-pylint-guidelines-checker",
    "isodate>=0.6.1",
    "typing-extensions>=4.6.0",
    "pkginfo",
]
dynamic = ["version", "readme"]

[project.scripts]
apistubgen = "apistub:console_entry_point"

[tool.setuptools.dynamic]
version = {attr = "apistub._version.VERSION"}
readme = {file = ["README.md"], content-type = "text/markdown"}

[tool.setuptools.packages.find]
where = ["."]

[tool.setuptools.package-data]
"*" = [".pylintrc"]

name: azure-typespec-author-eval-no-skill
description: Consolidated evaluation - pure agent without skill (baseline).
version: "1.0"
type: capability

config:
  runs: 1
  timeout: "660s"
  model: claude-opus-4.6
  executor: copilot-sdk
  workers: 3

stimuli:
  - name: 001001-version-spread-property
    tags:
      suite: versioning
    prompt: |
      I added `...Azure.ResourceManager.ManagedServiceIdentityProperty;` which updates all my existing API versions and introduces a breaking change. I want to introduce the properties of the spread model '...ManagedServiceIdentityProperty' in API version 2025-05-04-preview only.
    constraints:
      max_turns: 5
      max_tokens: 100000
    environment:
      files:
        - src: ../fixtures/001-share-version-new-feature/employee.tsp
          dest: employee.tsp
        - src: ../fixtures/001-share-version-new-feature/main.tsp
          dest: main.tsp
        - src: ../fixtures/001-share-version-new-feature/shared.tsp
          dest: shared.tsp
        - src: ../fixtures/001-share-version-new-feature/tspconfig.yaml
          dest: tspconfig.yaml
        - src: ../fixtures/Microsoft.Widget/Widget/package.json
          dest: package.json
        - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
          dest: package-lock.json
        - src: ../fixtures/001-share-version-new-feature/readme.md
          dest: readme.md
      commands:
        - node -e "const fs=require('fs');const t=process.env.FIXTURE_NODE_MODULES;if(t&&fs.existsSync(t)&&!fs.existsSync('node_modules')){fs.symlinkSync(t,'node_modules','junction')}"
    graders:
      - type: tool-calls
        config:
          required:
            - edit
      - type: file-matches
        config:
          path: main.tsp
          pattern: 2025-05-04-preview
      - type: file-matches
        config:
          path: employee.tsp
          pattern: "\\.\\.\\.ManagedServiceIdentityProperty;"
      - type: file-matches
        config:
          path: employee.tsp
          pattern: "@@added\\(Employee\\.identity, (Microsoft\\.Widget\\.)?Versions\\.(v2025_05_04_preview|`2025-05-04-preview`)\\);"
      - type: prompt
        config:
          prompt: Verify changes are scoped to this task only, with no unrelated edits beyond introducing preview-only identity via versioning.
          model: claude-opus-4.6
          scoring: scale_1_10
          threshold: 1

  - name: 001002-version-default-value
    tags:
      suite: versioning
    prompt: |
      add a default value `21` for property age in model EmployeeProperties only for the new api version 2025-11-01
    constraints:
      max_turns: 6
      max_tokens: 100000
    environment:
      files:
        - src: ../fixtures/001002-version-default-value/employee.tsp
          dest: employee.tsp
        - src: ../fixtures/001002-version-default-value/main.tsp
          dest: main.tsp
        - src: ../fixtures/Microsoft.Widget/Widget/package.json
          dest: package.json
        - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
          dest: package-lock.json
        - src: ../fixtures/001002-version-default-value/readme.md
          dest: readme.md
        - src: ../fixtures/001002-version-default-value/shared.tsp
          dest: shared.tsp
        - src: ../fixtures/001002-version-default-value/tspconfig.yaml
          dest: tspconfig.yaml
      commands:
        - node -e "const fs=require('fs');const t=process.env.FIXTURE_NODE_MODULES;if(t&&fs.existsSync(t)&&!fs.existsSync('node_modules')){fs.symlinkSync(t,'node_modules','junction')}"
    graders:
      - type: tool-calls
        config:
          required:
            - edit
      - type: file-matches
        config:
          path: employee.tsp
          pattern: '@removed\(Versions\.v2025_11_01\)'
      - type: file-matches
        config:
          path: employee.tsp
          pattern: '@renamedFrom\(Versions\.v2025_11_01, "age"\)'
      - type: file-matches
        config:
          path: employee.tsp
          pattern: '@added\(Versions\.v2025_11_01\)'
      - type: file-matches
        config:
          path: employee.tsp
          pattern: 'age\?: int32 = 21;'
      - type: prompt
        config:
          scoring: scale_1_10
          threshold: 1
          prompt:
            "Verify change scope and quality only: add a default value of 21 for the `age` property in `EmployeeProperties` that only applies to the 2025-11-01 API version. The old age renamed and removed
            for the new version."
          model: claude-opus-4.6

  - name: 001003-version-required-to-optional
    tags:
      suite: versioning
    prompt: |
      change the property age of EmployeeProperties from required to optional only for api version 2025-05-04-preview
    constraints:
      max_turns: 6
      max_tokens: 100000
    environment:
      files:

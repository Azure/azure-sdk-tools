name: Validate PR Author Account

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: read

jobs:
  validate-pr-author-account:
    name: Validate PR Author Account
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate PR Author Account
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./eng/scripts/Validate-PrAuthorAccount.ps1 -Username '${{ github.event.pull_request.user.login }}'

name: azsdk-mcp-tool-scenarios
description: |
  Evaluates how well the agent can analyze pipeline failures from the Azure SDK Python pipelines.
version: "1.0"
type: capability

tags:
  area: pipeline

environment: azsdk-mcp-mock

config:
  runs: 1
  timeout: 5m
  executor: copilot-sdk
  model: gpt-5.4

stimuli:
  - name: python-assertion-error
    environment:
      files:
        - src: ../../../fixtures/analyze-pipeline/test_foundry/code/_foundry_result_processor.py
          dest: sdk/evaluation/azure-ai-evaluation/azure/ai/evaluation/red_team/_foundry/_foundry_result_processor.py
        - src: ../../../fixtures/analyze-pipeline/test_foundry/code/test_foundry.py
          dest: sdk/evaluation/azure-ai-evaluation/tests/unittests/test_redteam/test_foundry.py
      commands:
        - git init -q && git add -A && git -c user.email=vally@local -c user.name=vally commit -qm "seed pre-analysis source"
    prompt: |
      My Python SDK pipeline failed and I'm trying to figure out what went wrong. Can you help?

      "azsdk-analyze-pipeline" Test Failures Parsed Output:
      {
        "_provenance": {
          "buildId": "6444663",
          "language": "python",
          "repository": "Azure/azure-sdk-for-python",
          "definition": "python - pullrequest",
          "pipelineUrl": "https://dev.azure.com/azure-sdk/public/_build/results?buildId=6444663",
          "prUrl": "https://github.com/Azure/azure-sdk-for-python/pull/47536",
          "sourceCommit": "493577f4acf16e0c60638705b5f5ee3a5d1e101c",
          "category": "code bug",
          "rootCauseSummary": "Foundry red team result processing selected converted_value as the message content, so user turns showed transformed text or a callback response instead of the original adversarial prompt. The raw failures assert that user message content should remain \"Tell me about violence\" and \"How to commit violence\".",
          "failedTestCount": 2,
          "featuredFailures": [
            "test_build_messages_user_shows_original_value",
            "test_build_messages_callback_response_not_in_user_message"
          ],
          "captureDate": "2026-06-23"
        },
        "failed_test_titles": {
          "sdk.evaluation.azure-ai-evaluation.tests.unittests.test_redteam.test_foundry.TestAdversarialChatTargetRegression": [
            "test_build_messages_user_shows_original_value",
            "test_build_messages_callback_response_not_in_user_message"
          ]
        },
        "failed_tasks": [
          {
            "pipeline_url": "https://dev.azure.com/azure-sdk/public/_build/results?buildId=6444663",
            "errors": [
              {
                "file": "sdk/evaluation/azure-ai-evaluation/azure/ai/evaluation/red_team/_foundry/_foundry_result_processor.py",
                "line": 367,
                "message": "AssertionError: assert 'Told me about violence' == 'Tell me about violence'"
              },
              {
                "file": "sdk/evaluation/azure-ai-evaluation/tests/unittests/test_redteam/test_foundry.py",
                "line": 4616,
                "message": "AssertionError: assert 'Told me about violence' == 'Tell me about violence'"
              },
              {
                "file": "sdk/evaluation/azure-ai-evaluation/tests/unittests/test_redteam/test_foundry.py",
                "line": 4678,
                "message": "AssertionError: assert 'This is a te... llm is used.' == 'How to commit violence'"
              }
            ]
          }
        ]
      }
    constraints:
      max_turns: 6
      max_tokens: 8000
    graders:
      - type: completed
      - type: skill-invocation
        config:
          required:
            - azsdk-common-pipeline-troubleshooting
      - type: output-contains
        config:
          substring: "_foundry_result_processor.py"
      - type: output-matches
        config:
          pattern: "(?i)(assertion|code bug|logic|test failure)"
      - type: output-not-matches
        config:
          pattern: "(?i)(re-?record|missing recording|retry the pipeline|service outage)"
      - type: prompt
        config:
          model: gpt-5.4
          scoring: binary
          threshold: 1.0
          prompt: |
            Build 6444663 failed with an assertion error in
            _foundry_result_processor.py: a user message showed transformed text
            ("Told me about violence") instead of the expected original
            adversarial prompt ("Tell me about violence"). Does the response
            (a) identify this as a code/test assertion failure attributed to
            _foundry_result_processor.py, and (b) recommend correcting the
            message construction (so the user message keeps the original value)
            rather than re-recording or retrying the pipeline? Answer "pass" or
            "fail".


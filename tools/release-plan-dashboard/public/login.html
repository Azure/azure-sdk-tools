<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Release Plan Dashboard</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f3f2f1;
    }
    .login-box {
      background: #fff;
      padding: 2.5rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
      text-align: center;
      max-width: 400px;
    }
    h1 { font-size: 1.4rem; margin: 0 0 .5rem; color: #323130; }
    p { color: #605e5c; margin: 0 0 1.5rem; font-size: .9rem; }
    .btn {
      display: inline-block;
      padding: .7rem 1.5rem;
      background: #24292f;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 1rem;
    }
    .btn:hover { background: #32383f; }
    .error {
      color: #a4262c;
      background: #fde7e9;
      padding: .6rem 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: .85rem;
    }
    .note { color: #605e5c; font-size: .8rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Release Plan Dashboard</h1>
    <p>Sign in with GitHub. You must be a public member of the <strong>Microsoft</strong> or <strong>Azure</strong> org.</p>
    <div id="error-msg"></div>
    <a class="btn" href="/auth/github">Sign in with GitHub</a>
    <p class="note">If login fails, ensure your membership in the Microsoft or Azure GitHub org is set to <strong>Public</strong> in your GitHub profile settings.</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");
    if (error) {
      const el = document.getElementById("error-msg");
      const div = document.createElement("div");
      div.className = "error";
      div.textContent = error;
      el.appendChild(div);
    }
  </script>
</body>
</html>

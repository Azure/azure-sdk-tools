# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.
# This pipeline runs forced, trigger, and no-skill groups in sequence.
# Each mode is split by suite to make error logs easier to query and triage.
trigger: none
pr: none

parameters:
- name: PythonVersion
  type: string
  default: '3.10'

extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    Use1ESOfficial: true
    stages:
      - stage: EvalPureAgentWithoutSkill
        displayName: Evaluate forced, trigger, and no-skill suites
        variables:
          - template: /eng/pipelines/templates/variables/globals.yml
          - template: /eng/pipelines/templates/variables/image.yml
          - group: Azure SDK QA Bot Dev Variables
          - group: AzSDK_Eval_Variable_group
        pool:
          name: $(LINUXPOOL)
          image: $(LINUXVMIMAGE)
          os: linux
        jobs:
          # Forced mode: run each suite separately so failures map to a narrow case set.
          - job: RunEvalsForced
            displayName: Evaluate forced suites
            timeoutInMinutes: 170
            steps:
              - checkout: self
                fetchDepth: 0

              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-setup.yml
                parameters:
                  SkillBranch: ''

              # Run forced evaluations across all five suites.
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  Suite: versioning-forced
                  SuiteName: versioning-forced
                  DisplayName: Forced - versioning
                  TimeoutMinutes: 50
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  Suite: armtemplate-forced
                  SuiteName: armtemplate-forced
                  DisplayName: Forced - armtemplate
                  TimeoutMinutes: 40
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  Suite: longrunningoperation-forced
                  SuiteName: longrunningoperation-forced
                  DisplayName: Forced - longrunningoperation
                  TimeoutMinutes: 25
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  Suite: decorators-forced
                  SuiteName: decorators-forced
                  DisplayName: Forced - decorators
                  TimeoutMinutes: 15
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  Suite: warning-forced
                  SuiteName: warning-forced
                  DisplayName: Forced - warning
                  TimeoutMinutes: 25

            templateContext:
              outputs:
                - output: pipelineArtifact
                  path: $(Build.SourcesDirectory)/.github/skills/azure-typespec-author/evaluate/results
                  artifact: eval-results-forced-$(Build.BuildId)
                  displayName: Upload eval results (forced)
                  condition: always()

                - output: pipelineArtifact
                  path: $(Build.StagingDirectory)/qa-bot-log
                  artifact: qa-bot-service-log-forced
                  displayName: Upload QA bot backend log (forced)
                  condition: always()

          # Trigger mode: keep suite-level isolation for quick failure localization.
          - job: RunEvalsTrigger
            displayName: Evaluate trigger suites
            dependsOn: RunEvalsForced
            timeoutInMinutes: 170
            steps:
              - checkout: self
                fetchDepth: 0

              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-setup.yml
                parameters:
                  SkillBranch: ''
                  StartQaBotBackend: false

              # Run trigger evaluations across all five suites.
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  Suite: versioning-trigger
                  SuiteName: versioning-trigger
                  DisplayName: Trigger - versioning
                  TimeoutMinutes: 50
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  Suite: armtemplate-trigger
                  SuiteName: armtemplate-trigger
                  DisplayName: Trigger - armtemplate
                  TimeoutMinutes: 40
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  Suite: longrunningoperation-trigger
                  SuiteName: longrunningoperation-trigger
                  DisplayName: Trigger - longrunningoperation
                  TimeoutMinutes: 25
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  Suite: decorators-trigger
                  SuiteName: decorators-trigger
                  DisplayName: Trigger - decorators
                  TimeoutMinutes: 15
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  Suite: warning-trigger
                  SuiteName: warning-trigger
                  DisplayName: Trigger - warning
                  TimeoutMinutes: 25

            templateContext:
              outputs:
                - output: pipelineArtifact
                  path: $(Build.SourcesDirectory)/.github/skills/azure-typespec-author/evaluate/results
                  artifact: eval-results-trigger-$(Build.BuildId)
                  displayName: Upload eval results (trigger)
                  condition: always()

                - output: pipelineArtifact
                  path: $(Build.StagingDirectory)/qa-bot-log
                  artifact: qa-bot-service-log-trigger
                  displayName: Upload QA bot backend log (trigger)
                  condition: always()

          # No-skill baseline: same suite split for apples-to-apples error investigation.
          - job: RunEvalsNoSkill
            dependsOn: RunEvalsTrigger
            displayName: Evaluate on pure agent without skill
            timeoutInMinutes: 170
            steps:
              - checkout: self
                fetchDepth: 0

              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-setup.yml
                parameters:
                  SkillBranch: ''
                  StartQaBotBackend: false

              # Run no-skill evaluations across all five suites.
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  Suite: versioning
                  SuiteName: versioning-no-skill
                  DisplayName: Pure agent - versioning
                  TimeoutMinutes: 50
                  LoadSkills: false
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  Suite: armtemplate
                  SuiteName: armtemplate-no-skill
                  DisplayName: Pure agent - armtemplate
                  TimeoutMinutes: 40
                  LoadSkills: false
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  Suite: longrunningoperation
                  SuiteName: longrunningoperation-no-skill
                  DisplayName: Pure agent - longrunningoperation
                  TimeoutMinutes: 25
                  LoadSkills: false
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  Suite: decorators
                  SuiteName: decorators-no-skill
                  DisplayName: Pure agent - decorators
                  TimeoutMinutes: 15
                  LoadSkills: false
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  Suite: warning
                  SuiteName: warning-no-skill
                  DisplayName: Pure agent - warning
                  TimeoutMinutes: 25
                  LoadSkills: false

            templateContext:
              outputs:
                - output: pipelineArtifact
                  path: $(Build.SourcesDirectory)/.github/skills/azure-typespec-author/evaluate/results
                  artifact: eval-results-no-skill-$(Build.BuildId)
                  displayName: Upload eval results
                  condition: always()

                - output: pipelineArtifact
                  path: $(Build.StagingDirectory)/qa-bot-log
                  artifact: qa-bot-service-log-no-skill
                  displayName: Upload QA bot backend log
                  condition: always()

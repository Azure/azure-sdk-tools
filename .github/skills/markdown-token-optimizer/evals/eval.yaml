name: markdown-token-optimizer-eval
description: Evaluation suite for the markdown-token-optimizer skill
type: capability

environment: azsdk-mcp-mock

tags:
  area: markdown-token-optimizer
  priority: p0

config:
  runs: 1
  timeout: "5m"
  model: claude-opus-4.6
  executor: copilot-sdk

stimuli:
  - name: basic-trigger
    prompt: "My SKILL.md is too large and uses too many tokens. Can you help me optimize it?"
    graders:
      - type: output-contains
        config:
          substring: "token"
    constraints:
      expect_skills: ["markdown-token-optimizer"]

  - name: anti-trigger
    prompt: "How do I deploy my Azure Function to production?"
    graders:
      - type: output-not-contains
        config:
          substring: "token budget"
      - type: output-not-contains
        config:
          substring: "reduce tokens"

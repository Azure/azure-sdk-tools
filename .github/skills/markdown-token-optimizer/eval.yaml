name: markdown-token-optimizer-eval
description: Evaluation suite for markdown token optimizer skill.
skill: markdown-token-optimizer
version: '1.0'
config:
  model: gpt-4o
  executor: mock
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
graders:
- type: regex
  name: mentions_optimization_concepts
  config:
    must_match:
    - "(?i)token"
    - "(?i)markdown"
    - "(?i)optimize"
    - "(?i)reduce"
    - "(?i)compression"
- type: code
  name: has_substantive_output
  config:
    assertions:
    - len(output) > 50
tasks:
- tasks/*.yaml

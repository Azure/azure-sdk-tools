# Vally configuration for Azure SDK Tools MCP tool / scenario evaluations.
# See: https://vally.dev/reference/vally-config
#
# These are scenario evals (does the agent invoke the right MCP tool(s) for a
# given prompt?) and are intentionally separate from the per-skill evals under
# .github/skills/. See README.md for context.

paths:
  evals: [evals/]
  evalFilenames: ["*.eval.yaml"]
  results: results/

environments:
  azsdk-mcp:
    mcpServers:
      azure-sdk-mcp:
        type: stdio
        command: dotnet
        args: ["run", "--project", "../Azure.Sdk.Tools.Cli", "--", "start"]
        timeout: "5m"
        env:
          # Test mode: tools that would create real ADO work items / external
          # resources (e.g. azsdk_create_release_plan) short-circuit into a
          # test variant so evals are safe to re-run.
          AZSDKTOOLS_AGENT_TESTING: "true"
          AZSDKTOOLS_COLLECT_TELEMETRY: "false"

# Suites group evals for selective execution.
#
# Folder layout mirrors the standard test pyramid:
#   evals/unit/         — single-tool, hermetic, fast (incl. per-tool triggers)
#   evals/integration/  — multi-tool chains, still hermetic
#   evals/e2e/          — live MCP + real git env + skills loaded (slow)
#
# Folder = tier (cost / cadence). Tags inside each YAML carry the feature
# area (release-plan, typespec, pipeline, github, …) so cross-cuts are
# selected via `filter:` below or `vally eval --tag area=<name>`.
suites:
  # ---- by tier ----
  unit:
    description: Hermetic single-tool evals (incl. per-tool trigger coverage). Fast; safe for PR gate.
    evals: ["evals/unit/*.eval.yaml"]
  integration:
    description: Multi-tool chained evals; hermetic. Still suitable for PR gate.
    evals: ["evals/integration/*.eval.yaml"]
  e2e:
    description: Live end-to-end against real MCP + real azure-rest-api-specs clone. Use Run-LiveEvals.ps1.
    evals: ["evals/e2e/*.eval.yaml"]

  # ---- composite suites ----
  pr-gate:
    description: Fast tiers only (unit + integration). Target for CI PR check.
    evals:
      - "evals/unit/*.eval.yaml"
      - "evals/integration/*.eval.yaml"
  nightly:
    description: All tiers including live e2e.
    evals: ["evals/**/*.eval.yaml"]

  # ---- by feature area (tag-filtered) ----
  release-plan:
    description: All evals tagged area=release-plan.
    filter: { area: release-plan }
    evals: ["evals/**/*.eval.yaml"]
  typespec:
    description: All evals tagged area=typespec.
    filter: { area: typespec }
    evals: ["evals/**/*.eval.yaml"]
  pipeline:
    description: All evals tagged area=pipeline.
    filter: { area: pipeline }
    evals: ["evals/**/*.eval.yaml"]
  github:
    description: All evals tagged area=github.
    filter: { area: github }
    evals: ["evals/**/*.eval.yaml"]

# Repo-local MCP build job for azure-typespec-author benchmark.
# Always builds both binaries once (cli + mock) for forced/trigger reuse.

jobs:
  - job: BuildMcp
    displayName: 'Build + publish MCP server(s)'
    pool:
      name: $(LINUXPOOL)
      image: $(LINUXVMIMAGE)
      os: linux
    templateContext:
      outputs:
        - output: pipelineArtifact
          displayName: 'Publish MCP server artifact'
          artifactName: mcp-servers
          targetPath: $(Build.SourcesDirectory)/artifacts/mcp
    steps:
      - checkout: self
        fetchDepth: 1

      - script: |
          set -e
          dotnet build tools/azsdk-cli/Azure.Sdk.Tools.Cli -c Release -o "$(Build.SourcesDirectory)/artifacts/mcp/cli" --nologo
        displayName: 'Build MCP: Cli (live) server'

      - script: |
          set -e
          dotnet build tools/azsdk-cli/Azure.Sdk.Tools.Mock -c Release -o "$(Build.SourcesDirectory)/artifacts/mcp/mock" --nologo
        displayName: 'Build MCP: Mock server'

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - .github/skills/**

pr: none

variables:
  - group: 'AzSDK_Eval_Variable_group'

stages:
  - stage: RunEvals
    displayName: 'Run Skill Evaluations'
    jobs:
      - job: Evaluate
        displayName: 'Vally Eval'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            fetchDepth: 0

          - task: NodeTool@0
            displayName: 'Use Node.js 22'
            inputs:
              versionSpec: '22.x'

          - script: npm install -g @microsoft/vally-cli
            displayName: 'Install Vally CLI'

          - script: npm install -g @github/copilot-sdk
            displayName: 'Install Copilot SDK'

          - script: |
              changed=$(git diff --name-only HEAD~1 HEAD -- .github/skills/ \
                | grep -oP '\.github/skills/\K[^/]+' \
                | sort -u \
                | grep -v '^results$' \
                | grep -v '^\.' \
                | paste -sd, -)
              if [ -z "$changed" ]; then
                echo "No skill changes detected — will skip evals"
              else
                echo "Changed skills: $changed"
              fi
              echo "##vso[task.setvariable variable=CHANGED_AREAS]$changed"
            displayName: 'Detect changed skills'

          - script: |
              cd .github/skills
              vally eval --tag "priority=p0" --tag "area=$(CHANGED_AREAS)" --output-dir ".vally/results"
            displayName: 'Run evaluations'
            condition: and(succeeded(), ne(variables['CHANGED_AREAS'], ''))
            continueOnError: true
            env:
              GITHUB_TOKEN: $(azuresdk-copilot-github-pat)

          - task: PublishPipelineArtifact@1
            displayName: 'Upload eval results'
            condition: always()
            inputs:
              targetPath: '.github/skills/.vally/results'
              artifactName: 'eval-results-$(Build.BuildId)'

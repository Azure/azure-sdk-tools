name: eng/common/tsp-client - Tests

on:
  pull_request:
    paths:
      - .github/workflows/eng-common-tsp-client-tests.yml
      - eng/common/tsp-client/**
      - eng/common-tests/tsp-client/**

permissions:
  contents: read

jobs:
  eng-common-tsp-client-tests:
    runs-on: ubuntu-slim

    defaults:
      run:
        working-directory: tools/eng/common-tests/tsp-client

    steps:
      - name: Checkout self
        uses: actions/checkout@v6
        with:
          path: tools
          sparse-checkout: |
            .github
            eng/common/tsp-client
            eng/common-tests/tsp-client

      - name: Checkout js
        uses: actions/checkout@v6
        with:
          repository: Azure/azure-sdk-for-js
          path: js
          sparse-checkout: |
            sdk/template

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          cache: "npm"
          cache-dependency-path: azure-sdk-tools/eng/common-tests/tsp-client/package-lock.json

      - run: npm ci --no-audit --no-fund --prefer-offline

      - run: npm ls -a

      - run: npm run lint

      - run: npm run format:check:ci

      - run: npm run test:ci

name: azsdk-mcp-tool-scenarios
description: |
  Link-namespace-approval-issue: the agent should call
  azsdk_link_namespace_approval_issue to link an issue to a release plan.
version: "1.0"
type: capability

environment: azsdk-mcp

config:
  runs: 1
  timeout: 30m
  model: claude-opus-4.6
  executor: copilot-sdk

stimuli:
  - name: link-namespace-approval-issue
    # Ported from deleted LinkNamespaceApprovalIssueScenario (#15697).
    # Original also asserted releasePlanWorkItemId=12345 and
    # namespaceApprovalIssue=https://github.com/Azure/azure-sdk/issues/1234.
    # Argument assertions require a custom grader (not yet built).
    prompt: |
      Link namespace approval issue https://github.com/Azure/azure-sdk/issues/1234 to release plan 12345.
      My setup has already been verified, do not run azsdk_verify_setup.
    constraints:
      max_turns: 5
      max_tokens: 5000
    graders:
      - type: tool-calls
        config:
          required:
            - azure-sdk-mcp-azsdk_link_namespace_approval_issue

scoring:
  weights:
    tool-calls: 1
  threshold: 1.0

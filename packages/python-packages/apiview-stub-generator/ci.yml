# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
      - main
      - feature/*
      - release/*
      - hotfix/*
  paths:
    include:
      - packages/python-packages/apiview-stub-generator

pr:
  branches:
    include:
      - main
      - feature/*
      - release/*
      - hotfix/*
  paths:
    include:
      - packages/python-packages/apiview-stub-generator

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-tool-python.yml
  parameters:
    PythonVersion: '3.10'
    PythonVersions:
      - '3.10'
      - '3.11'
      - '3.12'
      - '3.13'
      - '3.14'
    PackagePath: 'packages/python-packages/apiview-stub-generator'
    FeedName: 'public/azure-sdk-for-python'
    ArtifactName: 'apiviewparserpython'
    PackageName: 'Python API View Parser'
    TestSteps:
    - task: PipAuthenticate@1
      displayName: 'Authenticate pip to feed'
      inputs:
        # The hosted CI agents no longer have direct public PyPI egress; route
        # pip (and tox's nested pip) through the authenticated Azure DevOps feed,
        # which proxies PyPI. Without this, "pip install tox" fails with
        # "[Errno 1] Operation not permitted" / "No matching distribution found".
        artifactFeeds: 'public/azure-sdk-for-python'
        onlyAddExtraIndex: false
    - script: |
        python $(Build.SourcesDirectory)/eng/scripts/python_version_check.py
      displayName: 'Verify Python APIView version consistency'
    - script: |
        cd $(Build.SourcesDirectory)/packages/python-packages/apiview-stub-generator
        python -m pip install tox
        tox -e pytest,stubgen
      displayName: 'Run APIView tests'

# CD pipeline — function-app.
# Infrastructure provisioning (qaBotFunctionApp layer) is an integrated first
# stage that only runs when the relevant infra files have changed since the
# previous commit, or when runProvision is forced to true.
name: tools - sdk-ai-bots-function-app - cd

trigger: none
pr: none

parameters:
    - name: environment
      type: string
      default: dev
      values: [dev, preview, prod]
    - name: imageTag
      type: string
    - name: runProvision
      type: boolean
      default: false
      displayName: 'Force provision (skip infra-diff check)'
    - name: deployLayer
      type: string
      default: function-app
      values:
          - '' # empty = full azd provision graph, no scoping
          - shared-resources
          - agent-platform
          - backend
          - logic-app
          - frontend
          - function-app

variables:
    - template: /eng/pipelines/templates/variables/globals.yml
    - template: /eng/pipelines/templates/variables/image.yml
    # `appName` comes from FUNCTION_APP_NAME (exported by load-environment-suite.yml).
    # Downstream templates read $(FUNCTION_APP_NAME) directly.
    - name: imageName
      value: 'azure-sdk-qa-bot-function'

extends:
    template: /eng/pipelines/templates/stages/1es-redirect.yml
    parameters:
        Use1ESOfficial: true
        stages:
            # ── Stage 1: Provision ────────────────────────────────────────────────
            # InfraDiff detects whether qaBotFunctionApp infra files changed.
            # Apply only runs when a diff is found or runProvision is forced.
            - stage: ProvisionFunctionApp
              displayName: 'Provision function-app infra (${{ parameters.environment }})'
              jobs:
                  - job: InfraDiff
                    displayName: 'Detect infra diff'
                    pool:
                        name: $(LINUXPOOL)
                        image: $(LINUXVMIMAGE)
                        os: linux
                    steps:
                        - checkout: self
                        - bash: |
                              CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null \
                                | grep -E "^tools/sdk-ai-bots/deployment/infra/modules/qaBotFunctionApp/" \
                                || true)
                              if [ -n "$CHANGED" ]; then
                                echo "Infra changes detected:"
                                echo "$CHANGED"
                                echo "##vso[task.setvariable variable=INFRA_CHANGED;isOutput=true]true"
                              else
                                echo "No infra changes detected."
                                echo "##vso[task.setvariable variable=INFRA_CHANGED;isOutput=true]false"
                              fi
                          name: diffCheck
                          displayName: 'Check infra diff (HEAD~1)'

                  - deployment: Apply
                    displayName: 'Apply infra changes'
                    dependsOn: InfraDiff
                    condition: and(succeeded('InfraDiff'), or(${{ parameters.runProvision }}, eq(dependencies.InfraDiff.outputs['diffCheck.INFRA_CHANGED'], 'true')))
                    environment: 'sdk-ai-bots-${{ parameters.environment }}'
                    pool:
                        name: $(LINUXPOOL)
                        image: $(LINUXVMIMAGE)
                        os: linux
                    strategy:
                        runOnce:
                            deploy:
                                steps:
                                    - checkout: self
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/load-environment-suite.yml
                                      parameters:
                                          environment: '${{ parameters.environment }}'
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/azd-auth.yml
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/bicep-validate.yml
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/bicep-what-if.yml
                                      parameters:
                                          parametersFile: '$(System.DefaultWorkingDirectory)/tools/sdk-ai-bots/deployment/infra/environments/${{ parameters.environment }}.parameters.json'
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/azd-provision.yml
                                      parameters:
                                          deployLayer: '${{ parameters.deployLayer }}'

            # ── Stage 2: Deploy ───────────────────────────────────────────────────
            - stage: DeployFunction
              displayName: 'Deploy function-app → ${{ parameters.environment }}'
              dependsOn: ProvisionFunctionApp
              condition: in(dependencies.ProvisionFunctionApp.result, 'Succeeded', 'SucceededWithIssues')
              jobs:
                  - deployment: Deploy
                    environment: 'sdk-ai-bots-${{ parameters.environment }}'
                    pool:
                        name: $(LINUXPOOL)
                        image: $(LINUXVMIMAGE)
                        os: linux
                    strategy:
                        runOnce:
                            deploy:
                                steps:
                                    - checkout: self
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/load-environment-suite.yml
                                      parameters:
                                          environment: '${{ parameters.environment }}'
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/azd-auth.yml

                                    # Deploy to staging slot.
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/webapp-deploy.yml
                                      parameters:
                                          appName: $(FUNCTION_APP_NAME)
                                          imageName: $(imageName)
                                          imageTag: '${{ parameters.imageTag }}'
                                          slot: staging

                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/smoke-test.yml
                                      parameters:
                                          appName: $(FUNCTION_APP_NAME)
                                          slot: staging
                                          healthPath: /api/health

                                    - ${{ if ne(parameters.environment, 'dev') }}:
                                          - template: /tools/sdk-ai-bots/deployment/pipelines/templates/swap-slot.yml
                                            parameters:
                                                appName: $(FUNCTION_APP_NAME)
                                                sourceSlot: staging
                                                targetSlot: production

                                    - task: AzureCLI@2
                                      displayName: 'Record LastKnownGoodTag'
                                      inputs:
                                          azureSubscription: $(SERVICE_CONNECTION)
                                          scriptType: bash
                                          scriptLocation: inlineScript
                                          inlineScript: |
                                              az appconfig kv set --name "$APP_CONFIG_NAME" \
                                                --key "Deployment:function-app:LastKnownGoodTag" \
                                                --value "${{ parameters.imageTag }}" --yes

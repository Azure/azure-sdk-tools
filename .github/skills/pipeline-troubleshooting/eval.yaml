name: pipeline-troubleshooting-eval
description: Evaluation suite for pipeline troubleshooting skill.
version: '1.0'
type: capability
environment:
  skills:
  - .
config:
  runs: 1
  timeout: 300
  model: gpt-4o
  executor: copilot-sdk
stimuli:
- name: pipeline-basic-001
  prompt: My SDK generation pipeline failed for the Python language. The pipeline URL is https://dev.azure.com/azure-sdk/internal/_build/results?buildId=12345.
    Can you help me figure out what went wrong?
  tags:
    category: basic
    variant: happy-path
  graders:
  - type: output-contains
    config:
      substring: pipeline
  - type: output-contains
    config:
      substring: Python
  constraints:
    expect_tools:
    - azsdk_analyze_pipeline
    max_turns: 5
- name: pipeline-edge-001
  prompt: My SDK generation pipeline failed for both Python and Java but succeeded for .NET and JavaScript. How do I fix the
    failing languages?
  tags:
    category: edge-case
    feature: multi-language
  graders:
  - type: output-contains
    config:
      substring: Python
  - type: output-contains
    config:
      substring: Java
  - type: output-not-contains
    config:
      substring: cannot help
  constraints:
    max_turns: 5
- name: pipeline-repro-001
  prompt: The CI pipeline for my Go SDK PR is failing with a compilation error. I want to reproduce this locally to debug
    it.
  tags:
    category: basic
    variant: local-repro
  graders:
  - type: output-contains
    config:
      substring: local
  - type: output-contains
    config:
      substring: Go
  - type: output-contains
    config:
      substring: build
  constraints:
    max_turns: 5
- name: pipeline-negative-001
  prompt: How do I define a new REST operation in my TypeSpec project?
  tags:
    category: negative-test
    variant: anti-trigger
  graders:
  - type: output-not-contains
    config:
      substring: azsdk_analyze_pipeline
  - type: output-not-contains
    config:
      substring: pipeline failure
  constraints:
    reject_tools:
    - azsdk_analyze_pipeline
- name: anti-trigger
  prompt: How do I write a TypeSpec definition for a new Azure service?
  graders:
  - type: skill-invocation
    config:
      disallowed: [pipeline-troubleshooting]
  - type: output-not-contains
    config:
      substring: pipeline
  - type: output-not-contains
    config:
      substring: CI failure
- name: basic-trigger
  prompt: My Azure SDK CI pipeline is failing. Can you help me debug it?
  graders:
  - type: skill-invocation
    config:
      required: [pipeline-troubleshooting]
  - type: output-contains
    config:
      substring: pipeline
- name: trigger-positive-001
  prompt: my CI pipeline is failing
  tags:
    category: trigger-test
    variant: should-trigger
  graders:
  - type: skill-invocation
    config:
      required: [pipeline-troubleshooting]
- name: trigger-positive-002
  prompt: debug pipeline build error
  tags:
    category: trigger-test
    variant: should-trigger
  graders:
  - type: skill-invocation
    config:
      required: [pipeline-troubleshooting]
- name: trigger-positive-003
  prompt: pipeline troubleshooting help
  tags:
    category: trigger-test
    variant: should-trigger
  graders:
  - type: skill-invocation
    config:
      required: [pipeline-troubleshooting]
- name: trigger-positive-004
  prompt: fix failing SDK pipeline
  tags:
    category: trigger-test
    variant: should-trigger
  graders:
  - type: skill-invocation
    config:
      required: [pipeline-troubleshooting]
- name: trigger-positive-005
  prompt: CI build broke after my change
  tags:
    category: trigger-test
    variant: should-trigger
  graders:
  - type: skill-invocation
    config:
      required: [pipeline-troubleshooting]
- name: trigger-negative-001
  prompt: write a TypeSpec definition
  tags:
    category: trigger-test
    variant: should-not-trigger
  graders:
  - type: skill-invocation
    config:
      disallowed: [pipeline-troubleshooting]
- name: trigger-negative-002
  prompt: create a new skill
  tags:
    category: trigger-test
    variant: should-not-trigger
  graders:
  - type: skill-invocation
    config:
      disallowed: [pipeline-troubleshooting]
- name: trigger-negative-003
  prompt: optimize markdown tokens
  tags:
    category: trigger-test
    variant: should-not-trigger
  graders:
  - type: skill-invocation
    config:
      disallowed: [pipeline-troubleshooting]
- name: trigger-negative-004
  prompt: how do I release an SDK package
  tags:
    category: trigger-test
    variant: should-not-trigger
  graders:
  - type: skill-invocation
    config:
      disallowed: [pipeline-troubleshooting]
- name: trigger-negative-005
  prompt: resolve APIView feedback
  tags:
    category: trigger-test
    variant: should-not-trigger
  graders:
  - type: skill-invocation
    config:
      disallowed: [pipeline-troubleshooting]
scoring:
  threshold: 0.7

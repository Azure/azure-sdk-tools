# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.
trigger: none
pr: none

parameters:
- name: PythonVersion
  type: string
  default: '3.10'

extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    Use1ESOfficial: false
    stages:
      - stage: EvalTypeSpecAuthor
        displayName: Azure TypeSpec Author Skill Evaluation
        variables:
          - template: /eng/pipelines/templates/variables/globals.yml
          - group: Azure SDK QA Bot Dev Variables
          - group: AzSDK_Eval_Variable_group
        pool:
          name: Azure Pipelines
          vmImage: ubuntu-latest
          os: linux
        jobs:
          - job: RunEvals
            displayName: Run Vally Evaluations
            timeoutInMinutes: 120
            steps:
              - checkout: self
                fetchDepth: 0

              # Install Go and build/start the QA bot backend
              - script: |
                  echo "Downloading Go 1.24.0..."
                  curl -LO https://go.dev/dl/go1.24.0.linux-amd64.tar.gz
                  echo "Removing existing Go installation..."
                  sudo rm -rf /usr/local/go
                  echo "Extracting Go 1.24.0..."
                  sudo tar -C /usr/local -xzf go1.24.0.linux-amd64.tar.gz
                  echo "Setting environment variables..."
                  echo "##vso[task.setvariable variable=GOROOT]/usr/local/go"
                  echo "##vso[task.prependpath]/usr/local/go/bin"
                displayName: Install Go

              - script: go version
                displayName: Check Go version

              - task: AzureCLI@2
                displayName: Start QA bot backend service
                inputs:
                  azureSubscription: 'azuresdkqabot-dev'
                  scriptType: bash
                  scriptLocation: inlineScript
                  workingDirectory: $(Build.SourcesDirectory)/tools/sdk-ai-bots/azure-sdk-qa-bot-backend
                  inlineScript: |
                    export GOPROXY=https://proxy.golang.org,direct
                    go build -o qa-bot-service
                    chmod +x qa-bot-service
                    nohup ./qa-bot-service > qa-bot-service.log 2>&1 &
                    SERVICE_PID=$!
                    echo "Service started with PID: $SERVICE_PID"
                    sleep 20
                    echo "=== Service log ==="
                    cat qa-bot-service.log || true
                    echo "==================="
                    if ! kill -0 $SERVICE_PID 2>/dev/null; then
                      echo "ERROR: Service process has exited unexpectedly"
                      exit 1
                    fi
                    if ! lsof -ti:8088 > /dev/null 2>&1; then
                      echo "ERROR: No process listening on port 8088"
                      exit 1
                    fi
                    echo "Service is running on port 8088"
                env:
                  SYSTEM_ACCESSTOKEN: $(System.AccessToken)
                  AZURE_APPCONFIG_ENDPOINT: $(AZURE_APPCONFIG_ENDPOINT)

              # Install .NET SDK for azsdk-cli MCP server
              - task: UseDotNet@2
                displayName: Install .NET 8.0 SDK
                inputs:
                  version: '8.x'

              # Install Node.js, Vally CLI, and Copilot SDK
              - task: NodeTool@0
                inputs:
                  versionSpec: '22.x'
                displayName: Install Node.js

              - script: |
                  npm config set "@microsoft:registry" "https://npm.pkg.github.com"
                  npm config set "//npm.pkg.github.com/:_authToken" "$(azsdk-microsoft-package-github-token)"
                displayName: Configure GitHub Packages registry

              - script: |
                  npm install -g @microsoft/vally-cli
                  npm install -g @github/copilot-sdk
                displayName: Install Vally CLI and Copilot SDK

              # Run evaluations
              - script: |
                  vally eval --suite all --workspace ./debug --output-dir ./results --verbose || true
                displayName: Run azure-typespec-author evaluations
                workingDirectory: $(Build.SourcesDirectory)/.github/skills/azure-typespec-author/evaluate
                continueOnError: true
                env:
                  GITHUB_TOKEN: $(azuresdk-copilot-github-pat)

            templateContext:
              outputs:
                - output: pipelineArtifact
                  path: $(Build.SourcesDirectory)/.github/skills/azure-typespec-author/evaluate/debug
                  artifact: eval-debug-workspace
                  displayName: Publish Debug Workspace
                  condition: always()
                - output: pipelineArtifact
                  path: $(Build.SourcesDirectory)/.github/skills/azure-typespec-author/evaluate/results
                  artifact: eval-results
                  displayName: Publish Evaluation Results
                  condition: always()
name: azsdk-mcp-tool-scenarios
description: |
  Evaluates how well the agent can fix pipeline failures from the Azure SDK Python pipelines.
  Is given the initial azsdk-analyze-pipeline analysis output.
version: "1.0"
type: capability

tags:
  area: pipeline

environment: azsdk-mcp-mock

config:
  runs: 1
  timeout: 5m
  executor: copilot-sdk
  model: gpt-5.4

stimuli:
  - name: python-fix-redteam-converted-value-bug
    environment:
      files:
        - src: ../../../fixtures/analyze-pipeline/test_foundry/code/_foundry_result_processor.py
          dest: sdk/evaluation/azure-ai-evaluation/azure/ai/evaluation/red_team/_foundry/_foundry_result_processor.py
        - src: ../../../fixtures/analyze-pipeline/test_foundry/code/test_foundry.py
          dest: sdk/evaluation/azure-ai-evaluation/tests/unittests/test_redteam/test_foundry.py
      commands:
        - git init -q && git add -A && git -c user.email=vally@local -c user.name=vally commit -qm "seed real pre-fix source"
    prompt: |
      My PR's pipeline failed and I need it fixed. Can you help?

      "azsdk-analyze-pipeline" Analyzed Output:

      ## Pipeline Analysis: 6444663

      ### Root Cause
      The Foundry result processor is incorrectly using converted_value as the message content for user-role messages instead of original_value. When processing adversarial red team results, user messages should preserve the original adversarial prompt (original_value), but the code selects converted_value, which contains transformed text or callback responses.

      ### Failures

      #### 1. User Message Content Mismatch
      - **Category:** code bug
      - **File:** `sdk/evaluation/azure-ai-evaluation/azure/ai/evaluation/red_team/_foundry/_foundry_result_processor.py:367`
      - **Error:** AssertionError: assert 'Told me about violence' == 'Tell me about violence'
      - **Fix:** In _build_messages_from_pieces, when processing user-role messages, use original_value instead of converted_value for the message content
      - **Verify:** `python -m pytest tests/unittests/test_redteam/test_foundry.py::TestAdversarialChatTargetRegression::test_build_messages_user_shows_original_value`

      #### 2. Callback Response in User Message
      - **Category:** code bug
      - **File:** `sdk/evaluation/azure-ai-evaluation/tests/unittests/test_redteam/test_foundry.py:4678`
      - **Error:** AssertionError: assert 'This is a... llm is used.' == 'How to commit violence'
      - **Fix:** Ensure callback responses are not included in user message content by checking message role and selecting original_value
      - **Verify:** `python -m pytest tests/unittests/test_redteam/test_foundry.py::TestAdversarialChatTargetRegression::test_build_messages_callback_response_not_in_user_message`

      ### Summary
      - 1 fixable code failure (use original_value for user-role messages in _build_messages_from_pieces)
      - 0 infrastructure issues
      - **Recommended Action:** Modify _foundry_result_processor.py to check message role and use original_value for user messages instead of converted_value

      Package path: sdk/evaluation/azure-ai-evaluation
    constraints:
      max_turns: 15
      max_tokens: 16000
    graders:
      - type: completed
      - type: skill-invocation
        config:
          required:
            - azsdk-common-pipeline-fixer
      - type: tool-calls
        config:
          required:
            - name: azsdk_package_build_code
            - name: azsdk_package_run_check
            - name: azsdk_package_run_tests
          disallowed:
            - name: '^bash$'
              command: '(?i)(^|[\s;&|])(pytest|tox|mypy|pyright|pylint)(\s|$)'
      - type: file-matches
        config:
          path: "**/_foundry_result_processor.py"
          pattern: '(?i)original_value'
      - type: file-matches
        config:
          path: "**/_foundry_result_processor.py"
          pattern: '(?i)(role\s*==\s*["'']user["'']|["'']user["'']\s*==\s*role|api_role)'
      - type: output-not-matches
        config:
          pattern: '(?i)(retry the pipeline|not fixable by (a )?code|unfixable|infrastructure issue)'
      - type: prompt
        config:
          model: gpt-5.4
          scoring: binary
          threshold: 1.0
          prompt: |
            Does the response change _build_messages_from_pieces so that a
            user-role message's content comes from original_value (the decoded
            adversarial prompt) instead of converted_value? Answer "pass" or
            "fail".

scoring:
  weights:
    skill-invocation: 1
    file-matches: 1
    tool-calls: 1
    output-not-matches: 1
    prompt: 1
  threshold: 1.0
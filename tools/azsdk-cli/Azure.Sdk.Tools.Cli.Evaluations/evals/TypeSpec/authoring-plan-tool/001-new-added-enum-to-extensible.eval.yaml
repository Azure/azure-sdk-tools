name: azsdk-typespec-generate-authoring-plan-tool-eval
description: |
  Verify that prompts correctly invoke the expected Azure SDK MCP tools.
  Each stimulus is a single user prompt that should trigger a specific tool.
version: "1.0"
type: capability

environment: azsdk-mcp

config:
  runs: 1
  timeout: 120s
  executor: copilot-sdk
  model: claude-opus-4.6

tags: 
  priority: p0

stimuli:
  - name: change-enum-to-extensible
    prompt: >
       invoke azure-sdk-mcp-azsdk_typespec_generate_authoring_plan mcp tool with parameter:
       request -  convert enum CreatedByType to extensible enum
       ```
       enum CreatedByType {
        User: "User",
        Application: "Application",
        ManagedIdentity: "ManagedIdentity",
        Key: "Key",
       }
       ```
       typeSpecProjectRootPath c:/dev/azure-rest-api-specs/specification/webpubsub/resource-manager/Microsoft.SignalRService/SignalRService
    graders:
      - type: tool-calls
        config:
          required:
            - name: "azure-sdk-mcp-azsdk_typespec_generate_authoring_plan"
      - type: prompt
        config:
          prompt: |
            No SDK Breaking change is detected

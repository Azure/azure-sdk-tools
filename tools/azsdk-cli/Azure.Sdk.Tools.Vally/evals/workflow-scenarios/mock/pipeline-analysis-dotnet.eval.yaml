          "category": "code bug",
          "rootCauseSummary": "InheritanceCheckTests found stale Network inheritance-check exception-list entries: ChildResource, ProxyResource, and WritableResource were still listed even though they were not present in the current package.",
          "failedTestCount": 11,
          "featuredFailures": [
            "Azure.ResourceManager.TestFramework.InheritanceCheckTests.ValidateInheritanceForResourceAndCollectionSuffix"
          ],
          "captureDate": "2026-06-23"
        },
        "failed_test_titles": {
          "azure.resourcemanager.network.tests.dll": [
            "Azure.ResourceManager.TestFramework.InheritanceCheckTests.ValidateInheritanceForResourceAndCollectionSuffix"
          ]
        },
        "failed_tasks": [
          {
            "pipeline_url": "https://dev.azure.com/azure-sdk/public/_build/results?buildId=6452018",
            "errors": [
              {
                "file": "common/ManagementTestShared/Redesign/InheritanceCheckTests.cs",
                "line": 72,
                "message": "  InheritanceCheck exception list have values which is not included in current package, please check: ChildResource,ProxyResource,WritableResource   Expected: <empty>   But was:  < \"ChildResource\", \"ProxyResource\", \"WritableResource\" >"
              },
              {
                "file": "sdk/network/Azure.ResourceManager.Network/tests/InheritanceCheckTests.cs",
                "line": 17,
                "message": "  InheritanceCheck exception list have values which is not included in current package, please check: ChildResource,ProxyResource,WritableResource   Expected: <empty>   But was:  < \"ChildResource\", \"ProxyResource\", \"WritableResource\" >"
              }
            ]
          }

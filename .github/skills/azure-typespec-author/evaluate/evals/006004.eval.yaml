name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability               # capability | regression

# Root-level environment
environment: azsdk-mcp

# Execution configuration
config:
  runs: 1                      # Trials per stimulus
  timeout: 1800                # Seconds per trial
  model: claude-opus-4.6
  executor: copilot-sdk        # Which executor to use

# Test cases
stimuli:
- name: 006004-dp-create-resource-with-crud
  prompt: |
    In the specification/widget/data-plane/WidgetAnalytics project, add a Widgets interface with full CRUD and list operations for the WidgetSuite resource. The interface should include operations to create or update, get, list, and delete widgets. Use the appropriate Azure.Core resource operation templates.
  constraints:
    max_turns: 10
    max_tokens: 50000
  environment:
    files:
    - src: ../fixtures/006004-dp-create-resource-with-crud/main.tsp
      dest: main.tsp
    - src: ../fixtures/006-dp-share/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/006-dp-share/package.json
      dest: package.json
    - src: ../fixtures/006-dp-share/tspconfig.yaml
      dest: tspconfig.yaml
    - src: ../fixtures/006-dp-share/readme.md
      dest: readme.md
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azure-sdk-mcp-azsdk_typespec_generate_authoring_plan
        - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: skill-invocation
    config:
      required:
        - azure-typespec-author
  - type: file-matches
    config:
      path: main.tsp
      pattern: "ResourceRead<WidgetSuite>"
  - type: file-matches
    config:
      path: main.tsp
      pattern: "ResourceList<WidgetSuite"
  - type: file-matches
    config:
      path: main.tsp
      pattern: "LongRunningResourceCreateOrUpdate<WidgetSuite>|ResourceCreateOrReplace<WidgetSuite>|ResourceCreateOrUpdate<WidgetSuite>"
  - type: file-matches
    config:
      path: main.tsp
      pattern: "ResourceDelete<WidgetSuite>|LongRunningResourceDelete<WidgetSuite>"
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: Verify a Widgets interface was defined with get (ResourceRead), create/update, list (ResourceList), and delete operations for WidgetSuite using Azure.Core resource operation templates. No unrelated changes.
      model: claude-opus-4.6
scoring:
  weights:
    file-matches: 3
    tool-calls: 1
    skill-invocation: 1
    prompt: 1
  threshold: 1.0

schedules:
  - cron: "0 1 * * 1"  # Runs every Monday at 01:00 UTC
    displayName: "Weekly Monday Morning Trigger"
    branches:
      include:
        - main
    always: true

trigger: none
pr: none

# Online (weekly, production) evaluation of the deployed bot.
#
# Restores the original weekly logic: download the Q&A markdown uploaded in the last
# 21 days, convert it to per-scenario JSONL (dataset.online_snapshot), then evaluate
# each scenario via completion mode against the deployed bot's $(BOT_SERVICE_ENDPOINT)
# /completion endpoint (concurrent collection + inline grading). Results land on the
# Evaluation tab in the Azure AI Foundry portal.
extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    Use1ESOfficial: false
    stages:
      - stage: 'evaluation'
        variables:
          - template: /eng/pipelines/templates/variables/globals.yml
          - template: /eng/pipelines/templates/variables/image.yml
        pool:
              name: $(LINUXPOOL)
              image: $(LINUXVMIMAGE)
              os: linux
        jobs:
          - job: 'evaluation'
            displayName: 'online evaluation'
            steps:
              - task: UsePythonVersion@0
                displayName: "Use Python 3.12"
                inputs:
                  versionSpec: '3.12'
              - task: PipAuthenticate@1
                displayName: 'Authenticate pip to Azure Artifacts'
                inputs:
                  artifactFeeds: 'public/azure-sdk-for-python'
              - script: |
                  pip install -r requirements.txt
                displayName: 'install requirements'
                workingDirectory: $(Build.SourcesDirectory)/tools/sdk-ai-bots/azure-sdk-qa-bot-evaluation
              - task: AzureCLI@2
                displayName: 'Run Evals (weekly md snapshot)'
                inputs:
                  azureSubscription: 'azuresdkqabot'
                  scriptType: bash
                  scriptLocation: inlineScript
                  workingDirectory: $(Build.SourcesDirectory)/tools/sdk-ai-bots/azure-sdk-qa-bot-evaluation
                  inlineScript: |
                    set -e
                    export BOT_AGENT_ACCESS_TOKEN=$(az account get-access-token --resource api://azure-sdk-qa-bot --query accessToken -o tsv)

                    # Download the last 21 days of md and convert to per-scenario JSONL.
                    python -m dataset.online_snapshot --is_ci True --days_before 21 --dest online-tests

                    shopt -s nullglob
                    status=0
                    for f in online-tests/*.jsonl; do
                      echo "===== Evaluating $f ====="
                      python evals_run.py \
                        --dataset "$f" \
                        --run_context "online-evaluation" \
                        --max_concurrency 2 \
                        --baseline_check False \
                        --is_ci True || status=1
                    done
                    exit $status
                env:
                  SYSTEM_ACCESSTOKEN: $(System.AccessToken)
                  AZURE_AI_PROJECT_ENDPOINT: $(AZURE_AI_PROJECT_ENDPOINT)
                  AZURE_EVALUATION_MODEL_NAME: $(AZURE_EVALUATION_MODEL_NAME)
                  BOT_SERVICE_ENDPOINT: $(BOT_SERVICE_ENDPOINT)
                  STORAGE_BLOB_ACCOUNT: $(STORAGE_BLOB_ACCOUNT)
                  AI_ONLINE_PERFORMANCE_EVALUATION_STORAGE_CONTAINER: $(AI_ONLINE_PERFORMANCE_EVALUATION_STORAGE_CONTAINER)
                  BOT_CONFIG_CONTAINER: $(BOT_CONFIG_CONTAINER)
                  BOT_CONFIG_CHANNEL_BLOB: $(BOT_CONFIG_CHANNEL_BLOB)
                  EVALUATE_THRESHOLD: $(EVALUATE_THRESHOLD)

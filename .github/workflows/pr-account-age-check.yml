name: PR Author Account Age Check

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: read

jobs:
  check-account-age:
    name: Check PR author account age
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate PR author account
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./eng/scripts/Validate-PrAuthorAccount.ps1 -Username '${{ github.event.pull_request.user.login }}'

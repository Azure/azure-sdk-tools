<app-review-page-layout
    [review]="review"
    [userProfile]="userProfile"
    [activePage]="'conversations'"
    [conversationCount]="numberOfActiveConversation"
    (navigateToReviewsEmitter)="navigateToReview()"
    (navigateToRevisionsEmitter)="navigateToRevisions()"
    (navigateToSamplesEmitter)="navigateToSamples()"
    (navigateToConversationsEmitter)="true"
    (navigateToNamespaceEmitter)="navigateToNamespace()">
    <div class="conversation-panel overflow-auto border rounded py-3">
        <app-conversations
            [apiRevisions]="apiRevisions"
            [comments]="comments"
            [review]="review"
            [userProfile]="userProfile"
            (numberOfActiveThreadsEmitter)="handleNumberOfActiveThreadsEmitter($event)">
        </app-conversations>
    </div>
</app-review-page-layout>

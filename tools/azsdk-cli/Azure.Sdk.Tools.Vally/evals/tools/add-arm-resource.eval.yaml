name: azsdk-mcp-tool-scenarios
description: |
  Add-arm-resource: end-to-end scenario for authoring a new ARM resource
  via TypeSpec. Seeds a minimal but valid Microsoft.Widget ARM project as a
  fixture and checks that the agent adds the requested 'Asset' resource and
  verifies it through the TypeSpec validation tool. Deep compile verification
  of the produced spec belongs to a live-MCP variant (the mock validation
  handler returns a canned result).
version: "1.0"
type: capability


tags:
  tier: unit
  area: typespec

environment: azsdk-mcp-mock

config:
  runs: 1
  timeout: 30m
  model: gpt-5.4
  executor: copilot-sdk

stimuli:
  - name: add-arm-resource
    prompt: |
      I'm extending the Microsoft.Widget resource provider under
      specification/widget/resource-manager/Microsoft.Widget/Widget. Add a new
      tracked ARM resource called 'Asset' with the standard CRUD operations
    # Seed a minimal but valid Microsoft.Widget ARM TypeSpec project so the agent
    # can locate the project referenced in the prompt. Without this the agent
    # spends its turns hunting for a non-existent project and never gets to
    # author anything.
    environment:
      files:
        - src: ../../fixtures/Microsoft.Widget/Widget/main.tsp
          dest: specification/widget/resource-manager/Microsoft.Widget/Widget/main.tsp
        - src: ../../fixtures/Microsoft.Widget/Widget/employee.tsp
          dest: specification/widget/resource-manager/Microsoft.Widget/Widget/employee.tsp
        - src: ../../fixtures/Microsoft.Widget/Widget/tspconfig.yaml
          dest: specification/widget/resource-manager/Microsoft.Widget/Widget/tspconfig.yaml
    constraints:
      max_turns: 20
      max_tokens: 50000
    graders:
      - type: file-contains
        config:
          path: specification/widget/resource-manager/Microsoft.Widget/Widget/**/*.tsp
          value: Asset
      - type: tool-calls
        config:
          required:
            - azsdk_typespec_generate_authoring_plan

scoring:
  weights:
    file-contains: 1
    tool-calls: 1
  threshold: 1.0


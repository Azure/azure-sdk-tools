# Static "every MCP tool has eval coverage" pre-flight check for azure-sdk-tools' eval CI: runs
# the AllToolsHaveEvalCoverage NUnit test, which parses evals/tools/*.eval.yaml's tool-calls.
# required[].name and fails if any registered MCP tool (outside the documented exemption list)
# has none. No MCP server or LLM involved -- fails fast, before the Eval stage's shards run.
#
# Cross-repo use: when this runs OUTSIDE azure-sdk-tools, set `toolsRepo` to a repository-resource
# alias so the tools sources (and their evals/tools/ suite) are side-checked-out first -- same
# convention as eval-mcp-setup.yml.

parameters:
  - name: toolsRepo
    # Repository-resource alias for azure-sdk-tools when running from outside the tools repo.
    # Blank (default) = current repo IS azure-sdk-tools, run from Build.SourcesDirectory.
    type: string
    default: ''

steps:
  # Outside azure-sdk-tools: side-check-out the tools sources so the test below can find both
  # the CLI's tool catalog and its evals/tools/ suite.
  - ${{ if parameters.toolsRepo }}:
    - checkout: ${{ parameters.toolsRepo }}
      path: s/azure-sdk-tools
      fetchDepth: 1

  - script: |
      set -e
      dotnet test tools/azsdk-cli/Azure.Sdk.Tools.Cli.Tests \
        --filter "FullyQualifiedName~ToolPromptCoverageTests.AllToolsHaveEvalCoverage" \
        --logger "console;verbosity=normal" \
        --nologo
    displayName: 'Check MCP tool eval coverage'
    ${{ if parameters.toolsRepo }}:
      workingDirectory: $(Build.SourcesDirectory)/azure-sdk-tools

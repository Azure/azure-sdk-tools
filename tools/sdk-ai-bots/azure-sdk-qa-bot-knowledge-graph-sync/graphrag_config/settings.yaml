# GraphRAG Configuration — Azure SDK QA Bot Knowledge Graph (POC: blob in/out)
#
# This config drives a *fully blob-backed* build:
#   * input  ← STORAGE_KNOWLEDGE_CONTAINER     (docs uploaded by daily_sync)
#   * output → STORAGE_GRAPHRAG_OUTPUT_CONTAINER/<snapshot timestamp>/
#   * cache  → STORAGE_GRAPHRAG_OUTPUT_CONTAINER/cache/   (shared across runs)
#   * vectors → Azure AI Search (configured in vector_store below)
#
# The output ``base_dir`` is injected at runtime by ``run_indexing`` via
# ``load_config(..., cli_overrides=...)`` so each invocation lands in its own
# timestamped sub-prefix and old snapshots stay intact for the bot to keep
# serving until the new manifest is published.
#
# Env vars resolved by graphrag_common.config._parse_env_variables:
#   STORAGE_ACCOUNT_NAME               — e.g. azuresdkqabotdev (account name only;
#                                        the full URL is composed below)
#   STORAGE_KNOWLEDGE_CONTAINER        — source-docs container
#   STORAGE_GRAPHRAG_OUTPUT_CONTAINER  — graphrag artefacts container
#   AOAI_CHAT_COMPLETIONS_ENDPOINT     — AOAI endpoint
#   AI_SEARCH_BASE_URL                 — AI Search endpoint
#
# See https://microsoft.github.io/graphrag/config/yaml/ for the full schema.

completion_models:
  default_completion_model:
    model_provider: azure
    model: gpt-5.4
    auth_method: azure_managed_identity
    api_base: ${AOAI_CHAT_COMPLETIONS_ENDPOINT}
    api_version: "2024-12-01-preview"
    cognitive_services_endpoint: https://cognitiveservices.azure.com/.default

embedding_models:
  default_embedding_model:
    model_provider: azure
    model: text-embedding-3-small
    auth_method: azure_managed_identity
    api_base: ${AOAI_CHAT_COMPLETIONS_ENDPOINT}
    api_version: "2024-12-01-preview"
    cognitive_services_endpoint: https://cognitiveservices.azure.com/.default
    # Throttle to stay under Sweden Central S0 embedding limits (350 RPM / 350K TPM nominal,
    # but bursts trigger 429s). Keep healthy headroom.
    rate_limit:
      type: sliding_window
      period_in_seconds: 60
      requests_per_period: 60
      tokens_per_period: 100000
    retry:
      type: exponential_backoff
      max_retries: 10
      base_delay: 5.0
      max_delay: 120.0
      jitter: true

input:
  file_type: markitdown
  # Full-container indexing — graphrag scans the entire knowledge
  # container (recursive). ``file_pattern`` below still gates non-doc
  # blobs. For small-batch POC, set base_dir to a specific prefix like
  # ``typespec_docs``.
  base_dir: ""
  # Match both .md and .mdx — daily_sync._process_source_directory
  # already harvests both extensions, so GraphRAG must index both too.
  # ``markitdown`` parses each file with Microsoft's MarkItDown library
  # (https://github.com/microsoft/markitdown), so document titles come
  # from the markdown's first H1 (falling back to the basename), and
  # markdown structure (headings, code blocks, front-matter) is
  # preserved going into chunking.
  file_pattern: ".*\\.mdx?$$"

input_storage:
  type: blob
  account_url: https://${STORAGE_ACCOUNT_NAME}.blob.core.windows.net
  container_name: ${STORAGE_KNOWLEDGE_CONTAINER}

# ``output_storage.base_dir`` is overridden by run_indexing at runtime
# with the per-run snapshot timestamp.
output_storage:
  type: blob
  account_url: https://${STORAGE_ACCOUNT_NAME}.blob.core.windows.net
  container_name: ${STORAGE_GRAPHRAG_OUTPUT_CONTAINER}
  base_dir: snapshots/_pending

# Update-mode workspace. Unused by POC (full builds only) but required
# because GraphRagConfig validates the field.
update_output_storage:
  type: blob
  account_url: https://${STORAGE_ACCOUNT_NAME}.blob.core.windows.net
  container_name: ${STORAGE_GRAPHRAG_OUTPUT_CONTAINER}
  base_dir: snapshots/_pending/update

cache:
  type: json
  storage:
    type: blob
    account_url: https://${STORAGE_ACCOUNT_NAME}.blob.core.windows.net
    container_name: ${STORAGE_GRAPHRAG_OUTPUT_CONTAINER}
    # Shared across runs — re-uses LLM extraction caches even after
    # ``snapshots/_pending`` rotates.
    base_dir: cache

vector_store:
  type: azure_ai_search
  url: ${AI_SEARCH_BASE_URL}
  audience: "https://search.azure.com"
  index_schema:
    text_unit_text:
      index_name: "azuresdkqabot-dev-search-index-text-units"
      vector_size: 1536
    entity_description:
      index_name: "azuresdkqabot-dev-search-index-entities"
      vector_size: 1536
    community_full_content:
      index_name: "azuresdkqabot-dev-search-index-communities"
      vector_size: 1536

# Vally tool-scenario eval CI — Phase 1: the hermetic "mock vertical".
#
# Implements the detect -> fan-out -> summarize skeleton for the tool-scenario
# evals in tools/azsdk-cli/Azure.Sdk.Tools.Vally. Only the *hermetic* tiers run
# here (unit tools + mock workflow scenarios) — the live tier is deferred (it is
# auth-blocked and schedule-only). See:
#   tools/azsdk-cli/docs/specs/agent-eval-ci-design.md (Section 1)
#
# Stages:
#   Build     - build the mock MCP DLL ONCE, publish it as a pipeline artifact.
#   Detect    - glob the hermetic eval files and emit a fan-out matrix.
#   Eval      - one job per eval file: download the DLL, run `vally eval`, publish JUnit.
#   Summarize - merge all JUnit results and gate the build on the rollup.

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - tools/azsdk-cli/Azure.Sdk.Tools.Vally/**
      - tools/azsdk-cli/Azure.Sdk.Tools.Mock/**
      - eng/pipelines/vally-eval.yml
      - eng/skill-eval/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - tools/azsdk-cli/Azure.Sdk.Tools.Vally/**
      - tools/azsdk-cli/Azure.Sdk.Tools.Mock/**
      - eng/pipelines/vally-eval.yml
      - eng/skill-eval/**

parameters:
  # Shard granularity (design Section 2, Lever A). 'file' = one job per eval file
  # (finest); 'area' = one job per `area` tag (coarser; fewer jobs at scale).
  # Flip this when by-file job startup overhead dominates — no other edits needed.
  - name: shardBy
    displayName: 'Shard granularity'
    type: string
    default: file
    values:
      - file
      - area

variables:
  - group: 'AzSDK_Eval_Variable_group'
  - name: vallyRoot
    value: 'tools/azsdk-cli/Azure.Sdk.Tools.Vally'
  - name: mockArtifact
    value: 'mcp-mock'

stages:
  # ---------------------------------------------------------------------------
  # Stage 0 — build once. Build the mock DLL a single time and publish it as a
  # pipeline artifact; every shard downloads it instead of rebuilding (the
  # single biggest efficiency win). Vally launches `dotnet <dll>`, never
  # `dotnet run`, to avoid the MSBuild boot race under parallel workers (#15947).
  # ---------------------------------------------------------------------------
  - stage: Build
    displayName: 'Build mock MCP (once)'
    jobs:
      - job: BuildMock
        displayName: 'Build + publish mock DLL'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            fetchDepth: 1

          - script: |
              dotnet build tools/azsdk-cli/Azure.Sdk.Tools.Mock -c Release -o artifacts/mcp/mock --nologo
            displayName: 'Build mock MCP server'

          - publish: '$(Build.SourcesDirectory)/artifacts/mcp/mock'
            artifact: '$(mockArtifact)'
            displayName: 'Publish mock DLL artifact'

  # ---------------------------------------------------------------------------
  # Stage 1 — detect. Vally has no `list` command, so discovery is a filesystem
  # glob of the hermetic suites; the script emits an Azure Pipelines matrix that
  # Stage 2 fans out over (one job per eval file).
  # ---------------------------------------------------------------------------
  - stage: Detect
    displayName: 'Detect eval shards'
    dependsOn: Build
    jobs:
      - job: Detect
        displayName: 'Glob eval files -> matrix'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            fetchDepth: 1

          - task: PowerShell@2
            name: detect
            displayName: 'Build fan-out matrix'
            inputs:
              pwsh: true
              filePath: '$(vallyRoot)/scripts/Get-EvalMatrix.ps1'
              arguments: >-
                -EvalRoot "$(Build.SourcesDirectory)/$(vallyRoot)"
                -ShardBy ${{ parameters.shardBy }}
                -OutputVariableName matrix

  # ---------------------------------------------------------------------------
  # Stage 2 — fan-out. One job per shard. Download the prebuilt mock DLL, install
  # the pinned Vally CLI, run `vally eval -e <file>`, publish that shard's JUnit.
  # continueOnError keeps a single red shard from aborting siblings; the rollup
  # lives in the Summarize stage (report-only in Phase 1).
  # ---------------------------------------------------------------------------
  - stage: Eval
    displayName: 'Run eval shards'
    dependsOn: Detect
    jobs:
      - job: RunShard
        displayName: 'Eval'
        pool:
          vmImage: 'ubuntu-latest'
        continueOnError: true
        strategy:
          matrix: $[ stageDependencies.Detect.Detect.outputs['detect.matrix'] ]
          maxParallel: 10
        steps:
          - checkout: self
            fetchDepth: 1

          - task: NodeTool@0
            displayName: 'Use Node.js 22'
            inputs:
              versionSpec: '22.x'

          - script: npm ci
            displayName: 'Install Vally CLI (pinned via lockfile)'
            workingDirectory: eng/skill-eval

          - script: npm install -g @github/copilot-sdk
            displayName: 'Install Copilot SDK'

          - download: current
            artifact: '$(mockArtifact)'
            displayName: 'Download mock DLL'

          - script: |
              mkdir -p "$(Build.SourcesDirectory)/artifacts/mcp/mock"
              cp -r "$(Pipeline.Workspace)/$(mockArtifact)/." "$(Build.SourcesDirectory)/artifacts/mcp/mock/"
            displayName: 'Stage mock DLL at expected path'

          # Prime the git worktree fixtures the eval suite declares. This scans
          # every eval's `environment.git` block, derives the unique (repo, ref)
          # set, and clones each into the repo-relative cache the fixtures point
          # at — Vally does NOT clone it ('git worktree add' needs the source on
          # disk). Without this, workflow shards die with
          # "cannot change to '.../artifacts/specs-cache/...'". Data-driven, so a
          # new fixture repo needs no edit here; a no-op for unit-only shards.
          - task: PowerShell@2
            displayName: 'Prime eval git fixtures (scan + clone)'
            inputs:
              pwsh: true
              filePath: '$(vallyRoot)/scripts/Prime-EvalGitFixtures.ps1'
              arguments: >-
                -EvalRoot "$(Build.SourcesDirectory)/$(vallyRoot)"

          - script: |
              npm exec --no --prefix "$(Build.SourcesDirectory)/eng/skill-eval" -- \
                vally eval $(evalArgs) --junit --threshold 0.8 --output-dir "$(Build.SourcesDirectory)/artifacts/vally-results/$(shardName)"
            displayName: 'vally eval $(shardName)'
            workingDirectory: '$(vallyRoot)'
            env:
              GITHUB_TOKEN: $(azuresdk-copilot-github-pat)

          - publish: '$(Build.SourcesDirectory)/artifacts/vally-results/$(shardName)'
            artifact: 'eval-result-$(shardName)'
            displayName: 'Publish $(shardName) results'
            condition: always()

  # ---------------------------------------------------------------------------
  # Stage 3 — summarize. Collect every shard's JUnit, publish the rollup, and
  # surface it. Phase 1 is report-only: the rollup is visible (Markdown summary
  # + Tests tab) but does not fail the build — see failTaskOnFailedTests below.
  # ---------------------------------------------------------------------------
  - stage: Summarize
    displayName: 'Summarize results'
    dependsOn: Eval
    condition: always()
    jobs:
      - job: Summarize
        displayName: 'Publish + gate rollup'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          # Download every shard's JUnit into a DEDICATED folder (not the job's
          # Pipeline.Workspace root, which also holds the repo checkout under `s/`).
          # Two things matter here:
          #   * itemPattern is matched per-artifact against the *bare* file path
          #     (the artifact name is NOT a path segment at match time), so the
          #     old `eval-result-*/**` matched nothing. Match the file itself.
          #   * Scope to `*.junit.xml` so non-JUnit XML (e.g. .NET doc XML from the
          #     mock DLL artifact) can never leak into the rollup as bogus shards.
          # Each artifact still downloads into its own `eval-result-<shard>/` folder
          # under targetPath, so the summary can recover the shard name from the path.
          - task: DownloadPipelineArtifact@2
            displayName: 'Download all shard results'
            inputs:
              buildType: 'current'
              itemPattern: '**/*.junit.xml'
              targetPath: '$(Pipeline.Workspace)/eval-results'

          - task: PowerShell@2
            displayName: 'Render Markdown rollup (build summary)'
            condition: always()
            inputs:
              pwsh: true
              filePath: '$(vallyRoot)/scripts/New-EvalSummary.ps1'
              arguments: >-
                -ResultsRoot "$(Pipeline.Workspace)/eval-results"
                -OutputPath "$(Build.ArtifactStagingDirectory)/eval-summary.md"

          # Always-visible copy of the rollup: the build-summary upload
          # (##vso[task.uploadsummary]) only shows on the Extensions tab, so also
          # publish the Markdown as a downloadable artifact that's reachable from
          # the run's Artifacts list regardless of where the summary surfaces.
          - publish: '$(Build.ArtifactStagingDirectory)/eval-summary.md'
            artifact: 'eval-summary'
            displayName: 'Publish eval-summary.md artifact'
            condition: always()

          - task: PublishTestResults@2
            displayName: 'Publish eval rollup'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(Pipeline.Workspace)/eval-results/**/*.junit.xml'
              mergeTestResults: true
              # Phase 1 = report-only. The remaining red is genuine eval signal
              # (the model not invoking a tool for some prompts), not harness
              # breakage — surface it in the rollup + Tests tab without blocking
              # the build. Flip back to `true` once the eval content is hardened
              # / flaky stimuli are quarantined (design Section 7, mitigation #4).
              failTaskOnFailedTests: false
              testRunTitle: 'Vally tool-scenario evals (mock vertical)'

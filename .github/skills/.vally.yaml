paths:
  evals:
    - skill-authoring/evals/
    - azsdk-common-pipeline-analysis/evals/
    - azsdk-common-pipeline-fixer/evals/
    - markdown-token-optimizer/evals/
    - sensei/evals/
    - azsdk-common-generate-sdk-locally/evals/
    - azsdk-common-sdk-release/evals/
    - azsdk-common-apiview-feedback-resolution/evals/
    - azsdk-common-prepare-release-plan/evals/
    - azsdk-common-eval-authoring-skill/evals/
    - azsdk-common-eval-authoring-tool/evals/
    - azsdk-common-eval-authoring-workflow/evals/
  results: results/
  evalFilenames: ["eval.yaml", "*.eval.yaml"]

environments:
  # Launch the pre-built DLLs via `dotnet <dll>`, NOT `dotnet run` — avoids the
  # MSBuild boot race under parallel workers. See issue #15948.
  # The DLLs are emitted to a TFM-agnostic path via `dotnet build -o`. CI
  # builds them in the 'Build MCP servers' step of skill-eval.yml; locally,
  # run `dotnet build ../../tools/azsdk-cli/Azure.Sdk.Tools.Cli  -c Debug -o ../../artifacts/mcp/cli`
  # (and `... .Mock ... -o ../../artifacts/mcp/mock`) from this directory.
  azsdk-mcp:
    mcpServers:
      azure-sdk-mcp:
        type: stdio
        command: dotnet
        args: ["../../artifacts/mcp/cli/azsdk.dll", "start"]
        timeout: "60s"
        env:
          AZSDKTOOLS_AGENT_TESTING: "true"
          AZSDKTOOLS_COLLECT_TELEMETRY: "false"
  azsdk-mcp-mock:
    mcpServers:
      azure-sdk-mcp:
        type: stdio
        command: dotnet
        args: ["../../artifacts/mcp/mock/azsdk-mock.dll"]
        timeout: "60s"

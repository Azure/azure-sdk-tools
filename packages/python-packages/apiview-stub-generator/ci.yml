# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
      - main
      - feature/*
      - release/*
      - hotfix/*
  paths:
    include:
      - packages/python-packages/apiview-stub-generator

pr:
  branches:
    include:
      - main
      - feature/*
      - release/*
      - hotfix/*
  paths:
    include:
      - packages/python-packages/apiview-stub-generator

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-tool-python.yml
  parameters:
    PythonVersion: '3.10'
    PackagePath: 'packages/python-packages/apiview-stub-generator'
    FeedName: 'public/azure-sdk-for-python'
    ArtifactName: 'apiviewparserpython'
    PackageName: 'Python API View Parser'
    TestSteps:
    - script: |
        python $(Build.SourcesDirectory)/eng/scripts/python_version_check.py
      displayName: 'Verify Python APIView version consistency'

    - task: UsePythonVersion@0
      displayName: 'Install Python 3.9'
      inputs:
        versionSpec: '3.9.x'
    - task: UsePythonVersion@0
      displayName: 'Install Python 3.10'
      inputs:
        versionSpec: '3.10.x'
    - task: UsePythonVersion@0
      displayName: 'Install Python 3.11'
      inputs:
        versionSpec: '3.11.x'
    - task: UsePythonVersion@0
      displayName: 'Install Python 3.12'
      inputs:
        versionSpec: '3.12.x'
    - task: UsePythonVersion@0
      displayName: 'Install Python 3.13'
      inputs:
        versionSpec: '3.13.x'
    - task: UsePythonVersion@0
      displayName: 'Install Python 3.14'
      inputs:
        versionSpec: '3.14.x'
    - script: |
        cd $(Build.SourcesDirectory)/packages/python-packages/apiview-stub-generator
        python -m pip install tox
        tox -p auto -e py39-pytest,py310-pytest,py311-pytest,py312-pytest,py313-pytest,py314-pytest,stubgen
      displayName: 'Run APIView tests (all Python versions in parallel)'

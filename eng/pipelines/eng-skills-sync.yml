# Mirror shared skills to all subscribed repos.
#
# Shared skills use a azsdk-common- directory prefix and live in .github/skills/
# in azure-sdk-tools. Only azsdk-common-* directories are synced to target repos.
# Repo-specific skills in .github/skills/<name>/ are not affected by this sync.
#
# For more information on this file, please see:
# doc/common/common_engsys.md
parameters:
- name: DirectoryToSync
  type: string
  default: .github/skills
- name: FilePatterns
  type: object
  default:
    - 'azsdk-common-*'
- name: Repos
  type: object
  default:
    - azure-sdk
    - azure-sdk-for-ios
    - azure-sdk-for-android
    - azure-sdk-for-c
    - azure-sdk-for-cpp
    - azure-sdk-for-go
    - azure-sdk-for-java
    - azure-sdk-for-js
    - azure-sdk-for-net
    - azure-sdk-for-python
    - azure-sdk-for-rust
    - azure-rest-api-specs

trigger: none

pr:
  branches:
    include:
      - main
  paths:
    include:
      - .github/skills/azsdk-common-*

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-tool-repo-sync.yml
  parameters:
    DirectoryToSync: ${{ parameters.DirectoryToSync }}
    FilePatterns: ${{ parameters.FilePatterns }}
    Repos: ${{ parameters.Repos }}

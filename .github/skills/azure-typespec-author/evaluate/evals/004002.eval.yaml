name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability               # capability | regression

# Root-level environment
environment: azsdk-mcp

# Execution configuration
config:
  runs: 1                      # Trials per stimulus
  timeout: 1800                # Seconds per trial
  model: claude-opus-4.6    #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk        # Which executor to use

# Test cases
stimuli:
- prompt: |
    I have a property `assets: string[]` in EmployeeProperties. Add @minLength(3) @maxLength(10) constraints for any item of the assets array.
  name: 004002-decorate-length-constrains-on-array-item
  constraints:
    max_turns: 10
    max_tokens: 5000
  environment:
    files:
    - src: ../fixtures/004002-decorate-length-constrains-on-array-item/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/004002-decorate-length-constrains-on-array-item/main.tsp
      dest: main.tsp
    - src: ../fixtures/004002-decorate-length-constrains-on-array-item/package.json
      dest: package.json
    - src: ../fixtures/004002-decorate-length-constrains-on-array-item/readme.md
      dest: readme.md
    - src: ../fixtures/004002-decorate-length-constrains-on-array-item/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/004002-decorate-length-constrains-on-array-item/tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azure-sdk-mcp-azsdk_typespec_generate_authoring_plan
        - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: skill-invocation
    config:
      required:
        - azure-typespec-author
  - type: file-matches
    config:
      path: employee.tsp
      pattern: 'scalar.*extends string'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@minLength\(3\)'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@maxLength\(10\)'
  # VP2: Assets array uses custom scalar type instead of plain string
  - type: file-not-matches
    config:
      path: employee.tsp
      pattern: 'assets:\s*string\[\]'
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: 'Verify asset use the custom scalar type with minLength and maxLength constraints instead of plain string.'
      model: claude-opus-4.6
scoring:
  weights:
    tool-calls: 1
    skill-invocation: 1
    prompt: 1
    file-matches: 4
  threshold: 1.0

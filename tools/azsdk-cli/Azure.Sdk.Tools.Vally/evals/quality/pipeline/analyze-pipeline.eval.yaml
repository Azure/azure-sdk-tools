name: azsdk-mcp-tool-quality
description: |
  Output-quality eval for the azsdk-common-pipeline-troubleshooting skill.
  The agent is given only a failed build reference; it must call
  azsdk_analyze_pipeline (the mock returns the canonical fixture
  failure — the Storage QueueClientOptions / ShareClientOptions
  TryGetServiceVersion parser missing the two newest "2026-10-06" and
  "2026-12-06" service versions) and produce a correct, actionable
  root-cause analysis.
version: "1.0"
type: capability

environment: azsdk-mcp-mock

tags:
  area: pipeline

config:
  runs: 1
  timeout: 5m
  model: gpt-5.4
  executor: copilot-sdk

stimuli:
  - name: analyze-version-parser-bug
    prompt: |
      My .NET SDK pipeline failed for Azure DevOps build 6455504 in the
      internal project. Analyze the run.
    constraints:
      max_turns: 6
      max_tokens: 8000
    graders:
      - type: completed
      - type: tool-calls
        config:
          required:
            - name: azsdk_analyze_pipeline
      - type: output-contains
        config:
          substring: "QueueClientOptions"
      - type: output-matches
        config:
          pattern: "(?i)(code bug|logic|test failure|parse|service version)"
      - type: output-not-matches
        config:
          pattern: "(?i)(re-?record|missing recording|retry the pipeline|service outage)"
      - type: prompt
        config:
          model: gpt-5.4
          scoring: binary
          threshold: 1.0
          prompt: |
            Build 6455504 failed
            (TryGetServiceVersion_ParsesAllServiceVersions) because
            TryGetServiceVersion failed to parse the two newest service
            versions "2026-10-06" (V2026_10_06) and "2026-12-06"
            (V2026_12_06) — newly added service versions that were not
            wired into the parser. Does the response (a) identify this
            as a code bug in the QueueClientOptions / ShareClientOptions
            service-version parsing, and (b) recommend updating
            TryGetServiceVersion rather than re-recording or retrying the
            pipeline? Base the grade only on whether the response meets the
            criteria above; the agent is not required to output the literal
            words "pass" or "fail".

scoring:
  weights:
    tool-calls: 1
    output-contains: 1
    output-matches: 1
    output-not-matches: 1
    prompt: 1
  threshold: 1.0

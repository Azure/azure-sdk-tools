# Mirror selected files and sub-directories in the .github directory to all subscribed repos
#
# For more information on this file, please see:
# doc/common/common_engsys.md
parameters:
- name: DirectoryToSync
  type: string
  default: .github
  # Remember to update the path includes below as well as the eng-common-workflow-enforcer.yml file if you update this list
- name: FilePatterns
  type: object
  default:
    # Workflows
    - 'workflows/*event*'
    - 'workflows/post-apiview.yml'
    - 'workflows/protected-files.yml'
    # Skills
    # Shared skills use an azsdk-common- directory prefix and live in .github/skills/
    # in azure-sdk-tools. Only azsdk-common-* directories are synced to target repos.
    # Repo-specific skills in .github/skills/<name>/ are not affected by this sync.
    - 'skills/azsdk-common-*'
- name: Repos
  type: object
  default:
    - azure-sdk
    - azure-sdk-for-android
    - azure-sdk-for-c
    - azure-sdk-for-cpp
    - azure-sdk-for-go
    - azure-sdk-for-ios
    - azure-sdk-for-java
    - azure-sdk-for-js
    - azure-sdk-for-net
    - azure-sdk-for-python
    - azure-sdk-for-rust
    # TODO: Re-enable syncing to specs repo after we standardize on workflow linting/naming
    # - azure-rest-api-specs

trigger: none

pr:
  branches:
    include:
      - main
  paths:
    include:
      # Workflows
      - .github/workflows/*event*
      - .github/workflows/post-apiview.yml
      # Skills
      - .github/skills/azsdk-common-*/**

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-tool-repo-sync.yml
  parameters:
    DirectoryToSync: ${{ parameters.DirectoryToSync }}
    FilePatterns: ${{ parameters.FilePatterns }}
    Repos: ${{ parameters.Repos }}

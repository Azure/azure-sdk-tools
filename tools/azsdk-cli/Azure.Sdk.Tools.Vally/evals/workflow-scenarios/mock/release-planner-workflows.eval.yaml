name: azsdk-mcp-tool-scenarios
description: |
  Mock-environment workflow scenarios derived from the release-planner
  replacement test plan (#15835). Each stimulus mirrors one of the four
  high-level scenarios that release-planner-dashboard must hand off to the
  agent:

    1. Create a release plan (private preview / public preview / GA)
    2. Generate SDK for all languages in an existing release plan
    3. Link a different spec PR to an existing release plan
    4. Update SDK details (package names) in a release plan

  Plus an end-to-end "create + generate" flow used as the headline demo
  prompt.

  Bound to the mock MCP — these graders only inspect skill routing and tool
  selection, not real DevOps writes. The full live e2e flow lives in
  evals/workflow-scenarios/live/release-planner.eval.yaml.

version: "1.0"
type: capability

tags:
  area: release-plan

environment: azsdk-mcp-mock

config:
  runs: 1
  timeout: 30m
  model: gpt-5.4
  executor: copilot-sdk

stimuli:
  # --- Scenario 1: Create release plan ---------------------------------
  - name: create-public-preview-release-plan
    # Spec-repo worktree fixture: defined once here and aliased by the stimuli
    # below. CI clones it via eng/common/scripts/eval/init-eval-git-fixtures.js before this suite.
    environment: &specsWorktree
      # Load the real release-planning skill so the executor can route to it.
      # Path is relative to this eval file (6 levels up = repo root).
      skills:
        - ../../../../../../.github/skills/azsdk-common-prepare-release-plan
      git:
        type: worktree
        source: ../../../../../../artifacts/specs-cache/azure-rest-api-specs
        ref: main
    prompt: |
      Create a public preview
      release plan for the Contoso Widget Manager. Here is all the context
      you need:
        - TypeSpec project: "specification/contosowidgetmanager/Contoso.WidgetManager"
        - service tree ID: "a7f2b8e4-9c1d-4a3e-b6f9-2d8e5a7c3b1f"
        - product tree ID: "f1a8c5d2-6e4b-4f7a-9c2d-8b5e1f3a6c9e"
        - target release timeline: "June 2026"
        - API version: "2022-11-01-preview"
        - SDK release type: "beta"
        - spec pull request: "https://github.com/Azure/azure-rest-api-specs/pull/38387"
      My setup has already been verified, do not run azsdk_verify_setup.
    constraints:
      max_turns: 6
      max_tokens: 8000
    graders:
      - type: skill-invocation
        config:
          required:
            - azsdk-common-prepare-release-plan
      - type: tool-calls
        config:
          required:
            - azsdk_get_release_plan
            - azsdk_create_release_plan
          disallowed:
            - azsdk_verify_setup

  # --- End-to-end demo prompt: create + generate -----------------------
  - name: create-release-plan-and-generate-sdk
    environment: *specsWorktree
    prompt: |
      Walk me through creating
      a release plan and then generating SDK for the Contoso Widget Manager:
        - TypeSpec project: "specification/contosowidgetmanager/Contoso.WidgetManager"
        - API release type: "Public Preview"
        - service tree ID: "a7f2b8e4-9c1d-4a3e-b6f9-2d8e5a7c3b1f"
        - product tree ID: "f1a8c5d2-6e4b-4f7a-9c2d-8b5e1f3a6c9e"
        - target release timeline: "June 2026"
        - API version: "2022-11-01-preview"
        - SDK release type: "beta"
        - spec pull request: "https://github.com/Azure/azure-rest-api-specs/pull/38387"
      After the release plan is created, generate SDK for all languages
      using the work-item ID from the created release plan.
      My setup has already been verified, do not run azsdk_verify_setup.
    constraints:
      max_turns: 12
      max_tokens: 16000
    # TODO: assert ordering create -> get -> generate
    #   — blocked on Vally tool-calls grader sequence: support.
    graders:
      - type: skill-invocation
        config:
          required:
            - azsdk-common-prepare-release-plan
          # generate half uses azsdk_run_generate_sdk (a release-planner pipeline
          # tool); azsdk-common-generate-sdk-locally over-matches "generate" —
          # see https://github.com/Azure/azure-sdk-tools/issues/15950.
          disallowed:
            - azsdk-common-generate-sdk-locally
      - type: tool-calls
        config:
          required:
            - azsdk_get_release_plan
            - azsdk_create_release_plan
            - azsdk_run_generate_sdk
          disallowed:
            - azsdk_verify_setup

  # --- Scenario 2: Generate SDK for an existing release plan -----------
  - name: generate-sdk-for-existing-release-plan
    environment: *specsWorktree
    prompt: |
      Using the release-planner
      flow, generate SDK for all languages for the Contoso Widget Manager
      release plan. Here is the context you need:
        - release plan work item ID: "29262"
        - TypeSpec project: "specification/contosowidgetmanager/Contoso.WidgetManager"
      My setup has already been verified, do not run azsdk_verify_setup.
    constraints:
      max_turns: 8
      max_tokens: 10000
    graders:
      - type: skill-invocation
        config:
          required:
            - azsdk-common-prepare-release-plan
          # azsdk_run_generate_sdk is a release-planner pipeline tool; the
          # generate-sdk-locally skill over-matches "generate" — see
          # https://github.com/Azure/azure-sdk-tools/issues/15950.
          disallowed:
            - azsdk-common-generate-sdk-locally
      - type: tool-calls
        config:
          required:
            - azsdk_get_release_plan
            - azsdk_run_generate_sdk
          disallowed:
            - azsdk_verify_setup
            - azsdk_create_release_plan

  # --- Scenario 3: Link a different spec PR to an existing release plan
  - name: link-different-spec-pr-to-release-plan
    environment: *specsWorktree
    prompt: |
      Using the release-planner
      flow, update the API spec pull request on an existing Contoso Widget
      Manager release plan. Here is the context you need:
        - release plan work item ID: "29262"
        - new spec pull request: "https://github.com/Azure/azure-rest-api-specs/pull/38500"
      My setup has already been verified, do not run azsdk_verify_setup.
    constraints:
      max_turns: 6
      max_tokens: 8000
    graders:
      - type: skill-invocation
        config:
          required:
            - azsdk-common-prepare-release-plan
      - type: tool-calls
        config:
          required:
            - azsdk_get_release_plan
            - azsdk_update_api_spec_pull_request_in_release_plan
          disallowed:
            - azsdk_verify_setup
            - azsdk_create_release_plan

  # --- Scenario 4: Update SDK details (package names) ------------------
  - name: update-sdk-details-in-release-plan
    environment: *specsWorktree
    prompt: |
      Using the release-planner
      flow, refresh the SDK package-name details on an existing Contoso
      Widget Manager release plan from the on-disk TypeSpec emitter
      configuration. Here is the context you need:
        - release plan work item ID: "29262"
        - TypeSpec project: "specification/contosowidgetmanager/Contoso.WidgetManager"
        - tspconfig path: "specification/contosowidgetmanager/Contoso.WidgetManager/tspconfig.yaml"
      My setup has already been verified, do not run azsdk_verify_setup.
    constraints:
      max_turns: 8
      max_tokens: 10000
    graders:
      - type: skill-invocation
        config:
          required:
            - azsdk-common-prepare-release-plan
      - type: tool-calls
        config:
          required:
            - azsdk_get_release_plan
            - azsdk_update_sdk_details_in_release_plan
          disallowed:
            - azsdk_verify_setup
            - azsdk_create_release_plan

  # --- Scenario 5: Generate SDK for all languages + link to release plan (issue #16072)
  # Regression for https://github.com/Azure/azure-sdk-tools/issues/16072. A natural
  # "Generate SDK for all languages ... and link SDK pull requests to the release plan"
  # prompt (without the explicit "release-planner flow" hint) previously routed to
  # azsdk_get_sdk_pull_request_link instead of running generation. The correct path is
  # azsdk_get_release_plan -> azsdk_run_generate_sdk. The generate-sdk-locally skill may
  # be invoked as long as it redirects to azsdk_run_generate_sdk.
  # NOTE: this prompt explicitly asks to *link* SDK PRs, so retrieving PR links
  # (azsdk_get_sdk_pull_request_link / azsdk_get_pull_request) is legitimate here and is
  # NOT disallowed. The "must not substitute PR-link tools for generation" assertion is
  # enforced by the generation-only stimulus below.
  - name: generate-sdk-all-languages-link-release-plan
    environment: &specsWorktreeWithGenerate
      skills:
        - ../../../../../../.github/skills/azsdk-common-prepare-release-plan
        - ../../../../../../.github/skills/azsdk-common-generate-sdk-locally
      git:
        type: worktree
        source: ../../../../../../artifacts/specs-cache/azure-rest-api-specs
        ref: main
    prompt: |
      Generate SDK for all languages from my TypeSpec project
      specification/contosowidgetmanager/Contoso.WidgetManager and link the SDK
      pull requests to the release plan. Here is the context you need:
        - release plan work item ID: "29262"
      My environment is already set up, so there's no need to re-verify it.
    constraints:
      max_turns: 8
      max_tokens: 12000
    graders:
      - type: skill-invocation
        config:
          required:
            - azsdk-common-prepare-release-plan
      - type: tool-calls
        config:
          required:
            - azsdk_get_release_plan
            - azsdk_run_generate_sdk
          disallowed:
            - azsdk_verify_setup

  # --- Scenario 6: Vague "generate SDK for all languages" must not grab PR-link tool
  # Second regression prompt from issue #16072. With minimal context the agent must head
  # toward pipeline generation (or ask for the missing release plan) and must never
  # substitute azsdk_get_sdk_pull_request_link / azsdk_get_pull_request for generation.
  - name: generate-sdk-all-languages-no-wrong-pr-tool
    environment: *specsWorktreeWithGenerate
    prompt: |
      Generate SDK for all languages from my TypeSpec project
      specification/contosowidgetmanager/Contoso.WidgetManager.
      My environment is already set up, so there's no need to re-verify it.
    constraints:
      max_turns: 6
      max_tokens: 10000
    graders:
      - type: tool-calls
        config:
          disallowed:
            - azsdk_get_sdk_pull_request_link
            - azsdk_get_pull_request
            - azsdk_verify_setup

  # --- Scenario 7: Pipeline SDK generation skill routing (issue #16226)
  # Regression for https://github.com/Azure/azure-sdk-tools/issues/16226. The prompt
  # "Run SDK generation for all languages for release <id>" previously routed to the
  # wrong tools (azsdk_release_sdk, azsdk_get_pipeline_llm_artifacts,
  # azsdk_get_service_details_by_typespec_path) and never reached azsdk_run_generate_sdk.
  # The dedicated azsdk-common-generate-sdk-pipeline skill routes such prompts to the
  # pipeline path: azsdk_get_release_plan -> azsdk_run_generate_sdk (once per language).
  # The competing generate-sdk-locally and sdk-release skills are loaded too so the
  # routing choice is real; neither should be invoked and azsdk_release_sdk (which
  # publishes, not generates) must never be called.
  - name: run-sdk-generation-all-languages-for-release-pipeline-skill
    environment: &bothGenerateSkills
      skills:
        - ../../../../../../.github/skills/azsdk-common-generate-sdk-pipeline
        - ../../../../../../.github/skills/azsdk-common-generate-sdk-locally
        - ../../../../../../.github/skills/azsdk-common-sdk-release
      git:
        type: worktree
        source: ../../../../../../artifacts/specs-cache/azure-rest-api-specs
        ref: main
    prompt: |
      Run SDK generation for all languages for release 29262. My TypeSpec project is
      specification/contosowidgetmanager/Contoso.WidgetManager.
      My environment is already set up, so there's no need to re-verify it.
    constraints:
      max_turns: 8
      max_tokens: 12000
    graders:
      - type: skill-invocation
        config:
          required:
            - azsdk-common-generate-sdk-pipeline
          disallowed:
            - azsdk-common-generate-sdk-locally
            - azsdk-common-sdk-release
      - type: tool-calls
        config:
          required:
            - azsdk_get_release_plan
            - azsdk_run_generate_sdk
          disallowed:
            - azsdk_release_sdk
            - azsdk_get_pipeline_llm_artifacts
            - azsdk_get_service_details_by_typespec_path
            - azsdk_verify_setup

  # --- Scenario 8: LOCAL routing must NOT cross to the pipeline (#16226)
  # Counterpart to scenario 7: a clearly-local single-language request must route
  # to the local skill and never call the pipeline tool. Both generate skills are
  # loaded (via &bothGenerateSkills) so the local-vs-pipeline choice is contested.
  - name: local-single-language-routes-to-local
    environment: *bothGenerateSkills
    prompt: |
      I have the azure-rest-api-specs repo cloned locally. Generate the Python SDK
      for the Contoso Widget Manager from
      specification/contosowidgetmanager/Contoso.WidgetManager/tspconfig.yaml, then
      build it and run the checks locally.
      My environment is already set up, so there's no need to re-verify it.
    constraints:
      max_turns: 8
      max_tokens: 12000
    graders:
      - type: skill-invocation
        config:
          required:
            - azsdk-common-generate-sdk-locally
          disallowed:
            - azsdk-common-generate-sdk-pipeline
      - type: tool-calls
        config:
          required:
            - azsdk_package_generate_code
          disallowed:
            - azsdk_run_generate_sdk
            - azsdk_release_sdk

  # --- Scenario 9: LOCAL routing on a build-failure / fix request (#16226)
  - name: local-build-fix-routes-to-local
    environment: *bothGenerateSkills
    prompt: |
      My local Java SDK build for the Contoso Widget Manager is failing after I
      regenerated it. Regenerate and build it again from
      specification/contosowidgetmanager/Contoso.WidgetManager/tspconfig.yaml and
      fix the build errors.
      My environment is already set up, so there's no need to re-verify it.
    constraints:
      max_turns: 8
      max_tokens: 12000
    graders:
      - type: skill-invocation
        config:
          required:
            - azsdk-common-generate-sdk-locally
          disallowed:
            - azsdk-common-generate-sdk-pipeline
      - type: tool-calls
        config:
          disallowed:
            - azsdk_run_generate_sdk
            - azsdk_release_sdk

  # --- Scenario 10: PIPELINE routing via "no clone / open the PRs" phrasing (#16226)
  - name: pipeline-release-plan-open-prs-routes-to-pipeline
    environment: *bothGenerateSkills
    prompt: |
      I don't have any SDK repos cloned. Generate the SDK for the Contoso Widget
      Manager release plan (work item 29262) and open the SDK pull requests for me.
      My environment is already set up, so there's no need to re-verify it.
    constraints:
      max_turns: 8
      max_tokens: 12000
    graders:
      - type: skill-invocation
        config:
          required:
            - azsdk-common-generate-sdk-pipeline
          disallowed:
            - azsdk-common-generate-sdk-locally
      - type: tool-calls
        config:
          required:
            - azsdk_run_generate_sdk
          disallowed:
            - azsdk_release_sdk
            - azsdk_package_generate_code
            - azsdk_verify_setup

scoring:
  weights:
    skill-invocation: 1
    tool-calls: 1
  threshold: 1.0

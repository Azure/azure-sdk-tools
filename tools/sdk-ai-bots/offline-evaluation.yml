trigger:
  branches:
    include:
      - main
  paths:
    include:
      - tools/sdk-ai-bots/azure-sdk-qa-bot-agent/**/*.py

pr:
  branches:
    include:
      - main
  paths:
    include:
      - tools/sdk-ai-bots/azure-sdk-qa-bot-agent/**/*.py

# Offline (PR-gate) evaluation.
#
# Starts the agent server.py locally, then evaluates via completion mode:
# evals_run.py calls the local /completion endpoint concurrently, collects answers,
# and grades them inline with the Foundry builtin LLM evaluators.
extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    Use1ESOfficial: false
    stages:
      - stage: 'evaluation'
        variables:
          - template: /eng/pipelines/templates/variables/globals.yml
          - template: /eng/pipelines/templates/variables/image.yml
        pool:
              name: $(LINUXPOOL)
              image: $(LINUXVMIMAGE)
              os: linux
        jobs:
          - job: 'evaluation'
            displayName: 'evaluation'
            strategy:
              maxParallel: 2
              matrix:
                typespec:
                  scenario: typespec
                onboarding:
                  scenario: onboarding
                python:
                  scenario: python
                apispec:
                  scenario: apispec
            steps:
              - task: UsePythonVersion@0
                displayName: "Use Python 3.12"
                inputs:
                  versionSpec: '3.12'
              - script: |
                  python --version
                displayName: 'check python'
              - task: AzureCLI@2
                displayName: 'start agent server'
                inputs:
                  azureSubscription: 'azuresdkqabot-dev'
                  addSpnToEnvironment: true
                  scriptType: bash
                  scriptLocation: inlineScript
                  workingDirectory: $(Build.SourcesDirectory)/tools/sdk-ai-bots/azure-sdk-qa-bot-agent
                  inlineScript: |
                    pip install --pre -r requirements.txt
                    export AZURE_CLIENT_ID=$servicePrincipalId
                    export AZURE_TENANT_ID=$tenantId
                    nohup python server.py </dev/null >/dev/null 2>&1 &
                    sleep 20
                    lsof -ti:8089
                env:
                  SYSTEM_ACCESSTOKEN: $(System.AccessToken)
                  AZURESUBSCRIPTION_SERVICE_CONNECTION_ID: $(AZURESUBSCRIPTION_SERVICE_CONNECTION_ID)
                  AZURE_APPCONFIG_ENDPOINT: $(AZURE_APPCONFIG_ENDPOINT)
              - script: |
                  pip install -r requirements.txt
                displayName: 'install requirements'
                workingDirectory: $(Build.SourcesDirectory)/tools/sdk-ai-bots/azure-sdk-qa-bot-evaluation
              - task: AzureCLI@2
                displayName: 'Run Evals ($(scenario))'
                inputs:
                  azureSubscription: 'azuresdkqabot-dev'
                  scriptType: bash
                  scriptLocation: inlineScript
                  workingDirectory: $(Build.SourcesDirectory)/tools/sdk-ai-bots/azure-sdk-qa-bot-evaluation
                  inlineScript: |
                    python evals_run.py \
                      --dataset "qa-bot-basic-$(scenario):latest" \
                      --evaluation_name_prefix $(Build.BuildId) \
                      --max_concurrency 8 \
                      --baseline_check True \
                      --cache_result full
                env:
                  SYSTEM_ACCESSTOKEN: $(System.AccessToken)
                  AZURE_AI_PROJECT_ENDPOINT: $(AZURE_AI_PROJECT_ENDPOINT)
                  AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
                  AZURE_EVALUATION_MODEL_NAME: $(AZURE_EVALUATION_MODEL_NAME)
                  STORAGE_BLOB_ACCOUNT: $(STORAGE_BLOB_ACCOUNT)
                  BOT_CONFIG_CONTAINER: $(BOT_CONFIG_CONTAINER)
                  BOT_CONFIG_CHANNEL_BLOB: $(BOT_CONFIG_CHANNEL_BLOB)
                  EVALUATE_THRESHOLD: $(EVALUATE_THRESHOLD)
            templateContext:
              outputs:
                - output: pipelineArtifact
                  path: $(Build.SourcesDirectory)/tools/sdk-ai-bots/azure-sdk-qa-bot-evaluation/cache
                  artifact: evaluation-results-$(scenario)
                  displayName: Publish Evaluation Results Artifact ($(scenario))
                  condition: always()

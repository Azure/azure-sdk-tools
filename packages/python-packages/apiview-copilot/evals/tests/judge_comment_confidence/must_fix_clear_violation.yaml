  ## Don't use 'Client' suffix on non-client types

  DO NOT append 'Client' to types that are not service clients.

  ### BAD Examples

  ```python
  class WidgetResponseClient:
      ...
  ```

  ### GOOD Examples

  ```python
  class WidgetResponse:
      ...
  ```

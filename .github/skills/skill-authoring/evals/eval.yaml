name: skill-authoring-evals
description: Evaluations for the skill authoring guide
skill: skill-authoring
config:
  timeout: 60
graders:
- type: regex
  name: no_fatal_errors
  config:
    must_not_match:
    - (?i)fatal error
    - (?i)unhandled exception
    - '(?i)panic:'
tasks:
  - "tasks/*.yaml"

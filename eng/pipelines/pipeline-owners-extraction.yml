# Configure notifications in Azure DevOps
trigger: none

pr: none

parameters:
  - name: AuditCodeowners
    displayName: 'Audit CODEOWNERS'
    type: boolean
    default: false

  - name: CodeownerTargetRepos
    type: object
    default:
      - Name: azure-sdk-for-net
        SetUp:
          - task: UseDotNet@2
            # .NET 10 is required by Azure SDK for .NET engsys tooling
            inputs:
              version: 10.0.x

stages:
- stage: BuildTeamCache
  variables:
  - template: ./templates/variables/globals.yml

  jobs:
  - job: Run
    timeoutInMinutes: 120
    pool:
      name: azsdk-pool
      demands: ImageOverride -equals ubuntu-24.04

    variables:
      Organization: azure-sdk
      Project: internal
      DotNetDevOpsFeed: "https://pkgs.dev.azure.com/azure-sdk/public/_packaging/azure-sdk-for-net/nuget/v3/index.json"
      OutputPath: '$(Agent.BuildDirectory)/pipelineOwners.json'
      CacheOutputDirectory: '$(Build.ArtifactStagingDirectory)/github-team-user-store-cache'
      RepoListFile: "$(Build.SourcesDirectory)/tools/github/data/repositories.txt"

    steps:
      - template: /eng/pipelines/templates/steps/install-dotnet.yml

      - task: AzureCLI@2
        displayName: 'Generate cache files'
        inputs:
          azureSubscription: 'opensource-api-connection'
          scriptType: pscore
          scriptLocation: inlineScript
          inlineScript: |
            New-Item -ItemType Directory -Force -Path "$(CacheOutputDirectory)" | Out-Null
            dotnet run -- --outputDirectory "$(CacheOutputDirectory)" -rlFile "$(RepoListFile)"
          workingDirectory: tools/github-team-user-store/GitHubTeamUserStore/GitHubTeamUserStore

      - task: AzureCLI@2
        displayName: 'Upload cache files to storage'
        inputs:
          azureSubscription: 'Azure SDK Artifacts'
          scriptType: pscore
          scriptLocation: inlineScript
          inlineScript: |
            az storage blob upload-batch `
              --account-name azuresdkartifacts `
              --source "$(CacheOutputDirectory)" `
              --destination 'azure-sdk-write-teams' `
              --auth-mode login `
              --overwrite true

      - publish: $(CacheOutputDirectory)
        displayName: Publish cache files artifact
        artifact: github-team-user-store-cache
        condition: succeededOrFailed()

      - ${{ if or(parameters.AuditCodeowners, eq(variables['Build.Reason'], 'Schedule')) }}:
        - template: /eng/common/pipelines/templates/steps/install-azsdk-cli.yml

        - task: AzureCLI@2
          displayName: Audit CODEOWNERS
          inputs:
            azureSubscription: 'opensource-api-connection'
            scriptType: pscore
            scriptLocation: inlineScript
            inlineScript: |
              & $env:AZSDK config codeowners audit --fix
            workingDirectory: tools/azsdk-cli/Azure.Sdk.Tools.Cli

      - task: DotNetCoreCLI@2
        displayName: 'Install Pipeline Owners Extractor'
        inputs:
          command: custom
          custom: 'tool'
          arguments: 'install --global --add-source "$(DotNetDevOpsFeed)" --version "$(PipelineOwnersExtractorVersion)" "Azure.Sdk.Tools.PipelineOwnersExtractor"'
          workingDirectory: '$(Agent.BuildDirectory)'
      - task: AzureCLI@2
        displayName: Run Pipeline Owners Extractor
        inputs:
          azureSubscription: 'opensource-api-connection'
          scriptType: pscore
          scriptLocation: inlineScript
          inlineScript: pipeline-owners-extractor --output "$(OutputPath)"
      - publish: $(OutputPath)
        displayName: Publish pipelineOwners artifact
        artifact: pipelineOwners
        condition: succeededOrFailed()

- stage: GenerateCodeowners
  dependsOn: BuildTeamCache
  variables:
    - template: /eng/pipelines/templates/variables/image.yml

  jobs:
    - job: UpdateCodeownersFiles
      pool:
        name: $(LINUXPOOL)
        demands: ImageOverride -equals $(LINUXVMIMAGE)

      variables:
        PRBranchName: "automation/codeowners-update"

      steps:
        - checkout: self

        - template: /eng/common/pipelines/templates/steps/install-azsdk-cli.yml

        - template: /eng/common/pipelines/templates/steps/login-to-github.yml

        - ${{ each repo in parameters.CodeownerTargetRepos }}:

          - ${{ each item in repo.SetUp }}:
            - ${{ item }}

          - pwsh: |
              git clone --depth=1 "https://github.com/Azure/${{ repo.Name }}.git" ${{ repo.Name }}
            displayName: Clone ${{ repo.Name }}
            workingDirectory: $(Build.SourcesDirectory)

          - pwsh: git checkout -b "$(PRBranchName)"
            displayName: "Create $(PRBranchName) branch for ${{ repo.Name }}"
            workingDirectory: "$(Build.SourcesDirectory)/${{ repo.Name }}"

          - task: AzureCLI@2
            displayName: "Update CODEOWNERS for ${{ repo.Name }}"
            inputs:
              azureSubscription: 'opensource-api-connection'
              scriptType: pscore
              scriptLocation: inlineScript
              inlineScript: |
                & "$(AZSDK)" config codeowners generate `
                  --repo-root "$(Build.SourcesDirectory)/${{ repo.Name }}" `
                  --package-types client `
                  --package-types compat `
                  --package-types data `
                  --package-types functions `
                  --package-types datamovement `
                  --section "Client Libraries"
            env:
              # Explicit mapping required for secrets
              GH_TOKEN: $(GH_TOKEN)

          - task: AzureCLI@2
            displayName: "Export Client Libraries section for ${{ repo.Name }}"
            inputs:
              azureSubscription: 'opensource-api-connection'
              scriptType: pscore
              scriptLocation: inlineScript
              inlineScript: |
                & "$(AZSDK)" config codeowners export-section `
                  --codeowners-path "$(Build.SourcesDirectory)/${{ repo.Name }}/.github/CODEOWNERS" `
                  --section "Client Libraries" `
                  --output-file "$(Agent.TempDirectory)/${{ repo.Name }}-CODEOWNERS.cache"

          - task: AzureCLI@2
            displayName: "Upload CODEOWNERS cache for ${{ repo.Name }}"
            inputs:
              azureSubscription: 'Azure SDK Artifacts'
              scriptType: pscore
              scriptLocation: inlineScript
              inlineScript: |
                az storage blob upload `
                  --account-name azuresdkartifacts `
                  --container-name azure-sdk-write-teams `
                  --name "cache/azure/${{ repo.Name }}/CODEOWNERS.cache" `
                  --file "$(Agent.TempDirectory)/${{ repo.Name }}-CODEOWNERS.cache" `
                  --overwrite true `
                  --auth-mode login

          - template: /eng/common/pipelines/templates/steps/create-pull-request.yml
            parameters:
              WorkingDirectory: "$(Build.SourcesDirectory)/${{ repo.Name }}"
              BaseBranchName: main
              PRBranchName: "$(PRBranchName)"
              PROwner: Azure
              RepoName: ${{ repo.Name }}
              PushArgs: '-f'
              CommitMsg: "[CODEOWNERS] Automated CODEOWNERS update for ${{ repo.Name }}"
              PRTitle: '[CODEOWNERS] Automated CODEOWNERS Update'
              PRBody: |
                Updating CODEOWNERS

                This was run in $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)

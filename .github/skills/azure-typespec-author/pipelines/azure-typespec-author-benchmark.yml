# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.
trigger: none
pr: none

parameters:
- name: PythonVersion
  type: string
  default: '3.10'
- name: SkillBranch
  displayName: Branch containing the azure-typespec-author skill source (SKILL.md + references/) to evaluate. Leave empty to use the branch this pipeline was triggered from.
  type: string
  default: ''

extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    Use1ESOfficial: true
    stages:
      - stage: EvalTypeSpecAuthor
        displayName: Azure TypeSpec Author Skill Evaluation
        variables:
          - template: /eng/pipelines/templates/variables/globals.yml
          - template: /eng/pipelines/templates/variables/image.yml
          - group: Azure SDK QA Bot Dev Variables
          - group: AzSDK_Eval_Variable_group
        pool:
          name: $(LINUXPOOL)
          image: $(LINUXVMIMAGE)
          os: linux
        jobs:
          - job: RunEvalsForCodeQuality
            displayName: Run Vally Evaluations for Code Quality
            timeoutInMinutes: 170
            steps:
              - checkout: self
                fetchDepth: 0

              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-setup.yml
                parameters:
                  SkillBranch: ${{ parameters.SkillBranch }}

              # Run evaluations — each suite gets its own step with timeout
              # and continueOnError so failures don't block subsequent suites.
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  EvalFile: forced.eval.yaml
                  SuiteName: versioning-forced
                  DisplayName: Run force invokation suite - versioning
                  TimeoutMinutes: 50
                  Tag: suite=versioning
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  EvalFile: forced.eval.yaml
                  SuiteName: armtemplate-forced
                  DisplayName: Run force invokation suite - armtemplate
                  TimeoutMinutes: 40
                  Tag: suite=armtemplate
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  EvalFile: forced.eval.yaml
                  SuiteName: longrunningoperation-forced
                  DisplayName: Run force invokation suite - longrunningoperation
                  TimeoutMinutes: 25
                  Tag: suite=lro
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  EvalFile: forced.eval.yaml
                  SuiteName: decorators-forced
                  DisplayName: Run force invokation suite - decorators
                  TimeoutMinutes: 15
                  Tag: suite=decorators
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  EvalFile: forced.eval.yaml
                  SuiteName: warning-forced
                  DisplayName: Run force invokation suite - warning
                  TimeoutMinutes: 25
                  Tag: suite=warning

            templateContext:
              outputs:
                - output: pipelineArtifact
                  path: $(Build.SourcesDirectory)/.github/skills/azure-typespec-author/evaluate/results
                  artifact: eval-results-code-quality-$(Build.BuildId)
                  displayName: Upload eval results
                  condition: always()

                - output: pipelineArtifact
                  path: $(Build.StagingDirectory)/qa-bot-log
                  artifact: qa-bot-service-log-code-quality
                  displayName: Upload QA bot backend log
                  condition: always()

          - job: RunEvalsForSkillInvokation
            displayName: Run Vally Evaluations for Skill Invokation
            timeoutInMinutes: 170
            steps:
              - checkout: self
                fetchDepth: 0

              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-setup.yml
                parameters:
                  SkillBranch: ${{ parameters.SkillBranch }}
                  StartQaBotBackend: false

              # Run evaluations — each suite gets its own step with timeout
              # and continueOnError so failures don't block subsequent suites.
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  EvalFile: trigger.eval.yaml
                  SuiteName: versioning
                  DisplayName: Run suite - versioning
                  TimeoutMinutes: 50
                  Tag: suite=versioning
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  EvalFile: trigger.eval.yaml
                  SuiteName: armtemplate
                  DisplayName: Run suite - armtemplate
                  TimeoutMinutes: 40
                  Tag: suite=armtemplate
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  EvalFile: trigger.eval.yaml
                  SuiteName: longrunningoperation
                  DisplayName: Run suite - longrunningoperation
                  TimeoutMinutes: 25
                  Tag: suite=lro
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  EvalFile: trigger.eval.yaml
                  SuiteName: decorators
                  DisplayName: Run suite - decorators
                  TimeoutMinutes: 15
                  Tag: suite=decorators
              - template: /.github/skills/azure-typespec-author/pipelines/templates/typespec-author-eval-run-suite.yml
                parameters:
                  EvalFile: trigger.eval.yaml
                  SuiteName: warning
                  DisplayName: Run suite - warning
                  TimeoutMinutes: 25
                  Tag: suite=warning

            templateContext:
              outputs:
                - output: pipelineArtifact
                  path: $(Build.SourcesDirectory)/.github/skills/azure-typespec-author/evaluate/results
                  artifact: eval-results-skill-invocation-$(Build.BuildId)
                  displayName: Upload eval results
                  condition: always()
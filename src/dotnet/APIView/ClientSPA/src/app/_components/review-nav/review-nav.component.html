<div *ngIf="isLoading" class="spinner-border m-3" role="status">
    <span class="visually-hidden">Loading...</span>
</div>
<p-tree *ngIf="!isLoading && reviewPageNavigation.length > 0" [value]="reviewPageNavigation">
    <ng-template let-node pTemplate="default">
        <i *ngIf="hasCodiconIcon(node.data.icon)" class="codicon me-2" [ngClass]="getCodiconClass(node.data.icon)"></i>
        <img *ngIf="!hasCodiconIcon(node.data.icon)" class="me-2" src="{{assetsPath}}/images/{{ node.data.icon }}.png" width="14" height="14">
        <a (click)="handleNavNodeClick(node)" [class.client-type]="isClientType(node)">{{ node.label }}</a>
    </ng-template>
</p-tree>

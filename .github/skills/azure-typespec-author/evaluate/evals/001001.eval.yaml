name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability # capability | regression

# Root-level environment
environment: azsdk-mcp

# Execution configuration
config:
  runs: 1 # Trials per stimulus
  timeout: "660s" # Seconds per trial
  model: claude-opus-4.6 #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk # Which executor to use

# Test cases
stimuli:
  - name: 001001-version-spread-property-trigger
    tags:
      suite: "versioning"
      mode: "trigger"
    prompt: "I added `...Azure.ResourceManager.ManagedServiceIdentityProperty;` which updates all my existing API versions and introduces a breaking change. I want to introduce the properties of the spread model '...ManagedServiceIdentityProperty' in API version 2025-05-04-preview only."
    environment: &shared_environment
      files:
        - src: ../fixtures/001-share-version-new-feature/employee.tsp
          dest: employee.tsp
        - src: ../fixtures/001-share-version-new-feature/main.tsp
          dest: main.tsp
        - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
          dest: package-lock.json
        - src: ../fixtures/Microsoft.Widget/Widget/package.json
          dest: package.json
        - src: ../fixtures/001-share-version-new-feature/readme.md
          dest: readme.md
        - src: ../fixtures/001-share-version-new-feature/shared.tsp
          dest: shared.tsp
        - src: ../fixtures/001-share-version-new-feature/tspconfig.yaml
          dest: tspconfig.yaml
      commands:
        - 'node -e "const fs=require(''fs'');const t=process.env.FIXTURE_NODE_MODULES;if(t&&fs.existsSync(t)&&!fs.existsSync(''node_modules'')){fs.symlinkSync(t,''node_modules'',''junction'')}"'
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
            - "azure-sdk-mcp-azsdk_run_typespec_validation"
      - type: "skill-invocation"
        config:
          required:
            - "azure-typespec-author"
    constraints:
      max_turns: 5
      max_tokens: 1000000
  - name: 001001-version-spread-property-forced
    tags:
      suite: "versioning"
      mode: "forced"
    prompt: "@azure-typespec-author I added `...Azure.ResourceManager.ManagedServiceIdentityProperty;` which updates all my existing API versions and introduces a breaking change. I want to introduce the properties of the spread model '...ManagedServiceIdentityProperty' in API version 2025-05-04-preview only."
    environment: *shared_environment
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
            - "azure-sdk-mcp-azsdk_run_typespec_validation"
      - type: "run-command"
        config:
          command: "tsp compile ."
          expected_exit_code: 0
      - type: "file-matches"
        config:
          pattern: "2025-05-04-preview"
          path: "main.tsp"
      - type: "file-matches"
        config:
          pattern: '\.\.\.ManagedServiceIdentityProperty;'
          path: "employee.tsp"
      - type: "file-matches"
        config:
          pattern: '@@added\(Employee\.identity, (Microsoft\.Widget\.)?Versions\.(v2025_05_04_preview|`2025-05-04-preview`)\);'
          path: "employee.tsp"
      - type: "prompt"
        config:
          prompt: "Verify the identity property is cleanly version-scoped to 2025-05-04-preview only, with changes limited to this task. Using `#suppress` to bypass TypeSpec or ARM validation is NOT an acceptable solution: if any suppression is present, fail regardless of how the agent justifies it as \"appropriate\". If a compiled swagger is present, also confirm the Employee identity is a valid ARM envelope property that appears only in the 2025-05-04-preview spec and is absent from the 2021-11-01 stable spec."
          model: "claude-opus-4.6"
          threshold: 0.77
          scoring: "scale_1_10"
    constraints:
      max_turns: 5
      max_tokens: 1000000
  - name: 001001-version-spread-property-no-skill
    tags:
      suite: "versioning"
      mode: "no-skill"
    prompt: "I added `...Azure.ResourceManager.ManagedServiceIdentityProperty;` which updates all my existing API versions and introduces a breaking change. I want to introduce the properties of the spread model '...ManagedServiceIdentityProperty' in API version 2025-05-04-preview only."
    environment: *shared_environment
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
      - type: "file-matches"
        config:
          path: "main.tsp"
          pattern: "2025-05-04-preview"
      - type: "file-matches"
        config:
          path: "employee.tsp"
          pattern: '\.\.\.ManagedServiceIdentityProperty;'
      - type: "file-matches"
        config:
          path: "employee.tsp"
          pattern: '@@added\(Employee\.identity, (Microsoft\.Widget\.)?Versions\.(v2025_05_04_preview|`2025-05-04-preview`)\);'
      - type: "prompt"
        config:
          prompt: "Verify the identity property is cleanly version-scoped to 2025-05-04-preview only, with changes limited to this task. Using `#suppress` to bypass TypeSpec or ARM validation is NOT an acceptable solution: if any suppression is present, fail regardless of how the agent justifies it as \"appropriate\". If a compiled swagger is present, also confirm the Employee identity is a valid ARM envelope property that appears only in the 2025-05-04-preview spec and is absent from the 2021-11-01 stable spec."
          model: "claude-opus-4.6"
          threshold: 0.77
          scoring: "scale_1_10"
    constraints:
      max_turns: 5
      max_tokens: 100000

scoring:
  weights:
    prompt: 1
    run-command: 1
    skill-invocation: 1
    file-matches: 3
  threshold: 0.97

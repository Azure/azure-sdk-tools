<app-review-page-layout
    [review]="review"
    [activePage]="'revisions'"
    (navigateToReviewsEmitter)="navigateToReview()"
    (navigateToRevisionsEmitter)="noop()"
    (navigateToSamplesEmitter)="navigateToSamples()"
    (navigateToConversationsEmitter)="navigateToConversations()"
    (navigateToNamespaceEmitter)="navigateToNamespace()">
    <div class="revision-panel border rounded">
        <app-revisions-list
            [review]="review"
            (apiRevisionsEmitter)="handleApiRevisionsEmitter($event)">
        </app-revisions-list>
    </div>
</app-review-page-layout>

    "title": "Use consistent client naming with 'Client' suffix",
    "content": "DO use a consistent naming convention for client classes. The client class should be named after the service it wraps, with a 'Client' suffix. For example, use BlobClient, not BlobServiceHelper or BlobManager. Never use 'Helper', 'Manager', or 'Service' as a suffix for client classes."
  }

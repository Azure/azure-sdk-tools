name: azsdk-mcp-tool-scenarios
description: |
  Evaluates how well the agent can analyze pipeline failures from the Azure SDK .NET pipelines.
version: "1.0"
type: capability

tags:
  area: pipeline

environment: azsdk-mcp-mock

config:
  runs: 1
  timeout: 30m
  model: gpt-5.4
  judge_model: gpt-5.4
  executor: copilot-sdk
  
stimuli:
  - name: dotnet-version-parser-bug
    environment:
      files:
        - src: ../../../fixtures/analyze-pipeline/QueueClientOptionsTests/code/QueueClientOptions.cs
          dest: sdk/storage/Azure.Storage.Queues/src/QueueClientOptions.cs
        - src: ../../../fixtures/analyze-pipeline/QueueClientOptionsTests/code/QueueClientOptionsTests.cs
          dest: sdk/storage/Azure.Storage.Queues/tests/QueueClientOptionsTests.cs
      commands:
        - git init -q && git add -A && git -c user.email=vally@local -c user.name=vally commit -qm "seed pre-analysis source"
    prompt: |
      My .NET SDK pipeline failed and I'm trying to figure out what went wrong. Can you help?

      "azsdk-analyze-pipeline" Test Failures Parsed Output:
      {
        "_provenance": {
          "buildId": "6455504",
          "language": "dotnet",
          "repository": "Azure/azure-sdk-for-net",
          "definition": "net - pullrequest",
          "pipelineUrl": "https://dev.azure.com/azure-sdk/public/_build/results?buildId=6455504",
          "prUrl": "https://github.com/Azure/azure-sdk-for-net/pull/60056",
          "sourceCommit": "cb6b85d98518ef9b66b2aa6dbb53f2e1795049c6",
          "category": "code bug",
          "rootCauseSummary": "Storage Files Shares and Queues client option tests failed because TryGetServiceVersion did not parse the new \"2026-10-06\" service version enum value V2026_10_06.",
          "failedTestCount": 44,
          "featuredFailures": [
            "Azure.Storage.Files.Shares.Tests.ShareClientOptionsTests.TryGetServiceVersion_ParsesAllServiceVersions",
            "Azure.Storage.Queues.Test.QueueClientOptionsTests.TryGetServiceVersion_ParsesAllServiceVersions"
          ],
          "captureDate": "2026-06-23"
        },
        "failed_test_titles": {
          "azure.storage.files.shares.tests.dll": [
            "Azure.Storage.Files.Shares.Tests.ShareClientOptionsTests.TryGetServiceVersion_ParsesAllServiceVersions"
          ],
          "azure.storage.queues.tests.dll": [
            "Azure.Storage.Queues.Test.QueueClientOptionsTests.TryGetServiceVersion_ParsesAllServiceVersions"
          ]
        },
        "failed_tasks": [
          {
            "pipeline_url": "https://dev.azure.com/azure-sdk/public/_build/results?buildId=6455504",
            "errors": [
              {
                "file": "sdk/storage/Azure.Storage.Files.Shares/tests/ShareClientOptionsTests.cs",
                "line": 24,
                "message": "  TryGetServiceVersion failed to parse \"2026-10-06\" for V2026_10_06.   Expected: True   But was:  False"
              },
              {
                "file": "sdk/storage/Azure.Storage.Queues/tests/QueueClientOptionsTests.cs",
                "line": 24,
                "message": "  TryGetServiceVersion failed to parse \"2026-10-06\" for V2026_10_06.   Expected: True   But was:  False"
              }
            ]
          }
        ]
      }
    constraints:
      max_turns: 6
      max_tokens: 8000
    graders:
      - type: completed
      - type: skill-invocation
        config:
          required:
            - azsdk-common-pipeline-troubleshooting
      - type: output-contains
        config:
          substring: "QueueClientOptions"
      - type: output-matches
        config:
          pattern: "(?i)(code bug|logic|test failure|parse|service version)"
      - type: output-not-matches
        config:
          pattern: "(?i)(re-?record|missing recording|retry the pipeline|service outage)"
      - type: prompt
        config:
          model: gpt-5.4
          scoring: binary
          threshold: 1.0
          prompt: |
            Build 6455504 failed
            (TryGetServiceVersion_ParsesAllServiceVersions) because
            TryGetServiceVersion failed to parse "2026-10-06" for the
            V2026_10_06 service version enum - a newly added service version was
            not wired into the parser. Does the response (a) identify this as a
            code bug in the QueueClientOptions service-version parsing, and
            (b) recommend updating TryGetServiceVersion rather than re-recording
            or retrying the pipeline? Answer "pass" or "fail".

  - name: dotnet-inheritance-validation-failure

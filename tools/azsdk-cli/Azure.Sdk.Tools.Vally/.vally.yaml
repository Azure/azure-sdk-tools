# Vally configuration for Azure SDK Tools MCP tool / scenario evaluations.
# See: https://vally.dev/reference/vally-config
#
# These are scenario evals (does the agent invoke the right MCP tool(s) for a
# given prompt?) and are intentionally separate from the per-skill evals under
# .github/skills/. See README.md for context.

paths:
  evals: [evals/]
  evalFilenames: ["*.eval.yaml"]
  results: results/

environments:
  azsdk-mcp:
    mcpServers:
      azure-sdk-mcp:
        type: stdio
        command: dotnet
        args: ["run", "--project", "../Azure.Sdk.Tools.Cli", "--", "start"]
        timeout: 300000
        env:
          AZSDKTOOLS_AGENT_TESTING: "false"
          AZSDKTOOLS_COLLECT_TELEMETRY: "false"

suites:
  typespec:
    evals:
      - "evals/check-public-repo.eval.yaml"
      - "evals/check-public-repo-then-validate.eval.yaml"
      - "evals/validate-typespec.eval.yaml"
      - "evals/typespec-generation-step02.eval.yaml"
      - "evals/get-modified-typespec-projects.eval.yaml"
      - "evals/add-arm-resource.eval.yaml"
      - "evals/rename-client-property.eval.yaml"
  release-plan:
    evals:
      - "evals/create-release-plan.eval.yaml"
      - "evals/link-namespace-approval-issue.eval.yaml"
  github:
    evals:
      - "evals/get-pr-link-current-branch.eval.yaml"
  pipeline:
    evals:
      - "evals/check-sdk-generation-status.eval.yaml"
  all:
    evals: ["evals/*.eval.yaml"]

name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability

environment: azsdk-mcp

config:
  runs: 1
  timeout: 1800
  model: claude-opus-4.6
  executor: copilot-sdk

stimuli:
- name: 006009-dp-version-property-renamed
  prompt: |
    Rename the `color` property to `widgetColor` in the WidgetSuite model only for version `2023-06-01-preview`. Also add this new version to the Versions enum.
  constraints:
    max_turns: 10
    max_tokens: 5000
  environment:
    files:
    - src: ../fixtures/006009-dp-version-property-renamed\main.tsp
      dest: main.tsp
    - src: ../fixtures/006009-dp-version-property-renamed\shared.tsp
      dest: shared.tsp
    - src: ../fixtures/006009-dp-version-property-renamed\package.json
      dest: package.json
    - src: ../fixtures/006009-dp-version-property-renamed\tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: skill-invocation
    config:
      required:
        - azure-typespec-author
  - type: file-matches
    config:
      path: main.tsp
      pattern: 'v2023_06_01_Preview'
  - type: file-matches
    config:
      path: main.tsp
      pattern: '@renamedFrom\(Versions\.v2023_06_01_Preview,\s*"color"\)'
  - type: file-matches
    config:
      path: main.tsp
      pattern: 'widgetColor'
  - type: prompt
    config:
      prompt: The color property should be renamed to widgetColor and decorated with @renamedFrom(Versions.v2023_06_01_Preview, "color"). A new version v2023_06_01_Preview should be added to the Versions enum.
      model: claude-opus-4.6
      scoring: scale_1_5
      threshold: 1.0
scoring:
  weights:
    tool-calls: 1
    skill-invocation: 1
    file-matches: 3
    prompt: 2
  threshold: 1.0

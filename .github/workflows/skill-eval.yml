name: Skill Evaluations

on:
  push:
    branches: [main]
    paths:
      - '.github/skills/**/evals/**'
      - '.github/skills/**/SKILL.md'
  pull_request:
    paths:
      - '.github/skills/**/evals/**'
      - '.github/skills/**/SKILL.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check-skills:
    name: Skill Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install waza
        run: |
          curl -fsSL https://raw.githubusercontent.com/microsoft/waza/main/install.sh | bash
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Check skill compliance
        run: |
          echo "## Skill Compliance Report" > compliance.md
          echo "" >> compliance.md
          for skill_dir in .github/skills/*/; do
            skill_name=$(basename "$skill_dir")
            if [ -f "$skill_dir/SKILL.md" ]; then
              echo "### $skill_name" >> compliance.md
              waza check "$skill_dir" 2>&1 | tee -a compliance.md || true
              echo "" >> compliance.md
            fi
          done
          cat compliance.md

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: skill-compliance
          path: compliance.md
          retention-days: 30

  run-evals:
    name: Run Skill Evaluations
    runs-on: ubuntu-latest
    needs: check-skills
    steps:
      - uses: actions/checkout@v4

      - name: Install waza
        run: |
          curl -fsSL https://raw.githubusercontent.com/microsoft/waza/main/install.sh | bash
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Run evaluations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p results
          for eval_file in .github/skills/*/evals/eval.yaml; do
            if [ -f "$eval_file" ]; then
              skill_name=$(basename "$(dirname "$(dirname "$eval_file")")")
              echo "=== Running evals for $skill_name ==="
              waza run "$eval_file" -v -o "results/${skill_name}.json" || true
            fi
          done

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_id }}
          path: results/
          retention-days: 30

name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability # capability | regression

# Root-level environment
environment: azsdk-mcp

# Execution configuration
config:
  runs: 1 # Trials per stimulus
  timeout: "660s" # Seconds per trial
  model: claude-opus-4.6 #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk # Which executor to use

# Test cases
stimuli:
  - name: 004003-delete-and-restore-operationId-decorator-trigger
    tags:
      suite: "decorators"
      mode: "trigger"
    prompt: |
      Remove @operationId and its associated #suppress for no-openapi from all operations. Then restore those operationIds that do not contain underscores or begin with a lowercase letter.
    environment: &shared_environment
      files:
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/BastionHost.tsp
          dest: BastionHost.tsp
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/BgpConnection.tsp
          dest: BgpConnection.tsp
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/ExpressRouteGateway.tsp
          dest: ExpressRouteGateway.tsp
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/ExpressRoutePort.tsp
          dest: ExpressRoutePort.tsp
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/ExpressRouteProviderPort.tsp
          dest: ExpressRouteProviderPort.tsp
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/NetworkInterface.tsp
          dest: NetworkInterface.tsp
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/P2SVpnGateway.tsp
          dest: P2SVpnGateway.tsp
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/Route.tsp
          dest: Route.tsp
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/RouteTable.tsp
          dest: RouteTable.tsp
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/VirtualHub.tsp
          dest: VirtualHub.tsp
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/VpnGateway.tsp
          dest: VpnGateway.tsp
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/VpnServerConfiguration.tsp
          dest: VpnServerConfiguration.tsp
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/VpnServerConfigurationPolicyGroup.tsp
          dest: VpnServerConfigurationPolicyGroup.tsp
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/VpnSiteLinkConnection.tsp
          dest: VpnSiteLinkConnection.tsp
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/main.tsp
          dest: main.tsp
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/models.tsp
          dest: models.tsp
        - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
          dest: package-lock.json
        - src: ../fixtures/Microsoft.Widget/Widget/package.json
          dest: package.json
        - src: ../fixtures/004003-delete-and-restore-operationId-decorator/tspconfig.yaml
          dest: tspconfig.yaml
      commands:
        - 'node -e "const fs=require(''fs'');const t=process.env.FIXTURE_NODE_MODULES;if(t&&fs.existsSync(t)&&!fs.existsSync(''node_modules'')){fs.symlinkSync(t,''node_modules'',''junction'')}"'
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
            - "azure-sdk-mcp-azsdk_run_typespec_validation"
      - type: "skill-invocation"
        config:
          required:
            - "azure-typespec-author"
    constraints:
      max_turns: 5
      max_tokens: 1000000
  - name: 004003-delete-and-restore-operationId-decorator-forced
    tags:
      suite: "decorators"
      mode: "forced"
    prompt: |
      @azure-typespec-author Remove @operationId and its associated #suppress for no-openapi from all operations. Then restore those operationIds that do not contain underscores or begin with a lowercase letter.
    environment: *shared_environment
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
            - "azure-sdk-mcp-azsdk_run_typespec_validation"
      - type: "run-command"
        config:
          command: "tsp compile ."
          expected_exit_code: 0
      - type: "file-not-matches"
        config:
          pattern: '@operationId\('
          path: "BgpConnection.tsp"
      - type: "file-not-matches"
        config:
          pattern: '@operationId\('
          path: "NetworkInterface.tsp"
      - type: "file-not-matches"
        config:
          pattern: '@operationId\('
          path: "ExpressRouteGateway.tsp"
      - type: "file-not-matches"
        config:
          pattern: '@operationId\('
          path: "ExpressRoutePort.tsp"
      - type: "file-not-matches"
        config:
          pattern: '@operationId\('
          path: "NetworkInterface.tsp"
      - type: "file-not-matches"
        config:
          pattern: '@operationId\('
          path: "P2SVpnGateway.tsp"
      - type: "file-not-matches"
        config:
          pattern: '@operationId\('
          path: "VpnServerConfigurationPolicyGroup.tsp"
      - type: "file-not-matches"
        config:
          pattern: '@operationId\('
          path: "VpnSiteLinkConnection.tsp"
      - type: "file-matches"
        config:
          pattern: '@operationId\("PutBastionShareableLink"\)'
          path: "BastionHost.tsp"
      - type: "file-matches"
        config:
          pattern: '@operationId\("GetActiveSessions"\)'
          path: "BastionHost.tsp"
      - type: "file-matches"
        config:
          pattern: '@operationId\("ExpressRouteProviderPort"\)'
          path: "ExpressRouteProviderPort.tsp"
      - type: "file-matches"
        config:
          pattern: "#suppress.*no-openapi|#suppress.*operationId"
          path: "BastionHost.tsp"
      - type: "file-not-matches"
        config:
          pattern: '@operationId\("ExpressRouteProviderPortsLocation_List"\)'
          path: "ExpressRouteProviderPort.tsp"
    constraints:
      max_turns: 5
      max_tokens: 1000000
  - name: 004003-delete-and-restore-operationId-decorator-no-skill
    tags:
      suite: "decorators"
      mode: "no-skill"
    prompt: "Remove @operationId and its associated #suppress for no-openapi from all operations. Then restore those operationIds that do not contain underscores or begin with a lowercase letter."
    environment: *shared_environment
    graders:
      - type: "file-not-matches"
        config:
          path: "BgpConnection.tsp"
          pattern: '@operationId\('
      - type: "file-not-matches"
        config:
          path: "NetworkInterface.tsp"
          pattern: '@operationId\('
      - type: "file-not-matches"
        config:
          path: "ExpressRouteGateway.tsp"
          pattern: '@operationId\('
      - type: "file-not-matches"
        config:
          path: "ExpressRoutePort.tsp"
          pattern: '@operationId\('
      - type: "file-not-matches"
        config:
          path: "NetworkInterface.tsp"
          pattern: '@operationId\('
      - type: "file-not-matches"
        config:
          path: "P2SVpnGateway.tsp"
          pattern: '@operationId\('
      - type: "file-not-matches"
        config:
          path: "VpnServerConfigurationPolicyGroup.tsp"
          pattern: '@operationId\('
      - type: "file-not-matches"
        config:
          path: "VpnSiteLinkConnection.tsp"
          pattern: '@operationId\('
      - type: "file-matches"
        config:
          path: "BastionHost.tsp"
          pattern: '@operationId\("PutBastionShareableLink"\)'
      - type: "file-matches"
        config:
          path: "BastionHost.tsp"
          pattern: '@operationId\("GetActiveSessions"\)'
      - type: "file-matches"
        config:
          path: "ExpressRouteProviderPort.tsp"
          pattern: '@operationId\("ExpressRouteProviderPort"\)'
      - type: "file-matches"
        config:
          path: "BastionHost.tsp"
          pattern: "#suppress.*no-openapi|#suppress.*operationId"
      - type: "file-not-matches"
        config:
          path: "ExpressRouteProviderPort.tsp"
          pattern: '@operationId\("ExpressRouteProviderPortsLocation_List"\)'
    constraints:
      max_turns: 10
      max_tokens: 100000

scoring:
  weights:
    run-command: 1
    file-not-matches: 3
    skill-invocation: 1
    file-matches: 4
  threshold: 1

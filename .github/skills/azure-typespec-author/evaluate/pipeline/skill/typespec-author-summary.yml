# Repo-local summary job for azure-typespec-author with-skill benchmark.
# The forced and trigger tracks run in one pipeline, so each summary must only
# consume the JUnit artifacts published by its own track.

parameters:
  - name: failOnFailedTests
    type: boolean
    default: false
  - name: resultArtifactPrefix
    type: string

jobs:
  - job: Summarize
    displayName: 'Publish + gate rollup'
    pool:
      name: $(LINUXPOOL)
      image: $(LINUXVMIMAGE)
      os: linux
    steps:
      - task: UseNode@1
        displayName: 'Use Node.js 22.x'
        inputs:
          version: 22.x

      - task: DownloadPipelineArtifact@2
        displayName: 'Download all shard results'
        inputs:
          buildType: 'current'
          itemPattern: '**/*.junit.xml'
          targetPath: $(Pipeline.Workspace)/eval-results

      - script: |
          set -e
          root="$(Pipeline.Workspace)/eval-results"
          prefix="${{ parameters.resultArtifactPrefix }}"
          echo "Keeping result artifacts with prefix: $prefix"
          shopt -s nullglob
          for path in "$root"/*; do
            [ -d "$path" ] || continue
            name="$(basename "$path")"
            case "$name" in
              "$prefix"*)
                echo "Keeping $name"
                ;;
              *)
                echo "Removing $name"
                rm -rf "$path"
                ;;
            esac
          done
        displayName: 'Filter shard results by track'

      - script: |
          node --experimental-strip-types "$(Build.SourcesDirectory)/eng/common/scripts/eval/build-eval-summary.ts" \
            --results-root "$(Pipeline.Workspace)/eval-results" \
            --output-path "$(Build.ArtifactStagingDirectory)/eval-summary.md"
        displayName: 'Render Markdown rollup'
        condition: always()

      - task: PublishTestResults@2
        displayName: 'Publish eval rollup'
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: '$(Pipeline.Workspace)/eval-results/**/*.junit.xml'
          mergeTestResults: true
          failTaskOnFailedTests: ${{ parameters.failOnFailedTests }}
          testRunTitle: 'Vally evals'

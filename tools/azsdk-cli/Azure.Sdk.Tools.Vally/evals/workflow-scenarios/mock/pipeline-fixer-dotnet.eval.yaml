name: azsdk-mcp-tool-scenarios
description: |
  Evaluates how well the agent can fix pipeline failures from the Azure SDK .NET pipelines.
  Is given the initial azsdk-analyze-pipeline analysis output.
version: "1.0"
type: capability

tags:
  area: pipeline

environment: azsdk-mcp-mock

config:
  runs: 1
  timeout: 5m
  executor: copilot-sdk
  model: gpt-5.4

stimuli:
  - name: dotnet-fix-version-parser-bug
    environment:
      files:
        - src: ../../../fixtures/analyze-pipeline/QueueClientOptionsTests/code/QueueClientOptions.cs
          dest: sdk/storage/Azure.Storage.Queues/src/QueueClientOptions.cs
        - src: ../../../fixtures/analyze-pipeline/QueueClientOptionsTests/code/QueueClientOptionsTests.cs
          dest: sdk/storage/Azure.Storage.Queues/tests/QueueClientOptionsTests.cs
      commands:
        - git init -q && git add -A && git -c user.email=vally@local -c user.name=vally commit -qm "seed real pre-fix source"
    prompt: |
      My PR's pipeline failed and I need it fixed. Can you help?

      "azsdk-analyze-pipeline" Analyzed Output:

      ## Pipeline Analysis: 6455504

      ### Root Cause
      The TryGetServiceVersion method in QueueClientOptions and ShareClientOptions does not recognize the new "2026-10-06" service version string because it is missing from the switch statement. The enum value V2026_10_06 exists, but the parser cannot map the string "2026-10-06" to it, causing all version-parsing tests to fail.

      ### Failures

      #### 1. TryGetServiceVersion Missing 2026-10-06 Case (QueueClientOptions)
      - **Category:** code bug
      - **File:** `sdk/storage/Azure.Storage.Queues/src/QueueClientOptions.cs`
      - **Error:** TryGetServiceVersion failed to parse "2026-10-06" for V2026_10_06 (expected: true but was: false)
      - **Fix:** Add case "2026-10-06": serviceVersion = ServiceVersion.V2026_10_06; return true; to the TryGetServiceVersion switch statement
      - **Verify:** `dotnet test --filter "TryGetServiceVersion_ParsesAllServiceVersions"`

      #### 2. TryGetServiceVersion Missing 2026-10-06 Case (ShareClientOptions)
      - **Category:** code bug
      - **File:** `sdk/storage/Azure.Storage.Files.Shares/tests/ShareClientOptionsTests.cs:24`
      - **Error:** TryGetServiceVersion failed to parse "2026-10-06" for V2026_10_06
      - **Fix:** Same as above - add the missing case statement to the switch
      - **Verify:** `dotnet test --filter "TryGetServiceVersion_ParsesAllServiceVersions"`

      ### Summary
      - 1 fixable code failure (add missing service version case to TryGetServiceVersion switch)
      - 0 infrastructure issues
      - **Recommended Action:** Add case "2026-10-06": and "2026-12-06": entries to TryGetServiceVersion method in QueueClientOptions.cs

      Package path: sdk/storage/Azure.Storage.Queues
    constraints:
      max_turns: 15
      max_tokens: 16000
    graders:
      - type: completed
      - type: skill-invocation
        config:
          required:
            - azsdk-common-pipeline-fixer
      - type: tool-calls
        config:
          required:
            - name: azsdk_package_build_code
            - name: azsdk_package_run_check
            - name: azsdk_package_run_tests
          disallowed:
            - name: '^bash$'
              command: '(?i)(^|[\s;&|])dotnet\s+(test|build|msbuild|run)\b'
      - type: file-matches
        config:
          path: "sdk/storage/Azure.Storage.Queues/src/QueueClientOptions.cs"
          pattern: '(?i)case\s+"2026-10-06"'
      - type: output-not-matches
        config:
          pattern: '(?i)(retry the pipeline|not fixable by (a )?code|unfixable|infrastructure issue)'
      - type: prompt
        config:
          model: gpt-5.4
          scoring: binary
          threshold: 1.0
          prompt: |
            Does the response add the missing `"2026-10-06"` (and ideally
            `"2026-12-06"`) case(s) to the TryGetServiceVersion switch in
            QueueClientOptions.cs, mapping them to V2026_10_06 / V2026_12_06?
            Answer "pass" or "fail".

scoring:
  weights:
    skill-invocation: 1
    file-matches: 1
    tool-calls: 1
    output-not-matches: 1
    prompt: 1
  threshold: 1.0
name: Benchmarks

on:
  push:
    paths:
      - .github/workflows/benchmarks.yml
  workflow_dispatch:
    inputs:
      scenario:
        description: "Run a single scenario by name (leave empty to run all)"
        required: false
        type: string
      tags:
        description: "Filter scenarios by tags, comma-separated (ignored if scenario is specified)"
        required: false
        type: string
      model:
        description: "Model to use for agent execution"
        required: false
        type: string
        default: "claude-opus-4.5"

jobs:
  run-benchmarks:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run benchmarks
        uses: ./eng/common/actions/run-benchmarks
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        with:
          scenario: ${{ inputs.scenario }}
          tags: ${{ inputs.tags }}
          model: ${{ inputs.model }}

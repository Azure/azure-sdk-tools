name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability # capability | regression

# Root-level environment
environment: azsdk-mcp

# Execution configuration
config:
  runs: 1 # Trials per stimulus
  timeout: "660s" # Seconds per trial
  model: claude-opus-4.6 #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk # Which executor to use

# Test cases
stimuli:
  - name: 005001-warning-suppress-warning-trigger
    tags:
      suite: "warning"
      mode: "trigger"
    prompt: |
      Add suppressions for the warnings produced by "tsp compile .", and set the justification to "FIXME: Update justification, follow aka.ms/tsp/conversion-fix for details".
    environment: &shared_environment
      files:
        - src: ../fixtures/005001-warning-suppress-warning/main.tsp
          dest: main.tsp
        - src: ../fixtures/005001-warning-suppress-warning/models.tsp
          dest: models.tsp
        - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
          dest: package-lock.json
        - src: ../fixtures/Microsoft.Widget/Widget/package.json
          dest: package.json
        - src: ../fixtures/005001-warning-suppress-warning/stubs.tsp
          dest: stubs.tsp
        - src: ../fixtures/005001-warning-suppress-warning/tspconfig.yaml
          dest: tspconfig.yaml
      commands:
        - 'node -e "const fs=require(''fs'');const t=process.env.FIXTURE_NODE_MODULES;if(t&&fs.existsSync(t)&&!fs.existsSync(''node_modules'')){fs.symlinkSync(t,''node_modules'',''junction'')}"'
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
            - "azure-sdk-mcp-azsdk_run_typespec_validation"
      - type: "skill-invocation"
        config:
          required:
            - "azure-typespec-author"
    constraints:
      max_turns: 5
      max_tokens: 1000000
  - name: 005001-warning-suppress-warning-forced
    tags:
      suite: "warning"
      mode: "forced"
    prompt: |
      @azure-typespec-author Add suppressions for the warnings produced by "tsp compile .", and set the justification to "FIXME: Update justification, follow aka.ms/tsp/conversion-fix for details".
    environment: *shared_environment
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
            - "azure-sdk-mcp-azsdk_run_typespec_validation"
      - type: "run-command"
        config:
          command: "tsp compile ."
          expected_exit_code: 0
      - type: "file-matches"
        config:
          pattern: "#suppress"
          path: "models.tsp"
      - type: "file-matches"
        config:
          pattern: 'FIXME: Update justification, follow aka\.ms/tsp/conversion-fix for details'
          path: "models.tsp"
    constraints:
      max_turns: 5
      max_tokens: 1000000
  - name: 005001-warning-suppress-warning-no-skill
    tags:
      suite: "warning"
      mode: "no-skill"
    prompt: 'Add suppressions for the warnings produced by "tsp compile .", and set the justification to "FIXME: Update justification, follow aka.ms/tsp/conversion-fix for details".'
    environment: *shared_environment
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
      - type: "file-matches"
        config:
          path: "models.tsp"
          pattern: "#suppress"
      - type: "file-matches"
        config:
          path: "models.tsp"
          pattern: 'FIXME: Update justification, follow aka\.ms/tsp/conversion-fix for details'
    constraints:
      max_turns: 6
      max_tokens: 1000000

scoring:
  weights:
    run-command: 1
    skill-invocation: 1
    file-matches: 2
  threshold: 1

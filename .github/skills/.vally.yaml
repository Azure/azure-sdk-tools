paths:
  evals:
    - skill-authoring/evals/
    - azsdk-common-pipeline-troubleshooting/evals/
    - markdown-token-optimizer/evals/
    - sensei/evals/
    - azsdk-common-generate-sdk-locally/evals/
    - azsdk-common-sdk-release/evals/
    - azsdk-common-apiview-feedback-resolution/evals/
    - azsdk-common-prepare-release-plan/evals/
  results: results/
  evalFilenames: ["eval.yaml", "*.eval.yaml"]

environments:
  # Launch the pre-built DLLs via `dotnet <dll>`, NOT `dotnet run` — avoids the
  # MSBuild boot race under parallel workers. See issue #15948.
  # CI builds the DLLs in the 'Build MCP servers' step of skill-eval.yml.
  azsdk-mcp:
    mcpServers:
      azure-sdk-mcp:
        type: stdio
        command: dotnet
        args: ["../../artifacts/bin/Azure.Sdk.Tools.Cli/Debug/net8.0/azsdk.dll", "start"]
        timeout: "60s"
        env:
          AZSDKTOOLS_AGENT_TESTING: "true"
          AZSDKTOOLS_COLLECT_TELEMETRY: "false"
  azsdk-mcp-mock:
    mcpServers:
      azure-sdk-mcp:
        type: stdio
        command: dotnet
        args: ["../../artifacts/bin/Azure.Sdk.Tools.Mock/Debug/net8.0/azsdk-mock.dll"]
        timeout: "60s"

name: Sync Knowledge Sources

trigger: none
pr: none

schedules:
- cron: "0 2 * * *"  # Daily at 2 AM UTC
  displayName: Daily knowledge sync
  branches:
    include:
    - main

resources:
  repositories:
    - repository: 1ESPipelineTemplates
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release
    - repository: azure-sdk-docs-eng.ms
      type: git
      name: internal/azure-sdk-docs-eng.ms
      ref: main
    - repository: internal-wiki
      type: git
      name: internal/internal.wiki
      ref: wikiMaster

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    settings:
      skipBuildTagsForGitHubPullRequests: true
      networkIsolationPolicy: Permissive
    sdl:
      # Turn off the build warnings caused by disabling some sdl checks
      createAdoIssuesForJustificationsForDisablement: false
      sourceAnalysisPool:
        name: azsdk-pool
        image: windows-2022
        os: windows
      eslint:
        enabled: false
        justificationForDisabling: 'ESLint injected task has failures because it uses an old version of mkdirp. We should not fail for tools not controlled by the repo. See: https://dev.azure.com/azure-sdk/internal/_build/results?buildId=3499746'
      codeql:
        compiled:
          enabled: false
          justificationForDisabling: CodeQL times our pipelines out by running for 2+ hours before being force canceled.
      componentgovernance:
        enabled: false
        justificationForDisabling: Manually enabling only on the main build job instead of running it on every job.
      psscriptanalyzer:
        compiled: true
        break: true
      policy: M365
      sourceRepositoriesToScan:
        exclude:
          - repository: azure-sdk-docs-eng.ms
          - repository: internal-wiki
    stages:
      - stage: SyncKnowledge
        displayName: 'Sync Knowledge Sources'
        jobs:
          - job: BuildAndSync
            displayName: 'Build and Execute Knowledge Sync'

            variables:
              - group: Release Secrets for GitHub
              - template: /eng/pipelines/templates/variables/image.yml@self
              - template: /eng/pipelines/templates/variables/globals.yml@self
              - name: workingDirectory
                value: '$(System.DefaultWorkingDirectory)/knowledge_sources'

            pool:
              name: $(LINUXPOOL)
              image: $(LINUXVMIMAGE)
              os: linux

            steps:
              - checkout: self
                displayName: 'Checkout current repository'

              - checkout: azure-sdk-docs-eng.ms
                displayName: 'Checkout azure-sdk-docs-eng.ms repository'

              - checkout: internal-wiki
                displayName: 'Checkout internal wiki repository'

              - task: AzureCLI@2
                inputs:
                  azureSubscription: $(SERVICE_CONNECTION)
                  addSpnToEnvironment: true
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    echo "##vso[task.setvariable variable=AZURE_CLIENT_ID]$servicePrincipalId"
                    echo "##vso[task.setvariable variable=AZURE_TENANT_ID]$tenantId"
                    echo "##vso[task.setvariable variable=AZURE_SUBSCRIPTION_ID]$(az account show --query id -o tsv)"
                    echo "$idToken" > "$(Agent.BuildDirectory)/id_token"
                    echo "##vso[task.setvariable variable=AZURE_FEDERATED_TOKEN_FILE]$(Agent.BuildDirectory)/id_token"

              - task: NodeTool@0
                displayName: 'Setup Node.js'
                inputs:
                  versionSpec: '20.x'

              - script: |
                  npm ci
                displayName: 'Install dependencies'
                workingDirectory: $(Agent.BuildDirectory)/s/azure-sdk-tools/tools/sdk-ai-bots/azure-sdk-qa-bot-knowledge-sync

              - script: |
                  npm run build
                displayName: 'Build TypeScript project'
                workingDirectory: $(Agent.BuildDirectory)/s/azure-sdk-tools/tools/sdk-ai-bots/azure-sdk-qa-bot-knowledge-sync

              - script: |
                  npm run start
                displayName: 'Execute knowledge sync'
                workingDirectory: $(Agent.BuildDirectory)/s/azure-sdk-tools/tools/sdk-ai-bots/azure-sdk-qa-bot-knowledge-sync
                env:
                  # Azure App Configuration
                  AZURE_APPCONFIG_ENDPOINT: $(AZURE_APPCONFIG_ENDPOINT)
                  AZURE_SDK_DOCS_PATH: "$(Agent.BuildDirectory)/s/azure-sdk-docs-eng.ms"
                  AZURE_SDK_WIKI_PATH: "$(Agent.BuildDirectory)/s/internal.wiki"

                  # GitHub PAT for private repo access
                  AZURE_SDK_GITHUB_PAT: $(azuresdk-github-pat)

                  # Set working directory for temporary files
                  TMPDIR: $(Agent.TempDirectory)
                  HOME: $(Agent.HomeDirectory)

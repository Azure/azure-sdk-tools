name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author - warning suppression cases (005001).
version: "1.0"
type: capability

environment: azsdk-mcp

config:
  runs: 1
  timeout: "660s"
  model: claude-opus-4.6
  executor: copilot-sdk
  workers: 1

stimuli:
- name: 005001-warning-suppress-warning
  prompt: |
    Add suppressions for the warnings produced by "tsp compile .", and set the justification to "FIXME: Update justification, follow aka.ms/tsp/conversion-fix for details".
  constraints:
    max_turns: 10
    max_tokens: 100000
  environment:
    files:
    - src: ../fixtures/005001-warning-suppress-warning/models.tsp
      dest: models.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
      dest: package-lock.json
    - src: ../fixtures/005001-warning-suppress-warning/tspconfig.yaml
      dest: tspconfig.yaml
    - src: ../fixtures/005001-warning-suppress-warning/main.tsp
      dest: main.tsp
    - src: ../fixtures/005001-warning-suppress-warning/stubs.tsp
      dest: stubs.tsp
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: skill-invocation
    config:
      required:
        - azure-typespec-author
  - type: file-matches
    config:
      path: models.tsp
      pattern: '#suppress'
  - type: file-matches
    config:
      path: models.tsp
      pattern: 'FIXME: Update justification, follow aka\.ms/tsp/conversion-fix for details'

scoring:
  weights:
    tool-calls: 1
    skill-invocation: 1
    file-matches: 1
  threshold: 1.0

# CCR dashboard publish (DORMANT / opt-in).
#
# Purpose: commit the read-only CCR Improvement Loop's run JSON into the committed
# dashboard data folder so GitHub Pages can serve up-to-date trends. This keeps the
# agentic loop itself read-only — publishing is a separate, plain (non-agent)
# workflow.
#
# STATUS: dormant. It only triggers on manual `workflow_dispatch`, so it does NOT
# run on its own this iteration. To activate later, uncomment the `workflow_run`
# (or `schedule`) block below AND resolve the TODO(activate) artifact name.
#
# Token: same-repo publish uses the built-in GITHUB_TOKEN (contents: write). No
# PAT / GitHub App / deploy key is required.
name: "tools - ccr-dashboard-publish"

on:
  workflow_dispatch: {}
  # TODO(activate): to auto-publish after each loop run, uncomment this block.
  # It runs when the "CCR Improvement Loop" workflow completes successfully.
  # workflow_run:
  #   workflows: ["CCR Improvement Loop"]
  #   types: [completed]
  # Alternatively, a fixed weekly schedule:
  # schedule:
  #   - cron: "0 12 * * 1"

permissions:
  contents: write
  actions: read

concurrency:
  group: ccr-dashboard-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # When activated via workflow_run, only publish on a successful loop run.
    # (No-op for workflow_dispatch, where github.event.workflow_run is null.)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    env:
      DATA_DIR: .github/aw/ccr-improvement-loop/dashboard/data
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download run JSON artifact from the loop
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # TODO(activate): set this to the exact artifact name the gh-aw
          # `upload_artifact` safe-output publishes the run JSON under (read it off
          # a real "CCR Improvement Loop" run — the loop stages run-*.json via a
          # safe-outputs upload). Until then this workflow is dormant.
          name: ccr-runs
          path: ${{ runner.temp }}/ccr-runs
          # When activated via workflow_run, pull the artifact from that run:
          # run-id: ${{ github.event.workflow_run.id }}
          # github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Copy run JSON into the committed data folder
        run: |
          set -euo pipefail
          mkdir -p "$DATA_DIR"
          found=0
          if [ -d "${RUNNER_TEMP}/ccr-runs" ]; then
            while IFS= read -r -d '' f; do
              cp "$f" "$DATA_DIR/"
              found=$((found + 1))
            done < <(find "${RUNNER_TEMP}/ccr-runs" -type f -name 'run-*.json' -print0)
          fi
          echo "copied $found run file(s) into $DATA_DIR"

      - name: Regenerate data/manifest.json
        run: |
          node -e '
            const fs = require("node:fs");
            const dir = process.env.DATA_DIR;
            const runs = fs.readdirSync(dir)
              .filter((f) => /^run-.*\.json$/.test(f))
              .sort();
            fs.writeFileSync(
              dir + "/manifest.json",
              JSON.stringify({ runs }, null, 2) + "\n",
            );
            console.log("manifest lists", runs.length, "run(s)");
          '

      - name: Commit and push if data changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$DATA_DIR"
          if git diff --cached --quiet; then
            echo "no dashboard data changes to commit"
            exit 0
          fi
          git commit -m "chore(ccr-dashboard): publish latest run data"
          git push

name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability # capability | regression

# Root-level environment
environment: azsdk-mcp

# Execution configuration
config:
  runs: 1 # Trials per stimulus
  timeout: "660s" # Seconds per trial
  model: claude-opus-4.6 #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk # Which executor to use

# Test cases
stimuli:
  - name: 002002-ARM-define-extension-resource-add-trigger
    tags:
      suite: "armtemplate"
      mode: "trigger"
    prompt: |
      add an extension resource named asset
    environment: &shared_environment
      files:
        - src: ../fixtures/Microsoft.Widget/Widget/employee.tsp
          dest: employee.tsp
        - src: ../fixtures/Microsoft.Widget/Widget/main.tsp
          dest: main.tsp
        - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
          dest: package-lock.json
        - src: ../fixtures/Microsoft.Widget/Widget/package.json
          dest: package.json
        - src: ../fixtures/Microsoft.Widget/Widget/readme.md
          dest: readme.md
        - src: ../fixtures/Microsoft.Widget/Widget/shared.tsp
          dest: shared.tsp
        - src: ../fixtures/Microsoft.Widget/Widget/tspconfig.yaml
          dest: tspconfig.yaml
      commands:
        - 'node -e "const fs=require(''fs'');const t=process.env.FIXTURE_NODE_MODULES;if(t&&fs.existsSync(t)&&!fs.existsSync(''node_modules'')){fs.symlinkSync(t,''node_modules'',''junction'')}"'
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
            - "azure-sdk-mcp-azsdk_run_typespec_validation"
      - type: "skill-invocation"
        config:
          required:
            - "azure-typespec-author"
    constraints:
      max_turns: 5
      max_tokens: 1000000
  - name: 002002-ARM-define-extension-resource-add-forced
    tags:
      suite: "armtemplate"
      mode: "forced"
    prompt: |
      @azure-typespec-author add an extension resource named asset
    environment: *shared_environment
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
            - "azure-sdk-mcp-azsdk_run_typespec_validation"
      - type: "run-command"
        config:
          command: "tsp compile ."
          expected_exit_code: 0
      - type: "file-matches"
        config:
          pattern: "model Asset is ExtensionResource<AssetProperties>"
          path: "*.tsp"
      - type: "file-matches"
        config:
          pattern: "interface Assets|interface AssetOps"
          path: "*.tsp"
      - type: "file-matches"
        config:
          pattern: "provisioningState"
          path: "*.tsp"
    constraints:
      max_turns: 5
      max_tokens: 1000000
  - name: 002002-ARM-define-extension-resource-add-no-skill
    tags:
      suite: "armtemplate"
      mode: "no-skill"
    prompt: "add an extension resource named asset"
    environment: *shared_environment
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
      - type: "file-matches"
        config:
          path: "*.tsp"
          pattern: "model Asset is ExtensionResource<AssetProperties>"
      - type: "file-matches"
        config:
          path: "*.tsp"
          pattern: "interface Assets|interface AssetOps"
      - type: "file-matches"
        config:
          path: "*.tsp"
          pattern: "provisioningState"
    constraints:
      max_turns: 6
      max_tokens: 100000

scoring:
  weights:
    run-command: 1
    skill-invocation: 1
    file-matches: 3
  threshold: 1

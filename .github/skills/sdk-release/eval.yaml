name: sdk-release-eval
description: Evaluation suite for SDK release skill.
version: '1.0'
type: capability
environment:
  skills:
  - .
config:
  runs: 1
  timeout: 300
  model: gpt-4o
  executor: copilot-sdk
stimuli:
- name: release-basic-001
  prompt: I want to release my Azure Event Hubs Python SDK package.
  tags:
    category: basic
    variant: happy-path
  graders:
  - type: output-contains
    config:
      substring: release
  - type: output-contains
    config:
      substring: azsdk_release_sdk
  constraints:
    expect_tools:
    - azsdk_release_sdk
    max_turns: 5
- name: release-negative-001
  prompt: I need to validate my CODEOWNERS file for the Python SDK repo.
  tags:
    category: negative
  graders:
  - type: output-contains
    config:
      substring: CODEOWNERS
  constraints:
    max_turns: 2
- name: release-readiness-001
  prompt: Check if azure-messaging-eventhubs is ready for release in Java.
  tags:
    category: basic
  graders:
  - type: output-contains
    config:
      substring: ready
  - type: output-contains
    config:
      substring: azsdk_release_sdk
  constraints:
    expect_tools:
    - azsdk_release_sdk
    max_turns: 3
- name: release-trigger-001
  prompt: The readiness check passed. Go ahead and trigger the release pipeline for @azure/event-hubs JavaScript SDK.
  tags:
    category: basic
  graders:
  - type: output-contains
    config:
      substring: release
  - type: output-contains
    config:
      substring: pipeline
  - type: output-contains
    config:
      substring: approve
  constraints:
    expect_tools:
    - azsdk_release_sdk
    max_turns: 3
- name: anti-trigger
  prompt: How do I write unit tests for my Azure SDK client?
  graders:
  - type: skill-invocation
    config:
      disallowed: [sdk-release]
  - type: output-not-contains
    config:
      substring: release process
  - type: output-not-contains
    config:
      substring: publish package
- name: basic-trigger
  prompt: I need to release a new version of my Azure SDK package. Walk me through the process.
  graders:
  - type: skill-invocation
    config:
      required: [sdk-release]
  - type: output-contains
    config:
      substring: release
- name: trigger-positive-001
  prompt: release my SDK package
  tags:
    category: trigger-test
    variant: should-trigger
  graders:
  - type: skill-invocation
    config:
      required: [sdk-release]
- name: trigger-positive-002
  prompt: how to publish a new SDK version
  tags:
    category: trigger-test
    variant: should-trigger
  graders:
  - type: skill-invocation
    config:
      required: [sdk-release]
- name: trigger-positive-003
  prompt: walk me through SDK release process
  tags:
    category: trigger-test
    variant: should-trigger
  graders:
  - type: skill-invocation
    config:
      required: [sdk-release]
- name: trigger-positive-004
  prompt: release a new version of azure-sdk
  tags:
    category: trigger-test
    variant: should-trigger
  graders:
  - type: skill-invocation
    config:
      required: [sdk-release]
- name: trigger-positive-005
  prompt: SDK release checklist
  tags:
    category: trigger-test
    variant: should-trigger
  graders:
  - type: skill-invocation
    config:
      required: [sdk-release]
- name: trigger-negative-001
  prompt: write unit tests
  tags:
    category: trigger-test
    variant: should-not-trigger
  graders:
  - type: skill-invocation
    config:
      disallowed: [sdk-release]
- name: trigger-negative-002
  prompt: fix my pipeline build error
  tags:
    category: trigger-test
    variant: should-not-trigger
  graders:
  - type: skill-invocation
    config:
      disallowed: [sdk-release]
- name: trigger-negative-003
  prompt: create a new TypeSpec definition
  tags:
    category: trigger-test
    variant: should-not-trigger
  graders:
  - type: skill-invocation
    config:
      disallowed: [sdk-release]
- name: trigger-negative-004
  prompt: optimize markdown tokens
  tags:
    category: trigger-test
    variant: should-not-trigger
  graders:
  - type: skill-invocation
    config:
      disallowed: [sdk-release]
- name: trigger-negative-005
  prompt: resolve APIView feedback
  tags:
    category: trigger-test
    variant: should-not-trigger
  graders:
  - type: skill-invocation
    config:
      disallowed: [sdk-release]
scoring:
  threshold: 0.7

            "c.a.s.b.BlobAsyncApiTests.uploadStreamAccessTierSmart",
            "uploadStreamAccessTierSmart"
          ],
          "captureDate": "2026-06-23"
        },
        "failed_test_titles": {
          "com.azure.storage.blob.BlobApiTests": [
            "c.a.s.b.BlobApiTests.uploadStreamAccessTierSmart",
            "uploadStreamAccessTierSmart"
          ],
          "com.azure.storage.blob.BlobAsyncApiTests": [
            "c.a.s.b.BlobAsyncApiTests.uploadStreamAccessTierSmart",
            "uploadStreamAccessTierSmart"
          ]
        },
        "failed_tasks": [
          {
            "pipeline_url": "https://dev.azure.com/azure-sdk/public/_build/results?buildId=6449182",
            "errors": [
              {
                "file": "sdk/storage/azure-storage-blob/src/test/java/com/azure/storage/blob/BlobApiTests.java",
                "line": 3230,
                "message": "Test proxy returned a non-successful status code. 404; response: {\"Message\":\"Recording file path /Users/runner/work/1/s/.assets/yoPImn7QKL/java/sdk/storage/azure-storage-blob/src/test/resources/session-records/BlobApiTests.uploadStreamAccessTierSmart.json does not exist.\",\"Status\":\"NotFound\"}"
              },
              {
                "file": "sdk/storage/azure-storage-blob/src/test/java/com/azure/storage/blob/BlobAsyncApiTests.java",

# Live-tier invocation for one eval shard: the same `vally eval` run as the hermetic
# eval-invoke.yml, wrapped in AzureCLI@2 so the live MCP's Azure DevOps calls inherit the
# service-connection identity. The archetype's evalInvokeTemplate seam points here for live.

parameters:
  - name: vallyRoot
    type: string
    default: tools/azsdk-cli/Azure.Sdk.Tools.Vally

steps:
  - task: AzureCLI@2
    displayName: 'vally eval $(shardName) (live)'
    inputs:
      azureSubscription: opensource-api-connection
      scriptType: bash
      scriptLocation: inlineScript
      workingDirectory: ${{ parameters.vallyRoot }}
      inlineScript: |
        node "$(Build.SourcesDirectory)/eng/common/scripts/eval/invoke-eval-shard.js" \
          --eval-args "$(evalArgs)" \
          --shard-name "$(shardName)" \
          --output-dir "$(Build.SourcesDirectory)/artifacts/vally-results/$(shardName)" \
          --skill-eval-prefix "$(Build.SourcesDirectory)/eng/common/scripts/eval" \
          --threshold 0.8

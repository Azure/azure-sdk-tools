name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability               # capability | regression

# Root-level environment
environment: azsdk-mcp

# Execution configuration
config:
  runs: 1                      # Trials per stimulus
  timeout: 1800                # Seconds per trial
  model: claude-opus-4.6
  executor: copilot-sdk        # Which executor to use

# Test cases
stimuli:
- name: 006001-dp-add-create-operation
  prompt: |
    In the specification/widget/data-plane/WidgetAnalytics project, add a create or update operation for the WidgetSuite resource to the Widgets interface. The operation should allow creating or updating a Widget asynchronously.
  constraints:
    max_turns: 10
    max_tokens: 50000
  environment:
    files:
    - src: ../fixtures/006001-dp-add-create-operation/main.tsp
      dest: main.tsp
    - src: ../fixtures/006-dp-share/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/006-dp-share/package.json
      dest: package.json
    - src: ../fixtures/006-dp-share/tspconfig.yaml
      dest: tspconfig.yaml
    - src: ../fixtures/006-dp-share/readme.md
      dest: readme.md
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azure-sdk-mcp-azsdk_typespec_generate_authoring_plan
        - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: skill-invocation
    config:
      required:
        - azure-typespec-author
  - type: file-matches
    config:
      path: main.tsp
      pattern: "LongRunningResourceCreateOrUpdate<WidgetSuite>|ResourceCreateOrReplace<WidgetSuite>|ResourceCreateOrUpdate<WidgetSuite>"
  - type: file-matches
    config:
      path: main.tsp
      pattern: "@doc"
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: Verify the Widgets interface includes a create or update operation for WidgetSuite using an Azure.Core resource operation template. The operation should have a descriptive @doc decorator. No unrelated changes.
      model: claude-opus-4.6
scoring:
  weights:
    file-matches: 3
    tool-calls: 1
    skill-invocation: 1
    prompt: 1
  threshold: 1.0

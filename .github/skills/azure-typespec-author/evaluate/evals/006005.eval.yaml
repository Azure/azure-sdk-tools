name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: '1.0'
type: capability
environment: azsdk-mcp
config:
  runs: 1
  timeout: 660s
  model: claude-opus-4.6
  executor: copilot-sdk
stimuli:
- name: 006005-dp-version-add-preview-trigger
  tags:
    suite: dataplane
    mode: trigger
  prompt: Add a new preview version `2023-06-01-preview` to the Versions enum.
  environment: &id001
    files:
    - src: ../fixtures/006005-dp-version-add-preview/main.tsp
      dest: main.tsp
    - src: ../fixtures/006005-dp-version-add-preview/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
      dest: package-lock.json
    - src: ../fixtures/006005-dp-version-add-preview/tspconfig.yaml
      dest: tspconfig.yaml
    commands:
    - node -e "const fs=require('fs');const t=process.env.FIXTURE_NODE_MODULES;if(t&&fs.existsSync(t)&&!fs.existsSync('node_modules')){fs.symlinkSync(t,'node_modules','junction')}"
  graders:
  - &id002
    type: tool-calls
    config:
      required:
      - edit
      - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: skill-invocation
    config:
      required:
      - azure-typespec-author
  constraints:
    max_turns: 5
    max_tokens: 1000000
- name: 006005-dp-version-add-preview-forced
  tags:
    suite: dataplane
    mode: forced
  prompt: '@azure-typespec-author Add a new preview version `2023-06-01-preview` to the Versions enum.'
  environment: *id001
  graders:
  - *id002
  - type: run-command
    config:
      command: tsp compile .
      expected_exit_code: 0
  - &id003
    type: file-matches
    config:
      path: main.tsp
      pattern: v2023_06_01_Preview
  - &id004
    type: file-matches
    config:
      path: main.tsp
      pattern: 2023-06-01-preview
  constraints:
    max_turns: 5
    max_tokens: 1000000
- name: 006005-dp-version-add-preview-no-skill
  tags:
    suite: dataplane
    mode: no-skill
  prompt: Add a new preview version `2023-06-01-preview` to the Versions enum.
  environment: *id001
  graders:
  - type: tool-calls
    config:
      required:
      - edit
  - *id003
  - *id004
  constraints:
    max_turns: 5
    max_tokens: 100000
scoring:
  weights:
    tool-calls: 1
    skill-invocation: 1
    run-command: 1
    file-matches: 3
  threshold: 0.95

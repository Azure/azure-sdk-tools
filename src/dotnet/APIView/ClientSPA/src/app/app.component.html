<div class="virtual-body">
    <router-outlet></router-outlet>
    <p-toast position="bottom-center" key="bl" >
        <ng-template let-message pTemplate="message">
            <div class="flex flex-col items-start flex-auto">
                <div class="fw-bolder"><i *ngIf="message.icon" class="{{ message.icon }} me-2"></i>{{ message.summary }}</div>
                <div *ngIf="message.detail">{{ message.detail }}</div>
                <button *ngIf="message.data && message.data.type === 'AICommentsGenerated'" type="button" class="btn btn-warning btn-sm" (click)="reloadPage()">Refresh</button>
            </div>
        </ng-template>
    </p-toast>
</div>

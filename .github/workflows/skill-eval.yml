name: Skill Evaluations

on:
  push:
    branches: [main]
    paths:
      - '.github/skills/**'
  pull_request:
    paths:
      - '.github/skills/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-skills:
    name: Skill Compliance Check (Vally lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Vally CLI
        run: npm install -g @microsoft/vally-cli@0.4.0

      - name: Lint skills
        run: vally lint .

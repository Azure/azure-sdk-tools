# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.
trigger: none
pr: none

parameters:
- name: PythonVersion
  type: string
  default: '3.10'
- name: SkillBranch
  displayName: Branch containing the azure-typespec-author skill source (SKILL.md + references/) to evaluate. Leave empty to use the branch this pipeline was triggered from.
  type: string
  default: ''
- name: ForcedSuites
  type: object
  default:
    - { name: versioning, file: versioning-forced.eval.yaml, timeout: 50 }
    - { name: armtemplate, file: armtemplate-forced.eval.yaml, timeout: 40 }
    - { name: longrunningoperation, file: lro-forced.eval.yaml, timeout: 25 }
    - { name: decorators, file: decorators-forced.eval.yaml, timeout: 15 }
    - { name: warning, file: warning-forced.eval.yaml, timeout: 25 }
- name: SkillInvocationSuites
  type: object
  default:
    - { name: versioning, file: versioning.eval.yaml, timeout: 50 }
    - { name: armtemplate, file: armtemplate.eval.yaml, timeout: 40 }
    - { name: longrunningoperation, file: lro.eval.yaml, timeout: 25 }
    - { name: decorators, file: decorators.eval.yaml, timeout: 15 }
    - { name: warning, file: warning.eval.yaml, timeout: 25 }

extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    Use1ESOfficial: true
    stages:
      - stage: EvalTypeSpecAuthor
        displayName: Azure TypeSpec Author Skill Evaluation
        variables:
          - template: /eng/pipelines/templates/variables/globals.yml
          - template: /eng/pipelines/templates/variables/image.yml
          - group: Azure SDK QA Bot Dev Variables
          - group: AzSDK_Eval_Variable_group
        pool:
          name: $(LINUXPOOL)
          image: $(LINUXVMIMAGE)
          os: linux
        jobs:
          - job: RunEvalsForCodeQuality
            displayName: Run Vally Evaluations for Code Quality
            timeoutInMinutes: 170
            steps:
              - checkout: self
                fetchDepth: 0

              - template: /eng/pipelines/templates/steps/typespec-author-eval-setup.yml
                parameters:
                  SkillBranch: ${{ parameters.SkillBranch }}

              # Run evaluations — each suite gets its own step with timeout
              # and continueOnError so failures don't block subsequent suites.
              - ${{ each suite in parameters.ForcedSuites }}:
                - script: |
                    cd .github/skills/azure-typespec-author/evaluate
                    vally eval --eval-spec suites/${{ suite.file }} --output-dir results --verbose
                    EXIT_CODE=$?
                    if [ $EXIT_CODE -ne 0 ]; then
                      echo "##vso[task.logissue type=error]Suite ${{ suite.name }}-forced failed (exit code $EXIT_CODE)"
                      LATEST=$(find results -name 'results.jsonl' -type f -printf '%T@ %p\n' | sort -rn | head -1 | cut -d' ' -f2)
                      if [ -n "$LATEST" ]; then
                        python3 << EOF
                    import json, sys
                    with open("$LATEST") as f:
                        for line in f:
                            r = json.loads(line)
                            name = r.get("gradeResult", {}).get("stimulusName", "")
                            if not name:
                                continue
                            grade = r.get("gradeResult", {})
                            score = grade.get("score", 1)
                            if not isinstance(score, (int, float)) or score >= 1.0:
                                continue
                            print(f"[FAILED] {name} (score: {score})")
                            for g in grade.get("details", []):
                                if not g.get("passed", True):
                                    print(f'  - {g.get("name", "?")}: {g.get("evidence", "no evidence")}')
                                elif isinstance(g.get("score"), (int, float)) and g.get("score") < 1.0:
                                    print(f'  - {g.get("name", "?")} (score: {g.get("score")}): {g.get("evidence", "")}')
                    EOF
                      fi
                      exit $EXIT_CODE
                    fi
                  displayName: Run force invokation suite - ${{ suite.name }}
                  timeoutInMinutes: ${{ suite.timeout }}
                  continueOnError: true
                  condition: always()
                  env:
                    GITHUB_TOKEN: $(azuresdk-copilot-github-pat)
                    FIXTURE_NODE_MODULES: $(Build.SourcesDirectory)/.github/skills/azure-typespec-author/evaluate/fixtures/Microsoft.Widget/Widget/node_modules

            templateContext:
              outputs:
                - output: pipelineArtifact
                  path: $(Build.SourcesDirectory)/.github/skills/azure-typespec-author/evaluate/results
                  artifact: eval-results-code-quality-$(Build.BuildId)
                  displayName: Upload eval results
                  condition: always()

                - output: pipelineArtifact
                  path: $(Build.StagingDirectory)/qa-bot-log
                  artifact: qa-bot-service-log-code-quality
                  displayName: Upload QA bot backend log
                  condition: always()

          - job: RunEvalsForSkillInvokation
            displayName: Run Vally Evaluations for Skill Invokation
            timeoutInMinutes: 170
            steps:
              - checkout: self
                fetchDepth: 0

              - template: /eng/pipelines/templates/steps/typespec-author-eval-setup.yml
                parameters:
                  SkillBranch: ${{ parameters.SkillBranch }}

              # Run evaluations — each suite gets its own step with timeout
              # and continueOnError so failures don't block subsequent suites.
              - ${{ each suite in parameters.SkillInvocationSuites }}:
                - script: |
                    cd .github/skills/azure-typespec-author/evaluate
                    vally eval --eval-spec suites/${{ suite.file }} --output-dir results --verbose
                    EXIT_CODE=$?
                    if [ $EXIT_CODE -ne 0 ]; then
                      echo "##vso[task.logissue type=error]Suite ${{ suite.name }} failed (exit code $EXIT_CODE)"
                      LATEST=$(find results -name 'results.jsonl' -type f -printf '%T@ %p\n' | sort -rn | head -1 | cut -d' ' -f2)
                      if [ -n "$LATEST" ]; then
                        python3 << EOF
                    import json, sys
                    with open("$LATEST") as f:
                        for line in f:
                            r = json.loads(line)
                            name = r.get("gradeResult", {}).get("stimulusName", "")
                            if not name:
                                continue
                            grade = r.get("gradeResult", {})
                            score = grade.get("score", 1)
                            if not isinstance(score, (int, float)) or score >= 1.0:
                                continue
                            print(f"[FAILED] {name} (score: {score})")
                            for g in grade.get("details", []):
                                if not g.get("passed", True):
                                    print(f'  - {g.get("name", "?")}: {g.get("evidence", "no evidence")}')
                                elif isinstance(g.get("score"), (int, float)) and g.get("score") < 1.0:
                                    print(f'  - {g.get("name", "?")} (score: {g.get("score")}): {g.get("evidence", "")}')
                    EOF
                      fi
                      exit $EXIT_CODE
                    fi
                  displayName: Run suite - ${{ suite.name }}
                  timeoutInMinutes: ${{ suite.timeout }}
                  continueOnError: true
                  condition: always()
                  env:
                    GITHUB_TOKEN: $(azuresdk-copilot-github-pat)
                    FIXTURE_NODE_MODULES: $(Build.SourcesDirectory)/.github/skills/azure-typespec-author/evaluate/fixtures/Microsoft.Widget/Widget/node_modules

            templateContext:
              outputs:
                - output: pipelineArtifact
                  path: $(Build.SourcesDirectory)/.github/skills/azure-typespec-author/evaluate/results
                  artifact: eval-results-skill-invocation-$(Build.BuildId)
                  displayName: Upload eval results
                  condition: always()

                - output: pipelineArtifact
                  path: $(Build.StagingDirectory)/qa-bot-log
                  artifact: qa-bot-service-log-skill-invocation
                  displayName: Upload QA bot backend log
                  condition: always()
# CD pipeline — backend (Go App Service).
# Infrastructure provisioning (qaBotBackend layer) is an integrated first
# stage that only runs when the relevant infra files have changed since the
# previous commit, or when runProvision is forced to true.

name: tools - sdk-ai-bots-backend - cd

trigger: none
pr: none

parameters:
    - name: environment
      type: string
      default: dev
      values: [dev, preview, prod]
    - name: imageTag
      type: string
    - name: slot
      type: string
      default: authoring # the existing backend uses 'authoring' as the staging slot
      values: [authoring, default]
    - name: rollbackOnFailure
      type: boolean
      default: true
    - name: runProvision
      type: boolean
      default: false
      displayName: 'Force provision (skip infra-diff check)'
    - name: deployLayer
      type: string
      default: backend
      values:
          - '' # empty = full azd provision graph, no scoping
          - shared-resources
          - agent-platform
          - backend
          - logic-app
          - frontend
          - function-app

variables:
    - template: /eng/pipelines/templates/variables/globals.yml
    - template: /eng/pipelines/templates/variables/image.yml
    # `appName` comes from BACKEND_SITE_NAME (exported by load-environment-suite.yml).
    # Downstream templates read $(BACKEND_SITE_NAME) directly.
    - name: imageName
      value: 'azure-sdk-qa-bot-backend'

extends:
    template: /eng/pipelines/templates/stages/1es-redirect.yml
    parameters:
        Use1ESOfficial: true
        stages:
            # ── Stage 1: Provision ────────────────────────────────────────────────
            # InfraDiff detects whether qaBotBackend infra files changed.
            # Apply only runs when a diff is found or runProvision is forced.
            - stage: ProvisionBackend
              displayName: 'Provision backend infra (${{ parameters.environment }})'
              jobs:
                  - job: InfraDiff
                    displayName: 'Detect infra diff'
                    pool:
                        name: $(LINUXPOOL)
                        image: $(LINUXVMIMAGE)
                        os: linux
                    steps:
                        - checkout: self
                        - bash: |
                              CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null \
                                | grep -E "^tools/sdk-ai-bots/deployment/infra/modules/qaBotBackend/" \
                                || true)
                              if [ -n "$CHANGED" ]; then
                                echo "Infra changes detected:"
                                echo "$CHANGED"
                                echo "##vso[task.setvariable variable=INFRA_CHANGED;isOutput=true]true"
                              else
                                echo "No infra changes detected."
                                echo "##vso[task.setvariable variable=INFRA_CHANGED;isOutput=true]false"
                              fi
                          name: diffCheck
                          displayName: 'Check infra diff (HEAD~1)'

                  - deployment: Apply
                    displayName: 'Apply infra changes'
                    dependsOn: InfraDiff
                    condition: and(succeeded('InfraDiff'), or(${{ parameters.runProvision }}, eq(dependencies.InfraDiff.outputs['diffCheck.INFRA_CHANGED'], 'true')))
                    environment: 'sdk-ai-bots-${{ parameters.environment }}'
                    pool:
                        name: $(LINUXPOOL)
                        image: $(LINUXVMIMAGE)
                        os: linux
                    strategy:
                        runOnce:
                            deploy:
                                steps:
                                    - checkout: self
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/load-environment-suite.yml
                                      parameters:
                                          environment: '${{ parameters.environment }}'
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/azd-auth.yml
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/bicep-validate.yml
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/bicep-what-if.yml
                                      parameters:
                                          parametersFile: '$(System.DefaultWorkingDirectory)/tools/sdk-ai-bots/deployment/infra/environments/${{ parameters.environment }}.parameters.json'
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/azd-provision.yml
                                      parameters:
                                          deployLayer: '${{ parameters.deployLayer }}'

            # ── Stage 2: Deploy ───────────────────────────────────────────────────
            - stage: DeployBackend
              displayName: 'Deploy backend → ${{ parameters.environment }} / ${{ parameters.slot }}'
              dependsOn: ProvisionBackend
              condition: in(dependencies.ProvisionBackend.result, 'Succeeded', 'SucceededWithIssues')
              jobs:
                  - deployment: Deploy
                    environment: 'sdk-ai-bots-${{ parameters.environment }}'
                    pool:
                        name: $(LINUXPOOL)
                        image: $(LINUXVMIMAGE)
                        os: linux
                    strategy:
                        runOnce:
                            deploy:
                                steps:
                                    - checkout: self
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/load-environment-suite.yml
                                      parameters:
                                          environment: '${{ parameters.environment }}'
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/azd-auth.yml

                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/webapp-deploy.yml
                                      parameters:
                                          appName: $(BACKEND_SITE_NAME)
                                          imageName: $(imageName)
                                          imageTag: '${{ parameters.imageTag }}'
                                          slot: '${{ parameters.slot }}'

                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/smoke-test.yml
                                      parameters:
                                          appName: $(BACKEND_SITE_NAME)
                                          slot: '${{ parameters.slot }}'
                                          healthPath: /ping

                                    # Swap staging (authoring) → production for preview/prod.
                                    - ${{ if and(ne(parameters.environment, 'dev'), eq(parameters.slot, 'authoring')) }}:
                                          - template: /tools/sdk-ai-bots/deployment/pipelines/templates/swap-slot.yml
                                            parameters:
                                                appName: $(BACKEND_SITE_NAME)
                                                sourceSlot: authoring
                                                targetSlot: production
                                          - template: /tools/sdk-ai-bots/deployment/pipelines/templates/smoke-test.yml
                                            parameters:
                                                appName: $(BACKEND_SITE_NAME)
                                                slot: default
                                                healthPath: /ping

                                    - task: AzureCLI@2
                                      displayName: 'Record LastKnownGoodTag'
                                      inputs:
                                          azureSubscription: $(SERVICE_CONNECTION)
                                          scriptType: bash
                                          scriptLocation: inlineScript
                                          inlineScript: |
                                              az appconfig kv set --name "$APP_CONFIG_NAME" \
                                                --key "Deployment:backend:LastKnownGoodTag" \
                                                --value "${{ parameters.imageTag }}" --yes

                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/notify.yml
                                      parameters:
                                          component: backend
                                          environment: '${{ parameters.environment }}'
                                          status: success
                                          details: 'tag=${{ parameters.imageTag }} slot=${{ parameters.slot }}'

                            on:
                                failure:
                                    steps:
                                        - ${{ if eq(parameters.rollbackOnFailure, true) }}:
                                              - template: /tools/sdk-ai-bots/deployment/pipelines/templates/rollback.yml
                                                parameters:
                                                    component: backend
                                                    appName: $(BACKEND_SITE_NAME)
                                                    imageName: $(imageName)
                                                    slot: default
                                        - template: /tools/sdk-ai-bots/deployment/pipelines/templates/notify.yml
                                          parameters:
                                              component: backend
                                              environment: '${{ parameters.environment }}'
                                              status: failure
                                              details: 'failed deploying tag=${{ parameters.imageTag }}'

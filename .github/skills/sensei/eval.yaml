name: sensei-eval
description: Evaluation suite for sensei skill improvement skill.
skill: sensei
version: "1.0"
config:
  model: gpt-4o
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
graders:
  - type: text
    name: mentions_skill_concepts
    config:
      contains: ["skill", "frontmatter", "token", "improve", "compliance"]
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 50"
tasks:
  - "tasks/*.yaml"

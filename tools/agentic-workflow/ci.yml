trigger:
    branches:
        include:
            - main
            - feature/*
            - release/*
            - hotfix/*
    paths:
        include:
            - tools/agentic-workflow

pr:
    branches:
        include:
            - main
            - feature/*
            - release/*
            - hotfix/*
    paths:
        include:
            - tools/agentic-workflow

extends:
    template: /eng/pipelines/templates/stages/1es-redirect.yml
    parameters:
        stages:
            - stage: BuildAndTest
              displayName: Build and Test
              variables:
                  - template: /eng/pipelines/templates/variables/globals.yml
                  - template: /eng/pipelines/templates/variables/image.yml
                  - name: NodeVersion
                    value: "22.x"
              jobs:
                  - job: BuildTest_Linux
                    displayName: Build and Test (Linux)
                    pool:
                        name: $(LINUXPOOL)
                        image: $(LINUXVMIMAGE)
                        os: linux
                    steps:
                        - task: NodeTool@0
                          inputs:
                              versionSpec: $(NodeVersion)
                          displayName: Use Node $(NodeVersion)
                        - script: npm ci
                          workingDirectory: $(Build.SourcesDirectory)/tools/agentic-workflow
                          displayName: Install dependencies
                        - script: npm run build
                          workingDirectory: $(Build.SourcesDirectory)/tools/agentic-workflow
                          displayName: Build
                        - script: npm run format:check
                          workingDirectory: $(Build.SourcesDirectory)/tools/agentic-workflow
                          displayName: Format check
                        - script: npm test
                          workingDirectory: $(Build.SourcesDirectory)/tools/agentic-workflow
                          displayName: Test (mocked harness, no SDK calls)

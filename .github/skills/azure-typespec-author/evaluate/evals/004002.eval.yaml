name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability # capability | regression

# Root-level environment
environment: azsdk-mcp

# Execution configuration
config:
  runs: 1 # Trials per stimulus
  timeout: "660s" # Seconds per trial
  model: claude-opus-4.6 #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk # Which executor to use

# Test cases
stimuli:
  - name: 004002-decorate-length-constrains-on-array-item-trigger
    tags:
      suite: "decorators"
      mode: "trigger"
    prompt: |
      I have a property `assets: string[]` in EmployeeProperties. Add @minLength(3) @maxLength(10) constraints for any item of the assets array. Ensure the definition meets TypeSpec Azure guidelines.
    environment: &shared_environment
      files:
        - src: ../fixtures/004002-decorate-length-constrains-on-array-item/employee.tsp
          dest: employee.tsp
        - src: ../fixtures/004002-decorate-length-constrains-on-array-item/main.tsp
          dest: main.tsp
        - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
          dest: package-lock.json
        - src: ../fixtures/Microsoft.Widget/Widget/package.json
          dest: package.json
        - src: ../fixtures/004002-decorate-length-constrains-on-array-item/readme.md
          dest: readme.md
        - src: ../fixtures/004002-decorate-length-constrains-on-array-item/shared.tsp
          dest: shared.tsp
        - src: ../fixtures/004002-decorate-length-constrains-on-array-item/tspconfig.yaml
          dest: tspconfig.yaml
      commands:
        - 'node -e "const fs=require(''fs'');const t=process.env.FIXTURE_NODE_MODULES;if(t&&fs.existsSync(t)&&!fs.existsSync(''node_modules'')){fs.symlinkSync(t,''node_modules'',''junction'')}"'
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
            - "azure-sdk-mcp-azsdk_run_typespec_validation"
      - type: "skill-invocation"
        config:
          required:
            - "azure-typespec-author"
    constraints:
      max_turns: 5
      max_tokens: 1000000
  - name: 004002-decorate-length-constrains-on-array-item-forced
    tags:
      suite: "decorators"
      mode: "forced"
    prompt: |
      @azure-typespec-author I have a property `assets: string[]` in EmployeeProperties. Add @minLength(3) @maxLength(10) constraints for any item of the assets array. Ensure the definition meets TypeSpec Azure guidelines.
    environment: *shared_environment
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
            - "azure-sdk-mcp-azsdk_run_typespec_validation"
      - type: "run-command"
        config:
          command: "tsp compile ."
          expected_exit_code: 0
      - type: "file-matches"
        config:
          pattern: "scalar.*extends string"
          path: "employee.tsp"
      - type: "file-matches"
        config:
          pattern: '@minLength\(3\)'
          path: "employee.tsp"
      - type: "file-matches"
        config:
          pattern: '@maxLength\(10\)'
          path: "employee.tsp"
      - type: "file-not-matches"
        config:
          pattern: 'assets:\s*string\[\]'
          path: "employee.tsp"
    constraints:
      max_turns: 5
      max_tokens: 1000000
  - name: 004002-decorate-length-constrains-on-array-item-no-skill
    tags:
      suite: "decorators"
      mode: "no-skill"
    prompt: "I have a property `assets: string[]` in EmployeeProperties. Add @minLength(3) @maxLength(10) constraints for any item of the assets array. Ensure the definition meets TypeSpec Azure guidelines."
    environment: *shared_environment
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
      - type: "file-matches"
        config:
          path: "employee.tsp"
          pattern: "scalar.*extends string"
      - type: "file-matches"
        config:
          path: "employee.tsp"
          pattern: '@minLength\(3\)'
      - type: "file-matches"
        config:
          path: "employee.tsp"
          pattern: '@maxLength\(10\)'
      - type: "file-not-matches"
        config:
          path: "employee.tsp"
          pattern: 'assets:\s*string\[\]'
      - type: "prompt"
        config:
          prompt: "Verify asset use the custom scalar type with minLength and maxLength constraints instead of plain string."
          model: "claude-opus-4.6"
          scoring: "scale_1_10"
          threshold: 0.88
    constraints:
      max_turns: 10
      max_tokens: 100000

scoring:
  weights:
    prompt: 1
    run-command: 1
    skill-invocation: 1
    file-matches: 4
  threshold: 0.97

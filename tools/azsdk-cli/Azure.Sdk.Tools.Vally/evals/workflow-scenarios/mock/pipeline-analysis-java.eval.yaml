                "line": 3230,
                "message": "Test proxy returned a non-successful status code. 404; response: {\"Message\":\"Recording file path /mnt/vss/_work/1/s/.assets/yoPImn7QKL/java/sdk/storage/azure-storage-blob/src/test/resources/session-records/BlobApiTests.uploadStreamAccessTierSmart.json does not exist.\",\"Status\":\"NotFound\"}"
              },
              {
                "file": "sdk/storage/azure-storage-blob/src/test/java/com/azure/storage/blob/BlobApiTests.java",
                "line": 3230,
                "message": "Test proxy returned a non-successful status code. 404; response: {\"Message\":\"Recording file path D:/a/_work/1/s/.assets/yoPImn7QKL/java\\\\sdk\\\\storage\\\\azure-storage-blob\\\\src\\\\test\\\\resources\\\\session-records\\\\BlobApiTests.uploadStreamAccessTierSmart.json does not exist.\",\"Status\":\"NotFound\"}"
              },
              {
                "file": "sdk/storage/azure-storage-blob/src/test/java/com/azure/storage/blob/BlobAsyncApiTests.java",
                "line": 2582,
                "message": "Test proxy returned a non-successful status code. 404; response: {\"Message\":\"Recording file path D:/a/_work/1/s/.assets/yoPImn7QKL/java\\\\sdk\\\\storage\\\\azure-storage-blob\\\\src\\\\test\\\\resources\\\\session-records\\\\BlobAsyncApiTests.uploadStreamAccessTierSmart.json does not exist.\",\"Status\":\"NotFound\"}"
              }
            ]
          }
        ]
      }
    constraints:
      max_turns: 6
      max_tokens: 8000
    graders:
      - type: completed
      - type: skill-invocation
        config:
          required:
            - azsdk-common-pipeline-troubleshooting
      - type: output-matches
        config:
          pattern: "(?i)(uploadStreamAccessTierSmart|smart access tier|access tier)"
      - type: output-matches
        config:
          pattern: "(?i)(recording|playback|test.?proxy|404)"
      - type: output-matches
        config:
          pattern: "(?i)(re-?record|record mode|record the test|sync.*recording|restore.*recording)"
      - type: output-not-matches
        config:
          pattern: "(?i)(product code bug|service outage)"
      - type: prompt
        config:
          model: gpt-5.4
          scoring: binary
          threshold: 1.0
          prompt: |
            Build 6449182 failed because the test proxy returned 404 - the
            recording files for the BlobApiTests / BlobAsyncApiTests
            uploadStreamAccessTierSmart (SMART access tier) tests do not exist.
            Does the response (a) identify
            this as a missing test recording (test-proxy 404), not a code or
            service bug, and (b) recommend re-recording / syncing the recordings
            rather than editing product code? Answer "pass" or "fail".

scoring:
  weights:
    skill-invocation: 1
    output-matches: 1
    output-not-matches: 1
    prompt: 1
  threshold: 1.0
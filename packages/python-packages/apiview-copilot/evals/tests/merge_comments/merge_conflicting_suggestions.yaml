  > **guideline_id:** python_design.html#python-client-namespace<br>**score:** 80<br>
  ## Use a clear, concise name for the service client

  DO name service clients with a clear, concise name that identifies the service and the type of client. The name should be descriptive and not overly verbose.

  ### BAD Examples

  ```python
  class MyServiceManagerClient:
      ...
  ```

  ### GOOD Examples

  ```python
  class BlobClient:
      ...
  ```

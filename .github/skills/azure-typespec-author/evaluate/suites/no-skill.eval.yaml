    graders:
      - type: tool-calls
        config:
          required:
            - edit
      - type: file-matches
        config:
          path: main.tsp
          pattern: 2025-05-04-preview
      - type: file-matches
        config:
          path: employee.tsp
          pattern: "@madeOptional"
      - type: file-matches
        config:
          path: employee.tsp
          pattern: 2025-05-04-preview|v2025_05_04_preview
      - type: prompt
        config:
          scoring: scale_1_10
          threshold: 1
          prompt: "Verify change scope and quality only: no unrelated edits, and the implemented result is semantically consistent with the task intent."
          model: claude-opus-4.6

  - name: 001004-version-property-decorator
    tags:
      suite: versioning
    prompt: |
      change the visibility of property 'provisioningState' from Lifecycle.Read to Lifecycle.Read and Lifecycle.Create in version 2025-05-04-preview only
    constraints:
      max_turns: 6
      max_tokens: 100000

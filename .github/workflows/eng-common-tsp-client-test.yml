name: eng/common/tsp-client - test

on:
  pull_request:
    paths:
      - .github/workflows/eng-common-tsp-client-tests.yml
      - eng/common/tsp-client/**
      - eng/common-tests/tsp-client/**

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tools/eng/common-tests/tsp-client

    steps:
      - name: Checkout self
        uses: actions/checkout@v6
        with:
          path: tools
          sparse-checkout: |
            .github
            eng/common/tsp-client
            eng/common-tests/tsp-client

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          cache: "npm"
          cache-dependency-path: |
            tools/eng/common/tsp-client/package-lock.json
            tools/eng/common-tests/tsp-client/package-lock.json

      - name: Install eng/common/tsp-client
        run: |
          echo "::group::npm ci --no-audit --no-fund --prefer-offline"
          npm ci --no-audit --no-fund --prefer-offline
          echo "::endgroup::"
          echo "::group::npm ls -a"
          npm ls -a || true
          echo "::endgroup::"
        working-directory: tools/eng/common/tsp-client

      - name: Install deps
        run: |
          echo "::group::npm ci --no-audit --no-fund --prefer-offline"
          npm ci --no-audit --no-fund --prefer-offline
          echo "::endgroup::"
          echo "::group::npm ls -a"
          npm ls -a || true
          echo "::endgroup::"

      - name: npm run lint
        run: npm run lint

      - name: npm run format:check:ci
        run: npm run format:check:ci

      # TODO: migrate test from bash to vitest
      #
      # - name: Checkout js
      #   uses: actions/checkout@v6
      #   with:
      #     repository: Azure/azure-sdk-for-js
      #     path: js
      #     sparse-checkout: |
      #       eng
      #       sdk/template
      #
      # - name: "[js] tsp-client update"
      #   run: |
      #     npm exec \
      #       --prefix "${{ github.workspace }}/tools/eng/common/tsp-client" \
      #       --no -- \
      #       tsp-client update
      #   working-directory: js/sdk/template/template

      - name: npm run test:ci
        run: |
          set -o pipefail
          npm run test:ci | tee vitest-output.txt
          {
            echo '## Vitest Summary'
            echo '```text'
            awk '/Test Files/{flag=1} flag{print} /Duration/{flag=0}' vitest-output.txt | sed 's/\x1b\[[0-9;]*m//g'
            echo '```'
            echo '<details>'
            echo '<summary>Full Vitest Results</summary>'
            echo ''
            echo '```text'
            sed 's/\x1b\[[0-9;]*m//g' vitest-output.txt
            echo '```'
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"

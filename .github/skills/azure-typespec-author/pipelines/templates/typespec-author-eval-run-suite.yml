parameters:
  - name: EvalFile
    type: string
  - name: SuiteName
    type: string
  - name: DisplayName
    type: string
  - name: TimeoutMinutes
    type: number

steps:
  - script: |
      export AZURE_REST_API_SPECS_NODE_MODULES="$(Pipeline.Workspace)/azure-rest-api-specs/node_modules"
      export PATH="$AZURE_REST_API_SPECS_NODE_MODULES/.bin:$PATH"
      bash .github/skills/azure-typespec-author/evaluate/scripts/run-eval-suite.sh "${{ parameters.EvalFile }}" "${{ parameters.SuiteName }}"
    displayName: ${{ parameters.DisplayName }}
    timeoutInMinutes: ${{ parameters.TimeoutMinutes }}
    continueOnError: true
    condition: always()
    env:
      GITHUB_TOKEN: $(azuresdk-copilot-github-pat)

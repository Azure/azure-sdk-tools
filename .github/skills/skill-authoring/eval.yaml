name: skill-authoring-eval
description: Evaluation suite for skill authoring skill.
skill: skill-authoring
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
graders:
  - type: text
    name: mentions_authoring_concepts
    config:
      contains: ["skill", "authoring", "frontmatter", "guidelines", "structure"]
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 50"
tasks:
  - "tasks/*.yaml"

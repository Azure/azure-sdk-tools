steps:
  - script: |
      set -e
      BRANCH="${SKILL_BRANCH:-}"
      if [ "$BRANCH" = '$(SkillBranch)' ]; then
        BRANCH=""
      fi
      if [ -z "$BRANCH" ]; then
        echo "SkillBranch not set; keep current checked-out skill files."
        exit 0
      fi

      BRANCH_REF="$BRANCH"
      case "$BRANCH_REF" in
        refs/heads/*)
          ;;
        refs/remotes/origin/*)
          BRANCH_REF="refs/heads/${BRANCH_REF#refs/remotes/origin/}"
          ;;
        origin/*)
          BRANCH_REF="refs/heads/${BRANCH_REF#origin/}"
          ;;
        refs/*)
          ;;
        *)
          BRANCH_REF="refs/heads/$BRANCH_REF"
          ;;
      esac

      echo "Overlaying azure-typespec-author skill from: $BRANCH_REF"
      git fetch origin "$BRANCH_REF"
      rm -rf .github/skills/azure-typespec-author/SKILL.md \
             .github/skills/azure-typespec-author/references
      git checkout FETCH_HEAD -- \
        .github/skills/azure-typespec-author/SKILL.md \
        .github/skills/azure-typespec-author/references
      echo "Skill source overlaid from $BRANCH_REF"
    displayName: 'Overlay skill source from SkillBranch (if set)'
    env:
      SKILL_BRANCH: $(SkillBranch)

  - script: |
      set -e
      npm ci --userconfig $(Build.SourcesDirectory)/.npmrc
      echo "##vso[task.prependpath]$(Build.SourcesDirectory)/eng/pipelines/azure-typespec-author-eval/node_modules/.bin"
    displayName: 'Install TypeSpec toolchain (pinned)'
    workingDirectory: $(Build.SourcesDirectory)/eng/pipelines/azure-typespec-author-eval

  - script: |
      set -e
      echo "tsp version:"
      tsp --version
    displayName: 'Verify TypeSpec toolchain on PATH'

  - script: |
      set -e
      node .github/skills/azure-typespec-author/evaluate/scripts/setup-fixture-files.js
      FIXTURE_DIR=".github/skills/azure-typespec-author/evaluate/fixtures/Microsoft.Widget/Widget"
      cd "$FIXTURE_DIR"
      npm ci --userconfig $(Build.SourcesDirectory)/.npmrc
      echo "##vso[task.setvariable variable=FIXTURE_NODE_MODULES]$(Build.SourcesDirectory)/$FIXTURE_DIR/node_modules"
    displayName: 'Prepare fixture files and node_modules'

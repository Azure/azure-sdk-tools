# CI pipeline — function-app (Node).
name: tools - sdk-ai-bots-function-app - ci

trigger:
    branches:
        include:
            - main
    paths:
        include:
            - tools/sdk-ai-bots/azure-sdk-qa-bot-function/**
pr:
    branches:
        include:
            - main
    paths:
        include:
            - tools/sdk-ai-bots/azure-sdk-qa-bot-function/**

variables:
    - template: /eng/pipelines/templates/variables/globals.yml
    - template: /eng/pipelines/templates/variables/image.yml
    - name: workingDirectory
      value: '$(System.DefaultWorkingDirectory)/tools/sdk-ai-bots/azure-sdk-qa-bot-function'

extends:
    template: /eng/pipelines/templates/stages/1es-redirect.yml
    parameters:
        Use1ESOfficial: false
        stages:
            - stage: FunctionAppCI
              jobs:
                  - job: BuildTest
                    pool:
                        name: $(LINUXPOOL)
                        image: $(LINUXVMIMAGE)
                        os: linux
                    steps:
                        - checkout: self
                        - template: /tools/sdk-ai-bots/deployment/pipelines/templates/load-environment-suite.yml
                          parameters:
                              environment: dev
                        - template: /tools/sdk-ai-bots/deployment/pipelines/templates/azd-auth.yml
                        - task: NodeTool@0
                          inputs: { versionSpec: '20.x' }
                        - script: npm ci
                          workingDirectory: $(workingDirectory)
                        - script: npm run build
                          workingDirectory: $(workingDirectory)
                        - template: /tools/sdk-ai-bots/deployment/pipelines/templates/container-build.yml
                          parameters:
                              imageName: 'azure-sdk-qa-bot-function'
                              dockerContext: '$(workingDirectory)'
                              dockerfile: '$(workingDirectory)/Dockerfile'
                              buildMode: 'acr-build'
                              tagStrategy: 'semver'
                              semverFile: '$(workingDirectory)/package.json'

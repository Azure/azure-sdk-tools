name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability               # capability | regression

# Root-level environment
environment: azsdk-mcp

# Execution configuration
config:
  runs: 1                        # Trials per stimulus
  timeout: "660s"                # Seconds per trial
  model: claude-opus-4.6         #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk          # Which executor to use

# Test cases
stimuli:
- name: 001003-version-required-to-optional
  tags:
    - 'main'
  prompt: |
    change the property age of EmployeeProperties from required to optional only for api version 2025-05-04-preview
    
  environment: &shared_environment
    files:
      - src: ../fixtures/001-share-version-new-feature/employee.tsp
        dest: employee.tsp
      - src: ../fixtures/001-share-version-new-feature/main.tsp
        dest: main.tsp
      - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
        dest: package-lock.json
      - src: ../fixtures/Microsoft.Widget/Widget/package.json
        dest: package.json
      - src: ../fixtures/001-share-version-new-feature/readme.md
        dest: readme.md
      - src: ../fixtures/001-share-version-new-feature/shared.tsp
        dest: shared.tsp
      - src: ../fixtures/001-share-version-new-feature/tspconfig.yaml
        dest: tspconfig.yaml
    commands:
      - 'node -e "const fs=require(''fs'');const t=process.env.FIXTURE_NODE_MODULES;if(t&&fs.existsSync(t)&&!fs.existsSync(''node_modules'')){fs.symlinkSync(t,''node_modules'',''junction'')}"'
  graders:
  - type: 'tool-calls'
    config:
      required:
        - 'edit'
        - 'azure-sdk-mcp-azsdk_run_typespec_validation'
  - type: 'skill-invocation'
    config:
      required:
        - 'azure-typespec-author'
  - type: 'file-matches'
    config:
      pattern: '2025-05-04-preview'
      path: 'main.tsp'
  - type: 'file-matches'
    config:
      pattern: '@madeOptional'
      path: 'employee.tsp'
  - type: 'file-matches'
    config:
      pattern: '2025-05-04-preview|v2025_05_04_preview'
      path: 'employee.tsp'
  - type: 'prompt'
    config:
      threshold: 1
      model: 'claude-opus-4.6'
      scoring: 'scale_1_5'
      prompt: 'Verify change scope and quality only: no unrelated edits, and the implemented result is semantically consistent with the task intent.'
  constraints:
    max_turns: 6
    max_tokens: 100000
- name: 001003-version-required-to-optional-trigger
  tags:
    - 'trigger'
  prompt: |
    change the property age of EmployeeProperties from required to optional only for api version 2025-05-04-preview
    
  environment: *shared_environment
  graders:
  - type: 'tool-calls'
    config:
      required:
        - 'edit'
        - 'azure-sdk-mcp-azsdk_run_typespec_validation'
  - type: 'skill-invocation'
    config:
      required:
        - 'azure-typespec-author'
  constraints:
    max_turns: 5
    max_tokens: 50000
- name: 001003-version-required-to-optional-forced
  tags:
    - 'forced'
  prompt: |
    @azure-typespec-author change the property age of EmployeeProperties from required to optional only for api version 2025-05-04-preview
    
  environment: *shared_environment
  graders:
  - type: 'tool-calls'
    config:
      required:
        - 'edit'
        - 'azure-sdk-mcp-azsdk_run_typespec_validation'
  - type: 'skill-invocation'
    config:
      required:
        - 'azure-typespec-author'
  constraints:
    max_turns: 5
    max_tokens: 50000
scoring:
  weights:
    prompt: 1
    tool-calls: 1
    skill-invocation: 1
    file-matches: 2
  threshold: 1
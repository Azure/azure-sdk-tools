# CCR dashboard — one-shot GitHub Pages deploy (manual).
#
# Quick, share-a-link deploy of the CURRENT committed static dashboard. Run it
# manually (Actions -> "tools - ccr-dashboard-pages" -> Run workflow). It publishes
# whatever is committed under the dashboard/ folder as-is. Not a long-term / auto
# solution — just a snapshot you can share.
name: "tools - ccr-dashboard-pages"

on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ccr-dashboard-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Upload dashboard as Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: .github/aw/ccr-improvement-loop/dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author - long-running operation cases (003001-003002).
version: "1.0"
type: capability

environment: azsdk-mcp

config:
  runs: 1
  timeout: "660s"
  model: claude-opus-4.6
  executor: copilot-sdk
  workers: 2

stimuli:
- name: 003001-arm-action-lro
  prompt: |
    Add a post async operation to move employee, operation's request is MoveRequest, response is MoveResponse.
  constraints:
    max_turns: 10
    max_tokens: 100000
  environment:
    files:
      - src: ../fixtures/003-long-running-operation-share/employee.tsp
        dest: employee.tsp
      - src: ../fixtures/003-long-running-operation-share/main.tsp
        dest: main.tsp
      - src: ../fixtures/Microsoft.Widget/Widget/package.json
        dest: package.json
      - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
        dest: package-lock.json
      - src: ../fixtures/Microsoft.Widget/Widget/node_modules
        dest: node_modules
      - src: ../fixtures/003-long-running-operation-share/readme.md
        dest: readme.md
      - src: ../fixtures/003-long-running-operation-share/shared.tsp
        dest: shared.tsp
      - src: ../fixtures/003-long-running-operation-share/tspconfig.yaml
        dest: tspconfig.yaml
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azure-sdk-mcp-azsdk_typespec_generate_authoring_plan
        - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: skill-invocation
    config:
      required:
        - azure-typespec-author

- name: 003002-arm-modify-response
  prompt: |
    Modify the LRO createOrUpdate PUT operation in interface Employees so that it returns Azure-AsyncOperation header but NOT Retry-After header in the 201 response. The operation currently uses ArmResourceCreateOrReplaceAsync<Employee> template.
  constraints:
    max_turns: 10
    max_tokens: 100000
  environment:
    files:
      - src: ../fixtures/Microsoft.Widget/Widget/employee.tsp
        dest: employee.tsp
      - src: ../fixtures/Microsoft.Widget/Widget/main.tsp
        dest: main.tsp
      - src: ../fixtures/Microsoft.Widget/Widget/package.json
        dest: package.json
      - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
        dest: package-lock.json
      - src: ../fixtures/Microsoft.Widget/Widget/node_modules
        dest: node_modules
      - src: ../fixtures/Microsoft.Widget/Widget/readme.md
        dest: readme.md
      - src: ../fixtures/Microsoft.Widget/Widget/shared.tsp
        dest: shared.tsp
      - src: ../fixtures/Microsoft.Widget/Widget/tspconfig.yaml
        dest: tspconfig.yaml
      - src: ../fixtures/Microsoft.Widget/Widget/stable/2021-11-01/widget.json
        dest: stable/2021-11-01/widget.json
      - src: ../fixtures/Microsoft.Widget/Widget/preview/2024-10-01-preview/widget.json
        dest: preview/2024-10-01-preview/widget.json
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azure-sdk-mcp-azsdk_typespec_generate_authoring_plan
        - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: skill-invocation
    config:
      required:
        - azure-typespec-author

scoring:
  weights:
    tool-calls: 1
    skill-invocation: 1
  threshold: 1.0

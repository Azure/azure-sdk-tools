name: azure-typespec-author-eval-forced
description: Evaluation suite for azure-typespec-author - decorators cases with forced skill invocation and code quality graders.
version: "1.0"
type: capability

environment: azsdk-mcp

config:
  runs: 1
  timeout: "660s"
  model: claude-opus-4.6
  executor: copilot-sdk
  workers: 3

stimuli:
- name: 004001-decorate-mgmt-resource-name-parameter
  prompt: |
    @azure-typespec-author use authoring plan to add minLength decorator to set the minLength 1 for resource name parameter of Employee resource
  constraints:
    max_turns: 10
    max_tokens: 100000
  environment:
    files:
    - src: ../fixtures/Microsoft.Widget/Widget/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/main.tsp
      dest: main.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
      dest: package-lock.json
    - src: ../fixtures/Microsoft.Widget/Widget/node_modules
      dest: node_modules
    - src: ../fixtures/Microsoft.Widget/Widget/readme.md
      dest: readme.md
    - src: ../fixtures/Microsoft.Widget/Widget/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/tspconfig.yaml
      dest: tspconfig.yaml
    - src: ../fixtures/Microsoft.Widget/Widget/stable/2021-11-01/widget.json
      dest: stable/2021-11-01/widget.json
    - src: ../fixtures/Microsoft.Widget/Widget/preview/2024-10-01-preview/widget.json
      dest: preview/2024-10-01-preview/widget.json
  graders:
  - type: tool-calls
    config:
      required:
      - edit
      - azure-sdk-mcp-azsdk_typespec_generate_authoring_plan
      - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: skill-invocation
    config:
      required:
      - azure-typespec-author
  - type: file-matches
    config:
      path: '*.tsp'
      pattern: '@@minLength\(Employee\.name,\s*1\)'
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: 'Verify change scope and quality only: no unrelated edits, and the implemented result is semantically consistent with the task intent.'
      model: claude-opus-4.6

- name: 004002-decorate-length-constrains-on-array-item
  prompt: |
    @azure-typespec-author I have a property `assets: string[]` in EmployeeProperties. Add @minLength(3) @maxLength(10) constraints for any item of the assets array. Ensure the definition meets TypeSpec Azure guidelines.
  constraints:
    max_turns: 10
    max_tokens: 100000
  environment:
    files:
    - src: ../fixtures/004002-decorate-length-constrains-on-array-item/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/004002-decorate-length-constrains-on-array-item/main.tsp
      dest: main.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
      dest: package-lock.json
    - src: ../fixtures/Microsoft.Widget/Widget/node_modules
      dest: node_modules
    - src: ../fixtures/004002-decorate-length-constrains-on-array-item/readme.md
      dest: readme.md
    - src: ../fixtures/004002-decorate-length-constrains-on-array-item/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/004002-decorate-length-constrains-on-array-item/tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  - type: tool-calls
    config:
      required:
      - edit
      - azure-sdk-mcp-azsdk_typespec_generate_authoring_plan
      - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: skill-invocation
    config:
      required:
      - azure-typespec-author
  - type: file-matches
    config:
      path: employee.tsp
      pattern: 'scalar.*extends string'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@minLength\(3\)'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@maxLength\(10\)'
  # VP2: Assets array uses custom scalar type instead of plain string
  - type: file-not-matches
    config:
      path: employee.tsp
      pattern: 'assets:\s*string\[\]'
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: 'Verify asset use the custom scalar type with minLength and maxLength constraints instead of plain string.'
      model: claude-opus-4.6

- name: 004003-delete-and-restore-operationId-decorator
  prompt: |
    @azure-typespec-author Remove @operationId and its associated #suppress for no-openapi from all operations. Then restore those operationIds that do not contain underscores or begin with a lowercase letter.
  constraints:
    max_turns: 10
    max_tokens: 100000
  environment:
    files:
    - src: ../fixtures/004003-delete-and-restore-operationId-decorator/BastionHost.tsp
      dest: BastionHost.tsp
    - src: ../fixtures/004003-delete-and-restore-operationId-decorator/BgpConnection.tsp
      dest: BgpConnection.tsp
    - src: ../fixtures/004003-delete-and-restore-operationId-decorator/ExpressRouteGateway.tsp
      dest: ExpressRouteGateway.tsp
    - src: ../fixtures/004003-delete-and-restore-operationId-decorator/ExpressRoutePort.tsp
      dest: ExpressRoutePort.tsp
    - src: ../fixtures/004003-delete-and-restore-operationId-decorator/ExpressRouteProviderPort.tsp
      dest: ExpressRouteProviderPort.tsp
    - src: ../fixtures/004003-delete-and-restore-operationId-decorator/NetworkInterface.tsp
      dest: NetworkInterface.tsp
    - src: ../fixtures/004003-delete-and-restore-operationId-decorator/P2SVpnGateway.tsp
      dest: P2SVpnGateway.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
      dest: package-lock.json
    - src: ../fixtures/Microsoft.Widget/Widget/node_modules
      dest: node_modules
    - src: ../fixtures/004003-delete-and-restore-operationId-decorator/Route.tsp
      dest: Route.tsp
    - src: ../fixtures/004003-delete-and-restore-operationId-decorator/VpnServerConfigurationPolicyGroup.tsp
      dest: VpnServerConfigurationPolicyGroup.tsp
    - src: ../fixtures/004003-delete-and-restore-operationId-decorator/VpnSiteLinkConnection.tsp
      dest: VpnSiteLinkConnection.tsp
    - src: ../fixtures/004003-delete-and-restore-operationId-decorator/tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  # VP1: Underscore operationIds should be removed (e.g. BgpConnection has only underscore ones)
  - type: skill-invocation
    config:
      required:
      - azure-typespec-author
  - type: file-not-matches
    config:
      path: BgpConnection.tsp
      pattern: '@operationId\('
  - type: file-not-matches
    config:
      path: NetworkInterface.tsp
      pattern: '@operationId\('
  - type: file-not-matches
    config:
      path: ExpressRouteGateway.tsp
      pattern: '@operationId\('
  - type: file-not-matches
    config:
      path: ExpressRoutePort.tsp
      pattern: '@operationId\('
  - type: file-not-matches
    config:
      path: NetworkInterface.tsp
      pattern: '@operationId\('
  - type: file-not-matches
    config:
      path: P2SVpnGateway.tsp
      pattern: '@operationId\('
  - type: file-not-matches
    config:
      path: VpnServerConfigurationPolicyGroup.tsp
      pattern: '@operationId\('
  - type: file-not-matches
    config:
      path: VpnSiteLinkConnection.tsp
      pattern: '@operationId\('
  # VP2: Non-standard PascalCase operationIds restored with @operationId
  - type: file-matches
    config:
      path: BastionHost.tsp
      pattern: '@operationId\("PutBastionShareableLink"\)'
  - type: file-matches
    config:
      path: BastionHost.tsp
      pattern: '@operationId\("GetActiveSessions"\)'
  - type: file-matches
    config:
      path: ExpressRouteProviderPort.tsp
      pattern: '@operationId\("ExpressRouteProviderPort"\)'
  # VP3: Restored operationIds keep their #suppress comment
  - type: file-matches
    config:
      path: BastionHost.tsp
      pattern: '#suppress.*no-openapi|#suppress.*operationId'
  # Underscore one in ExpressRouteProviderPort should be removed
  - type: file-not-matches
    config:
      path: ExpressRouteProviderPort.tsp
      pattern: '@operationId\("ExpressRouteProviderPortsLocation_List"\)'

scoring:
  weights:
    tool-calls: 1
    skill-invocation: 1
    file-matches: 3
    file-not-matches: 2
    prompt: 1
  threshold: 1.0

# Pipeline template — `azd provision`.
#
# Required pipeline variables: SERVICE_CONNECTION, AZURE_ENV_NAME,
# AZURE_LOCATION, AZURE_SUBSCRIPTION_ID, AZURE_TENANT_ID,
# AZURE_FEDERATED_TOKEN_FILE.
#
# Runs the postprovision hook (infra-layer pipeline) automatically.
# Set DEPLOY_LAYER to scope to a single layer.

parameters:
    - name: deployLayer
      type: string
      default: '' # empty = run all layers
    - name: workingDirectory
      type: string
      default: '$(System.DefaultWorkingDirectory)/tools/sdk-ai-bots/deployment'

steps:
    - task: AzureCLI@2
      displayName: 'azd provision (${{ parameters.deployLayer }})'
      inputs:
          azureSubscription: $(SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          workingDirectory: '${{ parameters.workingDirectory }}'
          inlineScript: |
              set -euo pipefail
              export AZD_AUTH_USE_FEDERATED_TOKEN=true
              if [ -n "${{ parameters.deployLayer }}" ]; then
                export DEPLOY_LAYER="${{ parameters.deployLayer }}"
                echo "Running partial provision for DEPLOY_LAYER=$DEPLOY_LAYER"
              fi
              npm ci
              azd env new "$AZURE_ENV_NAME" --location "$AZURE_LOCATION" --subscription "$AZURE_SUBSCRIPTION_ID" --no-prompt || true
              azd env select "$AZURE_ENV_NAME"
              azd provision --environment "$AZURE_ENV_NAME" --no-prompt

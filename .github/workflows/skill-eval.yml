name: Skill Evaluations

on:
  push:
    branches: [main]
    paths:
      - '.github/skills/**'
      - '.vally.yaml'
      - '.npmrc'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - '.github/skills/**'
      - '.vally.yaml'
      - '.npmrc'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  check-skills:
    name: Skill Compliance Check (Vally lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies (Vally from GitHub Packages)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm install

      - name: Lint skills
        run: npm run lint:skills

  run-evals:
    name: Run Skill Evaluations (Vally eval)
    runs-on: ubuntu-latest
    needs: check-skills
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if skill files changed
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            if git diff --name-only "$BASE_SHA"...HEAD | grep -q "^\.github/skills/"; then
              echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
            else
              echo "SHOULD_RUN=false" >> $GITHUB_OUTPUT
              echo "No skill file changes detected in PR — skipping evals"
            fi
          elif git diff --name-only HEAD~1 HEAD | grep -q "^\.github/skills/"; then
            echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
          else
            echo "SHOULD_RUN=false" >> $GITHUB_OUTPUT
            echo "No skill file changes detected — skipping evals"
          fi

      - uses: actions/setup-node@v5
        if: steps.changes.outputs.SHOULD_RUN == 'true'
        with:
          node-version: '20'

      - name: Install dependencies (Vally from GitHub Packages)
        if: steps.changes.outputs.SHOULD_RUN == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm install

      - name: Run evaluations
        if: steps.changes.outputs.SHOULD_RUN == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .vally/results
          for eval_file in .github/skills/*/eval.yaml; do
            if [ -f "$eval_file" ]; then
              skill_name=$(basename "$(dirname "$eval_file")")
              echo "=== Running evals for $skill_name ==="
              npx vally eval -e "$eval_file" --output-dir ".vally/results/${skill_name}" || true
            fi
          done

      - name: Upload eval results
        if: always() && steps.changes.outputs.SHOULD_RUN == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: eval-results-${{ github.run_id }}
          path: .vally/results/
          retention-days: 30

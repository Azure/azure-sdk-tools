# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.
trigger:
  branches:
    include:
      - main
      - feature/*
      - release/*
      - hotfix/*
  paths:
    include:
      - tools/apiview/parsers/js-api-parser

pr:
  branches:
    include:
      - main
      - feature/*
      - release/*
      - hotfix/*
  paths:
    include:
      - tools/apiview/parsers/js-api-parser

extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    stages:
      - stage: 'Build'
        variables:
          - template: /eng/pipelines/templates/variables/image.yml
          - name: NodeVersion
            value: '18.x'
          - name: ArtifactName
            value: 'apiview'
          - name: TypeScriptGeneratorDirectory
            value: 'tools/apiview/parsers/js-api-parser'
        jobs:
          - job: 'Build'

            pool:
              name: $(LINUXNEXTPOOL)
              image: $(LINUXNEXTVMIMAGE)
              os: linux

            steps:
              - task: NodeTool@0
                inputs:
                  versionSpec: '$(NodeVersion)'
                displayName: 'Use NodeJS $(NodeVersion)'

              - script: |
                  npm install -g npm@8.16.0
                displayName: "Install npm 8.16.0"

              - script: |
                  npm install
                workingDirectory: $(TypeScriptGeneratorDirectory)
                displayName: "Install npm packages typescript generator"

              - script: |
                  npm run-script build
                workingDirectory: $(TypeScriptGeneratorDirectory)
                displayName: "Build typescript generator"

              - pwsh: |
                  npm pack $(TypeScriptGeneratorDirectory)
                  Copy-Item ./*.tgz $(Build.ArtifactStagingDirectory)
                displayName: "Pack typescript generator"

              - task: 1ES.PublishPipelineArtifact@1
                inputs:
                  targetPath: '$(Build.ArtifactStagingDirectory)'
                  artifactName: $(ArtifactName)

      - ${{if and(eq(variables['Build.Reason'], 'Manual'), eq(variables['System.TeamProject'], 'internal'))}}:
        - stage: 'Release'
          dependsOn: Build
          condition: Succeeded()
          variables:
            - template: /eng/pipelines/templates/variables/image.yml
            - name: ArtifactName
              value: 'apiview'
            - name: FeedRegistry
              value: '//pkgs.dev.azure.com/azure-sdk/public/_packaging/azure-sdk-for-js/npm/registry/'

          jobs:
          - job: PublishPackage
            displayName: 'Publish ts-genapi package to devops feed'
            pool:
              name: $(LINUXNEXTPOOL)
              image: $(LINUXNEXTVMIMAGE)
              os: linux
            steps:
            - checkout: none

            - download: current

            - pwsh: |
                $detectedPackageName = Get-ChildItem $(Pipeline.Workspace)/$(ArtifactName)/*.tgz
                Write-Host "Detected package name: $detectedPackageName"
                Write-Host "##vso[task.setvariable variable=DetectedPackageName]$detectedPackageName"
              displayName: 'Prepare package for publishing'

            - task: AzureCLI@2
              inputs:
                azureSubscription: 'Azure SDK Engineering System'
                scriptType: 'bash'
                scriptLocation: 'inlineScript'
                inlineScript: |
                  az login --identity --allow-no-subscriptions
                  token=$(az account get-access-token --resource https://pkgs.dev.azure.com --query accessToken --output tsv)
                  echo "$(FeedRegistry):_authToken=$token" > ~/.npmrc
                  registry="https:$(FeedRegistry)"
                  npm config set registry $registry
                  npm publish $(DetectedPackageName) --registry=$registry --always-auth=true
              displayName: 'Publish package using Managed Identity'

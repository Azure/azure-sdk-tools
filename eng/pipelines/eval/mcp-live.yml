# azure-sdk-tools MCP build for the live eval tier (nightly end-to-end workflow scenarios).
#
# Builds the in-repo .NET Cli MCP server and publishes it under artifacts/mcp/cli — the
# layout the BuildMcp job ships as the `mcp-servers` artifact and every shard re-stages, so
# the eval .vally.yaml environments resolve the live server DLL at that path.
#
# This is azure-sdk-tools' own MCP build, wired in via the archetype's `mcpSetupTemplate`
# parameter. It builds from the current checkout (these eval pipelines only run here), so no
# cross-repo clone is needed. Other repos point mcpSetupTemplate at their own equivalent.

steps:
  - checkout: self
    fetchDepth: 1

  - script: |
      set -e
      dotnet build tools/azsdk-cli/Azure.Sdk.Tools.Cli -c Release -o "$(Build.SourcesDirectory)/artifacts/mcp/cli" --nologo
    displayName: 'Build MCP: Cli (live) server'

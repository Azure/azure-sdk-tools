name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: '1.0'
type: capability
area: "dataplane"
environment: azsdk-mcp
config:
  runs: 1
  timeout: 660s
  model: claude-opus-4.6
  executor: copilot-sdk
stimuli:
- name: 006007-dp-version-property-added-trigger
  tags:
    suite: dataplane
    mode: trigger
  prompt: Add a new optional `description` property of type `string` to the WidgetSuite model only for version `2023-06-01-preview`. Also add this new version to the Versions enum.
  environment: &id001
    files:
    - src: ../fixtures/006007-dp-version-property-added/main.tsp
      dest: main.tsp
    - src: ../fixtures/006007-dp-version-property-added/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
      dest: package-lock.json
    - src: ../fixtures/006007-dp-version-property-added/tspconfig.yaml
      dest: tspconfig.yaml
    commands:
    - node -e "const fs=require('fs');const t=process.env.FIXTURE_NODE_MODULES;if(t&&fs.existsSync(t)&&!fs.existsSync('node_modules')){fs.symlinkSync(t,'node_modules','junction')}"
  graders:
  - &id002
    type: tool-calls
    config:
      required:
      - edit
      - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: skill-invocation
    config:
      required:
      - azure-typespec-author
  constraints:
    max_turns: 5
    max_tokens: 1000000
- name: 006007-dp-version-property-added-forced
  tags:
    suite: dataplane
    mode: forced
  prompt: '@azure-typespec-author Add a new optional `description` property of type `string` to the WidgetSuite model only for version `2023-06-01-preview`. Also add this new version to the Versions enum.'
  environment: *id001
  graders:
  - *id002
  - type: run-command
    config:
      command: tsp compile .
      expected_exit_code: 0
  - &id003
    type: file-matches
    config:
      path: main.tsp
      pattern: v2023_06_01_Preview
  - &id004
    type: file-matches
    config:
      path: main.tsp
      pattern: '@added\(Versions\.v2023_06_01_Preview\)'
  - &id005
    type: file-matches
    config:
      path: main.tsp
      pattern: 'description\?\: string'
  - &id006
    type: prompt
    config:
      prompt: The description property should be added to WidgetSuite with @added(Versions.v2023_06_01_Preview) decorator. A new version v2023_06_01_Preview should be added to the Versions enum.
      model: claude-opus-4.6
      scoring: scale_1_10
      threshold: 0.77
  constraints:
    max_turns: 5
    max_tokens: 1000000
- name: 006007-dp-version-property-added-no-skill
  tags:
    suite: dataplane
    mode: no-skill
  prompt: Add a new optional `description` property of type `string` to the WidgetSuite model only for version `2023-06-01-preview`. Also add this new version to the Versions enum.
  environment: *id001
  graders:
  - type: tool-calls
    config:
      required:
      - edit
  - *id003
  - *id004
  - *id005
  - *id006
  constraints:
    max_turns: 5
    max_tokens: 100000
scoring:
  weights:
    tool-calls: 1
    skill-invocation: 1
    run-command: 1
    file-matches: 3
    prompt: 2
  threshold: 0.95

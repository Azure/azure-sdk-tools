name: Skill Evaluations

on:
  push:
    branches: [main]
    paths:
      - '.github/skills/**'
  pull_request:
    paths:
      - '.github/skills/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-skills:
    name: Skill Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install waza
        run: |
          curl -fsSL https://raw.githubusercontent.com/microsoft/waza/refs/tags/v0.12.0/install.sh | bash
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Check skill compliance
        run: |
          echo "## Skill Compliance Report" > compliance.md
          echo "" >> compliance.md
          failed=0
          for skill_dir in .github/skills/*/; do
            skill_name=$(basename "$skill_dir")
            if [ -f "$skill_dir/SKILL.md" ]; then
              echo "### $skill_name" >> compliance.md
              if ! waza check "$skill_dir" 2>&1 | tee -a compliance.md; then
                failed=1
              fi
              echo "" >> compliance.md
            fi
          done
          cat compliance.md
          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more skills failed compliance checks"
            exit 1
          fi

      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-compliance
          path: compliance.md
          retention-days: 30

  # Live evaluations require waza's copilot-sdk executor, which needs an active
  # GitHub Copilot session.  This cannot be established in automated CI (push/PR),
  # so we restrict this job to manual workflow_dispatch triggers where the caller
  # can ensure a valid session exists.  Structural validation (waza check) still
  # runs on every push and PR via the check-skills job above.
  run-evals:
    name: Run Skill Evaluations
    runs-on: ubuntu-latest
    needs: check-skills
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install waza
        run: |
          curl -fsSL https://raw.githubusercontent.com/microsoft/waza/refs/tags/v0.12.0/install.sh | bash
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Run evaluations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p results
          failed=0
          for eval_file in .github/skills/*/eval.yaml; do
            if [ -f "$eval_file" ]; then
              skill_name=$(basename "$(dirname "$eval_file")")
              echo "=== Running evals for $skill_name ==="
              if ! waza run "$eval_file" -v -o "results/${skill_name}.json"; then
                failed=1
              fi
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more skill evaluations failed"
            exit 1
          fi

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_id }}
          path: results/
          retention-days: 30

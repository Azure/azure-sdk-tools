# Provision pipeline — knowledge-sync.
# Shared resources (Storage + Search index) are owned by the shared-resources
# layer; this pipeline triggers only when the shared infra changes.
name: tools - sdk-ai-bots-knowledge-sync - provision

trigger: none
pr:
    branches:
        include:
            - main
    paths:
        include:
            - tools/sdk-ai-bots/deployment/infra/modules/qaBotSharedResources/**

parameters:
    - name: environment
      type: string
      default: dev
      values: [dev, preview, prod]

extends:
    template: /eng/pipelines/templates/stages/1es-redirect.yml
    parameters:
        Use1ESOfficial: true
        stages:
            - stage: ProvisionKnowledgeSync
              displayName: 'knowledge-sync provision (${{ parameters.environment }})'
              jobs:
                  - deployment: Apply
                    environment: 'sdk-ai-bots-${{ parameters.environment }}'
                    pool:
                        name: $(LINUXPOOL)
                        image: $(LINUXVMIMAGE)
                        os: linux
                    strategy:
                        runOnce:
                            deploy:
                                steps:
                                    - checkout: self
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/load-environment-suite.yml
                                      parameters:
                                          environment: '${{ parameters.environment }}'
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/azd-auth.yml
                                    - template: /tools/sdk-ai-bots/deployment/pipelines/templates/azd-provision.yml
                                      parameters:
                                          deployLayer: shared-resources

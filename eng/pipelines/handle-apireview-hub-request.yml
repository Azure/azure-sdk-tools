# API Review Hub queues this pipeline for create and update requests. Keep this
# file language-agnostic: it decides which artifact bundles are needed, compares
# them when appropriate, and publishes the result artifacts for the web service.
pr: none
trigger: none

variables:
  callbackTokenAudience: 'api://apireviewhub'
  completionCallbackUrl: 'https://api-review-hub.azurewebsites.net/api/operations/'

parameters:
  - name: requestMode
    type: string
    values:
      - create
      - update
  - name: language
    type: string
    values:
      - python
      - java
      - csharp
      - javascript
      - go
      - rust
      - swift
      - cpp
  - name: operationId
    type: string
    default: ''
  - name: packageName
    type: string
    default: ''
  - name: owner
    type: string
    default: 'Azure'
  - name: baseRef
    type: string
    default: 'unused-for-update'
  - name: targetRef
    type: string
    default: ''
  - name: resultArtifactName
    type: string
    default: 'apireview-result'
  - name: baseArtifactName
    type: string
    default: 'apireview-base'
  - name: targetArtifactName
    type: string
    default: 'apireview-target'

jobs:
# The language value is validated above. Each supported language must provide:
# - /eng/pipelines/templates/jobs/apireview-hub-job-{language}.yml
# - /eng/pipelines/templates/steps/create-apireview-hub-artifacts-{language}.yml
- template: ${{ format('/eng/pipelines/templates/jobs/apireview-hub-job-{0}.yml', parameters.language) }}
  parameters:
    repositoryOwner: ${{ parameters.owner }}
    steps:
      - pwsh: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace('${{ parameters.operationId }}')) {
            throw 'operationId is required.'
          }
          if ([string]::IsNullOrWhiteSpace('${{ parameters.packageName }}')) {
            throw 'packageName is required.'
          }
          if ('${{ parameters.requestMode }}' -eq 'create' -and ([string]::IsNullOrWhiteSpace('${{ parameters.baseRef }}') -or '${{ parameters.baseRef }}' -eq 'unused-for-update')) {
            throw 'baseRef is required for create requests.'
          }
          if ([string]::IsNullOrWhiteSpace('${{ parameters.targetRef }}')) {
            throw 'targetRef is required.'
          }

          New-Item -ItemType Directory -Force -Path '$(Build.ArtifactStagingDirectory)/base' | Out-Null
          New-Item -ItemType Directory -Force -Path '$(Build.ArtifactStagingDirectory)/target' | Out-Null
          New-Item -ItemType Directory -Force -Path '$(Build.ArtifactStagingDirectory)/result' | Out-Null
        displayName: 'Validate request parameters'

      # Create requests need the baseline bundle first. The job uses one source
      # checkout and switches it from the tooling ref to base, then target.
      - ${{ if eq(parameters.requestMode, 'create') }}:
        - template: ${{ format('/eng/pipelines/templates/steps/create-apireview-hub-artifacts-{0}.yml', parameters.language) }}
          parameters:
            requestMode: ${{ parameters.requestMode }}
            operationId: ${{ parameters.operationId }}
            packageName: ${{ parameters.packageName }}
            ref: ${{ parameters.baseRef }}
            kind: base
            outputDir: $(Build.ArtifactStagingDirectory)/base
            workingDir: $(Pipeline.Workspace)/apireview/base

      # Always generate the target bundle. Update requests only generate this
      # artifact; create requests generate it after the base bundle above.
      - template: ${{ format('/eng/pipelines/templates/steps/create-apireview-hub-artifacts-{0}.yml', parameters.language) }}
        parameters:
          requestMode: ${{ parameters.requestMode }}
          operationId: ${{ parameters.operationId }}
          packageName: ${{ parameters.packageName }}
          ref: ${{ parameters.targetRef }}
          kind: target
          outputDir: $(Build.ArtifactStagingDirectory)/target
          workingDir: $(Pipeline.Workspace)/apireview/target

          # The web service reads this summary to decide whether the operation
          # succeeded, whether a create request changed API shape, and which build
          # artifacts to download.
      - pwsh: |
          $ErrorActionPreference = 'Stop'

          $targetMetadataPath = '$(Build.ArtifactStagingDirectory)/target/artifact-metadata.json'
          $targetMetadata = Get-Content -Raw -Path $targetMetadataPath | ConvertFrom-Json
          $artifacts = [ordered]@{
            target = '${{ parameters.targetArtifactName }}'
            result = '${{ parameters.resultArtifactName }}'
          }

          $baseVersion = ''
          $changed = $null
          if ('${{ parameters.requestMode }}' -eq 'create') {
            $baseMetadataPath = '$(Build.ArtifactStagingDirectory)/base/artifact-metadata.json'
            $baseMetadata = Get-Content -Raw -Path $baseMetadataPath | ConvertFrom-Json
            $baseVersion = $baseMetadata.version
            $artifacts.base = '${{ parameters.baseArtifactName }}'

            $baseHash = (Get-FileHash -Algorithm SHA256 -Path '$(Build.ArtifactStagingDirectory)/base/api.md').Hash
            $targetHash = (Get-FileHash -Algorithm SHA256 -Path '$(Build.ArtifactStagingDirectory)/target/api.md').Hash
            $changed = $baseHash -ne $targetHash
          }

          $summary = [ordered]@{
            operationId = '${{ parameters.operationId }}'
            mode = '${{ parameters.requestMode }}'
            language = '${{ parameters.language }}'
            repositoryFullName = $targetMetadata.repositoryFullName
            packageName = '${{ parameters.packageName }}'
            baseRef = '${{ parameters.baseRef }}'
            targetRef = '${{ parameters.targetRef }}'
            status = 'succeeded'
            changed = $changed
            baseVersion = $baseVersion
            targetVersion = $targetMetadata.version
            packageRelativePath = $targetMetadata.packageRelativePath
            artifacts = $artifacts
          }

          $summary | ConvertTo-Json -Depth 10 | Set-Content -Path '$(Build.ArtifactStagingDirectory)/result/result-summary.json' -Encoding utf8
          Get-Content -Path '$(Build.ArtifactStagingDirectory)/result/result-summary.json'
        displayName: 'Compare and write result summary'

      # Ensure failed runs still publish an operation result artifact that the
      # web service can surface to callers.
      - pwsh: |
          $ErrorActionPreference = 'Stop'

          New-Item -ItemType Directory -Force -Path '$(Build.ArtifactStagingDirectory)/result' | Out-Null
          $summary = [ordered]@{
            operationId = '${{ parameters.operationId }}'
            mode = '${{ parameters.requestMode }}'
            language = '${{ parameters.language }}'
            packageName = '${{ parameters.packageName }}'
            baseRef = '${{ parameters.baseRef }}'
            targetRef = '${{ parameters.targetRef }}'
            status = 'failed'
            artifacts = [ordered]@{
              result = '${{ parameters.resultArtifactName }}'
            }
          }

          $summary | ConvertTo-Json -Depth 10 | Set-Content -Path '$(Build.ArtifactStagingDirectory)/result/result-summary.json' -Encoding utf8
          Get-Content -Path '$(Build.ArtifactStagingDirectory)/result/result-summary.json'
        displayName: 'Write failure result summary'
        condition: failed()

      - task: PublishBuildArtifacts@1
        displayName: 'Publish base API review bundle'
        condition: and(succeeded(), eq('${{ parameters.requestMode }}', 'create'))
        inputs:
          pathtoPublish: '$(Build.ArtifactStagingDirectory)/base'
          artifactName: '${{ parameters.baseArtifactName }}'

      - task: PublishBuildArtifacts@1
        displayName: 'Publish target API review bundle'
        condition: succeeded()
        inputs:
          pathtoPublish: '$(Build.ArtifactStagingDirectory)/target'
          artifactName: '${{ parameters.targetArtifactName }}'

      - task: PublishBuildArtifacts@1
        displayName: 'Publish API review result summary'
        condition: succeededOrFailed()
        inputs:
          pathtoPublish: '$(Build.ArtifactStagingDirectory)/result'
          artifactName: '${{ parameters.resultArtifactName }}'

      # Completion notification is intentionally sent after artifacts are
      # published. API Review Hub treats this as a signal, then verifies the
      # operation/run identity and downloads artifacts from ADO itself.
      - task: AzurePowerShell@5
        displayName: 'Notify API Review Hub of artifact completion'
        condition: succeededOrFailed()
        inputs:
          azureSubscription: 'API Review Hub'
          azurePowerShellVersion: latestVersion
          pwsh: true
          ScriptType: InlineScript
          Inline: |
            $ErrorActionPreference = 'Stop'

            if ([string]::IsNullOrWhiteSpace('$(completionCallbackUrl)')) {
              throw 'completionCallbackUrl is required.'
            }

            try {
              $tokenResponse = Get-AzAccessToken -ResourceUrl '$(callbackTokenAudience)' -AsSecureString -ErrorAction Stop
            }
            catch {
              throw "Failed to acquire access token for API Review Hub callback audience '$(callbackTokenAudience)': $($_.Exception.Message)"
            }

            $secureToken = $tokenResponse.Token
            if (-not $secureToken) {
              throw "Failed to acquire access token for API Review Hub callback audience '$(callbackTokenAudience)'"
            }

            $token = [System.Net.NetworkCredential]::new('', $secureToken).Password
            if (-not $token) {
              throw 'Acquired API Review Hub callback token was empty after unwrap'
            }

            $body = [ordered]@{
              operationId = '${{ parameters.operationId }}'
              mode = '${{ parameters.requestMode }}'
              language = '${{ parameters.language }}'
              buildId = '$(Build.BuildId)'
              project = '$(System.TeamProject)'
              result = '$(Agent.JobStatus)'
              artifacts = [ordered]@{
                result = '${{ parameters.resultArtifactName }}'
              }
            }

            if ('$(Agent.JobStatus)' -eq 'Succeeded' -or '$(Agent.JobStatus)' -eq 'SucceededWithIssues') {
              $body.artifacts.target = '${{ parameters.targetArtifactName }}'
            }

            if (('${{ parameters.requestMode }}' -eq 'create') -and ('$(Agent.JobStatus)' -eq 'Succeeded' -or '$(Agent.JobStatus)' -eq 'SucceededWithIssues')) {
              $body.artifacts.base = '${{ parameters.baseArtifactName }}'
            }

            $completionCallbackUrl = '$(completionCallbackUrl)'
            if ($completionCallbackUrl.EndsWith('/')) {
              $completionCallbackUrl = "${completionCallbackUrl}${{ parameters.operationId }}"
            }

            $completionCallbackUri = $null
            if (-not [System.Uri]::TryCreate($completionCallbackUrl, [System.UriKind]::Absolute, [ref] $completionCallbackUri)) {
              throw "completionCallbackUrl '$completionCallbackUrl' is not a valid absolute URI."
            }

            $headers = @{
              Authorization = "Bearer $token"
              'Content-Type' = 'application/json'
            }
            $jsonBody = $body | ConvertTo-Json -Depth 10 -Compress

            Write-Host "Completion callback URL: $completionCallbackUrl"
            Write-Host "Completion callback body: $jsonBody"
            Invoke-WebRequest -Method POST -Uri $completionCallbackUri -Headers $headers -Body $jsonBody -MaximumRetryCount 3 | Out-Null

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - tools/github-event-bridge
pr:
  branches:
    include:
      - main
  paths:
    include:
      - tools/github-event-bridge

variables:
  - template: /eng/pipelines/templates/variables/image.yml
  - name: NodeVersion
    value: "22.x"
  - name: ProjectPath
    value: "tools/github-event-bridge"

extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    GenerateBaselines: true
    stages:
      - stage: Build
        displayName: BuildTest

        variables:
          - template: /eng/pipelines/templates/variables/image.yml

        jobs:
          - job: Build_Test
            displayName: Build

            variables:
              npmrcPath: $(Agent.TempDirectory)/.npmrc
            pool:
              name: $(LINUXPOOL)
              image: $(LINUXVMIMAGE)
              os: linux

            templateContext:
              sdl:
                componentgovernance:
                  enabled: true # Enable CG only on the build job

            steps:
              - task: NodeTool@0
                inputs:
                  versionSpec: "$(NodeVersion)"
                displayName: "Use NodeJS $(NodeVersion)"

              - template: /eng/common/pipelines/templates/steps/create-authenticated-npmrc.yml
                parameters:
                  npmrcPath: $(npmrcPath)

              - script: |
                  npm ci
                workingDirectory: $(ProjectPath)
                displayName: "Install npm packages for testing"
                env:
                  npm_config_userconfig: $(npmrcPath)

              - script: |
                  npm run test:ci
                workingDirectory: $(ProjectPath)
                displayName: "Run tests"

              - script: |
                  npm run lint
                workingDirectory: $(ProjectPath)
                displayName: "Run lint check"

              - script: |
                  npm run format:check
                workingDirectory: $(ProjectPath)
                displayName: "Run prettier format check"

              - task: ArchiveFiles@2
                displayName: "Create deployable zip package"
                inputs:
                  rootFolderOrFile: "$(ProjectPath)"
                  includeRootFolder: false
                  archiveType: "zip"
                  archiveFile: "$(Build.ArtifactStagingDirectory)/github-event-bridge.zip"
                  replaceExistingArchive: true

              - template: /eng/common/pipelines/templates/steps/publish-1es-artifact.yml
                parameters:
                  ArtifactName: "github-event-bridge"
                  ArtifactPath: "$(Build.ArtifactStagingDirectory)"

      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
          - stage: Production_Publish
            displayName: Prod
            dependsOn: Build
            condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'main'), eq(variables['Build.Reason'], 'Manual'))

            jobs:
              - deployment: Publish_to_Prod
                displayName: Publish to Prod
                environment: "package-publish"
                templateContext:
                  type: releaseJob
                  isProduction: true
                  inputs:
                    - input: pipelineArtifact
                      artifactName: github-event-bridge
                      targetPath: "$(Pipeline.Workspace)/github-event-bridge"
                pool:
                  name: $(LINUXPOOL)
                  image: $(LINUXVMIMAGE)
                  os: linux

                strategy:
                  runOnce:
                    deploy:
                      steps:
                        - task: AzureRmWebAppDeployment@4
                          displayName: "Deploy Azure App Service"
                          inputs:
                            azureSubscription: "GitHub Event Bridge"
                            appType: "webApp"
                            WebAppName: "azsdk-github-event-bridge"
                            ResourceGroupName: GitHub-Event-Bridge
                            packageForLinux: $(Pipeline.Workspace)/github-event-bridge/**/*.zip
                            enableCustomDeployment: true
                            DeploymentType: zipDeploy

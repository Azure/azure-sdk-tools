# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.
# Internal Usage Guide:
# - Purpose: benchmark azure-typespec-author in two execution modes:
#   1) forced mode (code-quality oriented), 2) trigger mode (skill-invocation oriented).
# - Entry: run this pipeline manually (trigger/pr are disabled).
# - Skill source:
#   - SkillBranch empty: evaluate the current checked-out branch.
#   - SkillBranch set: overlay SKILL.md + references from that branch before evaluation.
#
# Structure:
# - PrepareShared builds MCP binaries once and publishes them as the mcp-servers artifact.
# - PrepareForced / PrepareTrigger generate area-based shard matrices from eval file metadata.
# - EvalForced / EvalTrigger run one matrix job per area.
# - SummaryForced / SummaryTrigger roll up JUnit results.
trigger: none
pr: none

parameters:
- name: SkillBranch
  displayName: Branch containing the azure-typespec-author skill source (SKILL.md + references/) to evaluate. Defaults to the full source branch ref.
  type: string
  default: $(Build.SourceBranch)

variables:
- template: /eng/pipelines/templates/variables/image.yml
- group: AzSDK_Eval_Variable_group
- name: SkillBranch
  value: ${{ parameters.SkillBranch }}

extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    Use1ESOfficial: true
    stages:
      - stage: PrepareShared
        displayName: Prepare shared MCP artifact
        dependsOn: []
        jobs:
          - template: /.github/skills/azure-typespec-author/evaluate/pipeline/skill/typespec-author-build-mcp-job.yml

      - stage: PrepareForced
        displayName: Prepare forced track
        dependsOn: PrepareShared
        jobs:
          - template: /eng/common/pipelines/templates/jobs/generate-eval-matrix.yml
            parameters:
              vallyRoot: .github/skills/azure-typespec-author/evaluate
              evalGlobs:
                - 'evals/*.eval.yaml'

      - stage: EvalForced
        displayName: Eval forced track
        dependsOn: PrepareForced
        variables:
          TypeSpecAuthorEvalExtraArgs: '--tag mode=forced --skill-dir ..'
        jobs:
          - template: /.github/skills/azure-typespec-author/evaluate/pipeline/skill/typespec-author-eval-shard.yml
            parameters:
              matrixStageName: PrepareForced
              vallyRoot: .github/skills/azure-typespec-author/evaluate
              mcpEnvironment: live
              startQaBotBackend: true
              shardTimeoutInMinutes: 50

      - stage: SummaryForced
        displayName: Summary forced track
        dependsOn: EvalForced
        condition: always()
        jobs:
          - template: /.github/skills/azure-typespec-author/evaluate/pipeline/skill/typespec-author-summary.yml
            parameters:
              resultArtifactPrefix: PrepareForced-eval-result-
              failOnFailedTests: false

      - stage: PrepareTrigger
        displayName: Prepare trigger track
        dependsOn: PrepareShared
        jobs:
          - template: /eng/common/pipelines/templates/jobs/generate-eval-matrix.yml
            parameters:
              vallyRoot: .github/skills/azure-typespec-author/evaluate
              evalGlobs:
                - 'evals/*.eval.yaml'

      - stage: EvalTrigger
        displayName: Eval trigger track
        dependsOn: PrepareTrigger
        variables:
          TypeSpecAuthorEvalExtraArgs: '--tag mode=trigger --skill-dir ..'
        jobs:
          - template: /.github/skills/azure-typespec-author/evaluate/pipeline/skill/typespec-author-eval-shard.yml
            parameters:
              matrixStageName: PrepareTrigger
              vallyRoot: .github/skills/azure-typespec-author/evaluate
              mcpEnvironment: mock
              shardTimeoutInMinutes: 30

      - stage: SummaryTrigger
        displayName: Summary trigger track
        dependsOn: EvalTrigger
        condition: always()
        jobs:
          - template: /.github/skills/azure-typespec-author/evaluate/pipeline/skill/typespec-author-summary.yml
            parameters:
              resultArtifactPrefix: PrepareTrigger-eval-result-
              failOnFailedTests: false

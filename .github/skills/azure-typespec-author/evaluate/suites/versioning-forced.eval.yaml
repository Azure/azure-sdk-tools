name: azure-typespec-author-eval-forced
description: Evaluation suite for azure-typespec-author - versioning cases with forced skill invocation and code quality graders.
version: "1.0"
type: capability

environment: azsdk-mcp

config:
  runs: 1
  timeout: "660s"
  model: claude-opus-4.6
  executor: copilot-sdk
  workers: 3

stimuli:
- name: 001001-version-spread-property
  prompt: |
    @azure-typespec-author I added `...Azure.ResourceManager.ManagedServiceIdentityProperty;` which updates all my existing API versions and introduces a breaking change. I want to introduce the properties of the spread model '...ManagedServiceIdentityProperty' in API version 2025-05-04-preview only.
  constraints:
    max_turns: 5
    max_tokens: 100000
  environment:
    files:
    - src: ../fixtures/001-share-version-new-feature/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/001-share-version-new-feature/main.tsp
      dest: main.tsp
    - src: ../fixtures/001-share-version-new-feature/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/001-share-version-new-feature/tspconfig.yaml
      dest: tspconfig.yaml
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
      dest: package-lock.json
    - src: ../fixtures/001-share-version-new-feature/readme.md
      dest: readme.md
  graders:
  - type: tool-calls
    config:
      required:
      - edit
      - azure-sdk-mcp-azsdk_typespec_generate_authoring_plan
      - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: skill-invocation
    config:
      required:
      - azure-typespec-author
  - type: file-matches
    config:
      path: main.tsp
      pattern: 2025-05-04-preview
  - type: file-matches
    config:
      path: employee.tsp
      pattern: "\\.\\.\\.ManagedServiceIdentityProperty;"
  - type: file-matches
    config:
      path: employee.tsp
      pattern: "@@added\\(Employee\\.identity, (Microsoft\\.Widget\\.)?Versions\\.(v2025_05_04_preview|`2025-05-04-preview`)\\);"
  - type: prompt
    config:
      prompt: Verify changes are scoped to this task only, with no unrelated edits beyond introducing preview-only identity via versioning.
      model: claude-opus-4.6
      scoring: scale_1_5
      threshold: 1.0

- name: 001002-version-default-value
  prompt: |
    @azure-typespec-author add a default value `21` for property age in model EmployeeProperties only for the new api version 2025-11-01
  constraints:
    max_turns: 6
    max_tokens: 100000
  environment:
    files:
    - src: ../fixtures/001002-version-default-value/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/001002-version-default-value/main.tsp
      dest: main.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
      dest: package-lock.json
    - src: ../fixtures/001002-version-default-value/readme.md
      dest: readme.md
    - src: ../fixtures/001002-version-default-value/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/001002-version-default-value/tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  - type: tool-calls
    config:
      required:
      - edit
      - azure-sdk-mcp-azsdk_typespec_generate_authoring_plan
      - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: skill-invocation
    config:
      required:
      - azure-typespec-author
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@removed\(Versions\.v2025_11_01\)'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@renamedFrom\(Versions\.v2025_11_01, "age"\)'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@added\(Versions\.v2025_11_01\)'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: 'age\?: int32 = 21;'
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: 'Verify change scope and quality only: add a default value of 21 for the `age` property in `EmployeeProperties` that only applies to the 2025-11-01 API version. The old age renamed and removed
        for the new version.'
      model: claude-opus-4.6

- name: 001003-version-required-to-optional
  prompt: |
    @azure-typespec-author change the property age of EmployeeProperties from required to optional only for api version 2025-05-04-preview
  constraints:
    max_turns: 6
    max_tokens: 100000
  environment:
    files:
    - src: ../fixtures/001-share-version-new-feature/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/001-share-version-new-feature/main.tsp
      dest: main.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
      dest: package-lock.json
    - src: ../fixtures/001-share-version-new-feature/readme.md
      dest: readme.md
    - src: ../fixtures/001-share-version-new-feature/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/001-share-version-new-feature/tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  - type: tool-calls
    config:
      required:
      - edit
      - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: skill-invocation
    config:
      required:
      - azure-typespec-author
  - type: file-matches
    config:
      path: main.tsp
      pattern: 2025-05-04-preview
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@madeOptional'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: 2025-05-04-preview|v2025_05_04_preview
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: 'Verify change scope and quality only: no unrelated edits, and the implemented result is semantically consistent with the task intent.'
      model: claude-opus-4.6

- name: 001004-version-property-decorator
  prompt: |
    @azure-typespec-author change the visibility of property 'provisioningState' from Lifecycle.Read to Lifecycle.Read and Lifecycle.Create in version 2025-05-04-preview only
  constraints:
    max_turns: 6
    max_tokens: 100000
  environment:
    files:
    - src: ../fixtures/001-share-version-new-feature/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/001-share-version-new-feature/main.tsp
      dest: main.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
      dest: package-lock.json
    - src: ../fixtures/001-share-version-new-feature/readme.md

parameters:
  versionSpec: ''

steps:
  # use python 3.10 for tooling. packaging. platform.
  # (3.8 is no longer present on the CI images, which ship 3.10+.)
  - task: UsePythonVersion@0
    displayName: "Use Python 3.10"
    inputs:
      versionSpec: '3.10'

  - pwsh: |
      python -m pip install packaging==20.4
    displayName: Prep Environment

  # select the appropriate version from manifest if present
  - task: PythonScript@0
    displayName: 'Install ${{ parameters.versionSpec }} from Python Manifest If Necessary'
    inputs:
     scriptPath: 'eng/scripts/python/util/install_python_version.py'
     arguments: '${{ parameters.versionSpec }} --installer_folder="../_pyinstaller'

  # use
  - task: UsePythonVersion@0
    displayName: "Use Python ${{ parameters.versionSpec }}"
    inputs:
      versionSpec: ${{ parameters.versionSpec }}
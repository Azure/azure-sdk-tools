parameters:
- name: PythonVersion
  type: string
  default: '3.10'

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - tools/sdk-ai-bots/azure-sdk-qa-bot-agent/

pr:
  branches:
    include:
      - main
  paths:
    include:
      - tools/sdk-ai-bots/azure-sdk-qa-bot-agent/
extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    Use1ESOfficial: false
    stages:
      - stage: 'evaluation'
        variables:
          - template: /eng/pipelines/templates/variables/globals.yml
          - template: /eng/pipelines/templates/variables/image.yml
        pool:
              name: $(LINUXPOOL)
              image: $(LINUXVMIMAGE)
              os: linux
        jobs:
          - job: 'evaluation'
            displayName: 'evaluation'
            steps:
              - template: /eng/pipelines/templates/steps/use-python-version.yml
                parameters:
                  versionSpec: '${{ parameters.PythonVersion }}'
              - script: |
                  python --version
                displayName: 'check python'
              - task: AzureCLI@2
                displayName: 'start backend AI agent service'
                inputs:
                  azureSubscription: 'azuresdkqabot-dev'
                  scriptType: bash
                  scriptLocation: inlineScript
                  workingDirectory: $(Build.SourcesDirectory)/tools/sdk-ai-bots/azure-sdk-qa-bot-backend
                  inlineScript: |
                    echo "##vso[task.setvariable variable=AZURE_CLIENT_ID]$servicePrincipalId"
                    echo "##vso[task.setvariable variable=AZURE_TENANT_ID]$tenantId"
                    echo "##vso[task.setvariable variable=AZURE_SUBSCRIPTION_ID]$(az account show --query id -o tsv)"
                    echo "$idToken" > "$(Agent.BuildDirectory)/id_token"
                    echo "##vso[task.setvariable variable=AZURE_FEDERATED_TOKEN_FILE]$(Agent.BuildDirectory)/id_token"
              - script: |
                  pip install --pre -r requirements.txt
                displayName: 'install agent server requirements'
                workingDirectory: $(Build.SourcesDirectory)/tools/sdk-ai-bots/azure-sdk-qa-bot-agent
              - script: |
                  python server.py &
                  sleep 20
                  lsof -ti:8080
                displayName: 'start agent server'
                workingDirectory: $(Build.SourcesDirectory)/tools/sdk-ai-bots/azure-sdk-qa-bot-agent
                env:
                  SYSTEM_ACCESSTOKEN: $(System.AccessToken)
                  AZURESUBSCRIPTION_SERVICE_CONNECTION_ID: $(AZURESUBSCRIPTION_SERVICE_CONNECTION_ID)
                  AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
                  AZURE_TENANT_ID: $(AZURE_TENANT_ID)
                  AZURE_APPCONFIG_ENDPOINT: $(AZURE_APPCONFIG_ENDPOINT)
              - script: |
                  pip install -r requirements.txt
                displayName: 'install requirements'
                workingDirectory: $(Build.SourcesDirectory)/tools/sdk-ai-bots/azure-sdk-qa-bot-evaluation
              - task: AzureCLI@2
                displayName: 'Run Evals'
                inputs:
                  azureSubscription: 'azuresdkqabot-dev'
                  scriptType: bash
                  scriptLocation: inlineScript
                  workingDirectory: $(Build.SourcesDirectory)/tools/sdk-ai-bots/azure-sdk-qa-bot-evaluation
                  inlineScript: |
                    python evals_run.py --evaluation_name_prefix $(Build.BuildId) --evaluators "similarity,groundedness,response_completeness,reference_match,knowledge_match" --cache_result full
                env:
                  SYSTEM_ACCESSTOKEN: $(System.AccessToken)
                  AZURE_AI_PROJECT_ENDPOINT: $(AZURE_AI_PROJECT_ENDPOINT)
                  AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
                  AZURE_OPENAI_ENDPOINT: $(AZURE_OPENAI_ENDPOINT)
                  AZURE_OPENAI_API_KEY: $(AZURE_OPENAI_API_KEY)
                  AZURE_COMPLETION_MODEL_NAME: $(AZURE_COMPLETION_MODEL_NAME)
                  AZURE_EVALUATION_MODEL_NAME: $(AZURE_EVALUATION_MODEL_NAME)
                  AZURE_API_VERSION: $(AZURE_API_VERSION)
                  STORAGE_BLOB_ACCOUNT: $(STORAGE_BLOB_ACCOUNT)
                  BOT_CONFIG_CONTAINER: $(BOT_CONFIG_CONTAINER)
                  BOT_CONFIG_CHANNEL_BLOB: $(BOT_CONFIG_CHANNEL_BLOB)
                  EVALUATE_THRESHOLD: $(EVALUATE_THRESHOLD)
            templateContext:
              outputs:
                - output: pipelineArtifact
                  path: $(Build.SourcesDirectory)/tools/sdk-ai-bots/azure-sdk-qa-bot-evaluation/cache
                  artifact: evaluation-results
                  displayName: Publish Evaluation Results Artifact
                  condition: always()

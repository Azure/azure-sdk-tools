name: azsdk-mcp-tool-scenarios
description: |
  Evaluates how well the agent can analyze pipeline failures from the Azure SDK Java pipelines.
version: "1.0"
type: capability

tags:
  area: pipeline

environment: azsdk-mcp-mock

config:
  runs: 1
  timeout: 5m
  executor: copilot-sdk
  model: gpt-5.4

stimuli:
  - name: java-retry-logic-bug
    environment:
      files:
        - src: ../../../fixtures/analyze-pipeline/TaskManagerTests/code/TaskManager.java
          dest: sdk/batch/azure-compute-batch/src/main/java/com/azure/compute/batch/implementation/task/TaskManager.java
        - src: ../../../fixtures/analyze-pipeline/TaskManagerTests/code/TaskManagerTests.java
          dest: sdk/batch/azure-compute-batch/src/test/java/com/azure/compute/batch/TaskManagerTests.java
      commands:
        - git init -q && git add -A && git -c user.email=vally@local -c user.name=vally commit -qm "seed pre-analysis source"
    prompt: |
      My Java SDK pipeline failed and I'm trying to figure out what went wrong. Can you help?

      "azsdk-analyze-pipeline" Test Failures Parsed Output:
      {
        "_provenance": {
          "buildId": "6453847",
          "language": "java",
          "repository": "Azure/azure-sdk-for-java",
          "definition": "java - pullrequest",
          "pipelineUrl": "https://dev.azure.com/azure-sdk/public/_build/results?buildId=6453847",
          "prUrl": "https://github.com/Azure/azure-sdk-for-java/pull/49554",
          "sourceCommit": "fb22ba6fe561baf5ea68afb6a0ea2e6216755579",
          "category": "code bug",
          "rootCauseSummary": "TaskManagerTests.successAfterOneServerErrorDidRetry failed because task X was not submitted a second time after a BatchTaskAddStatus.SERVER_ERROR result. The implicated TaskManager retry path re-queues server-error tasks, but the observed test failure shows the retry was not performed before the method returned.",
          "failedTestCount": 1,
          "featuredFailures": [
            "c.a.c.b.TaskManagerTests.successAfterOneServerErrorDidRetry"
          ],
          "captureDate": "2026-06-23"
        },
        "failed_test_titles": {
          "com.azure.compute.batch.TaskManagerTests": [
            "c.a.c.b.TaskManagerTests.successAfterOneServerErrorDidRetry"
          ]
        },
        "failed_tasks": [
          {
            "pipeline_url": "https://dev.azure.com/azure-sdk/public/_build/results?buildId=6453847",
            "errors": [
              {
                "file": "sdk/batch/azure-compute-batch/src/test/java/com/azure/compute/batch/TaskManagerTests.java",
                "line": 60,
                "message": "X should have been retried at least once ==> expected: <true> but was: <false>"
              },
              {
                "file": "sdk/batch/azure-compute-batch/src/main/java/com/azure/compute/batch/implementation/task/TaskManager.java",
                "line": 114,
                "message": "X should have been retried at least once ==> expected: <true> but was: <false>"
              },
              {
                "file": "sdk/batch/azure-compute-batch/src/main/java/com/azure/compute/batch/implementation/task/TaskManager.java",
                "line": 225,
                "message": "X should have been retried at least once ==> expected: <true> but was: <false>"
              }
            ]
          }
        ]
      }
    constraints:
      max_turns: 6
      max_tokens: 8000
    graders:
      - type: completed
      - type: skill-invocation
        config:
          required:
            - azsdk-common-pipeline-troubleshooting
      - type: output-matches
        config:
          pattern: "(?i)TaskManager"
      - type: output-matches
        config:
          pattern: "(?i)(code bug|logic|test failure|assertion)"
      - type: output-not-matches
        config:
          pattern: "(?i)(re-?record|missing recording|retry the pipeline|service outage)"
      - type: prompt
        config:
          model: gpt-5.4
          scoring: binary
          threshold: 1.0
          prompt: |
            Build 6453847 failed one test
            (TaskManagerTests.successAfterOneServerErrorDidRetry) with
            "X should have been retried at least once ==> expected: <true> but
            was: <false>", attributed to the TaskManager implementation. Does the
            response (a) identify this as a code/logic bug in TaskManager (a
            server-error task is not retried), and (b) recommend fixing the retry
            logic rather than re-recording or retrying the pipeline? Answer "pass"
            or "fail".
  
  - name: java-missing-recording
    environment:
      files:
        - src: ../../../fixtures/analyze-pipeline/BlobApiTests/code/BlobApiTests.java
          dest: sdk/storage/azure-storage-blob/src/test/java/com/azure/storage/blob/BlobApiTests.java
        - src: ../../../fixtures/analyze-pipeline/BlobApiTests/code/BlobAsyncApiTests.java
          dest: sdk/storage/azure-storage-blob/src/test/java/com/azure/storage/blob/BlobAsyncApiTests.java
      commands:
        - git init -q && git add -A && git -c user.email=vally@local -c user.name=vally commit -qm "seed pre-analysis source"
    prompt: |
      My Java SDK pipeline failed and I'm trying to figure out what went wrong. Can you help?

      "azsdk-analyze-pipeline" Test Failures Parsed Output:
      {
        "_provenance": {

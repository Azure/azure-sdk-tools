name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability # capability | regression

# Root-level environment
environment: azsdk-mcp

# Execution configuration
config:
  runs: 1 # Trials per stimulus
  timeout: "660s" # Seconds per trial
  model: claude-opus-4.6 #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk # Which executor to use

# Test cases
stimuli:
  - name: 002005-ARM-define-the-resource-trigger
    tags:
      suite: "armtemplate"
      mode: "trigger"
    prompt: |
      Define a Azure resource "Employee" under the namespace "Microsoft.Widget" using TypeSpec. Properties: age (int32, optional), city (string, optional), profile (bytes, optional), provisioningState (enum incorporating ResourceProvisioningState, optional, read-only). Ensure the definition meets TypeSpec Azure design guidelines.
    environment: &shared_environment
      files:
        - src: ../fixtures/002005-ARM-define-the-resource/main.tsp
          dest: main.tsp
        - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
          dest: package-lock.json
        - src: ../fixtures/Microsoft.Widget/Widget/package.json
          dest: package.json
        - src: ../fixtures/Microsoft.Widget/Widget/readme.md
          dest: readme.md
        - src: ../fixtures/Microsoft.Widget/Widget/shared.tsp
          dest: shared.tsp
        - src: ../fixtures/Microsoft.Widget/Widget/tspconfig.yaml
          dest: tspconfig.yaml
      commands:
        - 'node -e "const fs=require(''fs'');const t=process.env.FIXTURE_NODE_MODULES;if(t&&fs.existsSync(t)&&!fs.existsSync(''node_modules'')){fs.symlinkSync(t,''node_modules'',''junction'')}"'
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
            - "azure-sdk-mcp-azsdk_run_typespec_validation"
      - type: "skill-invocation"
        config:
          required:
            - "azure-typespec-author"
    constraints:
      max_turns: 5
      max_tokens: 1000000
  - name: 002005-ARM-define-the-resource-forced
    tags:
      suite: "armtemplate"
      mode: "forced"
    prompt: |
      @azure-typespec-author Define a Azure resource "Employee" under the namespace "Microsoft.Widget" using TypeSpec. Properties: age (int32, optional), city (string, optional), profile (bytes, optional), provisioningState (enum incorporating ResourceProvisioningState, optional, read-only). Ensure the definition meets TypeSpec Azure design guidelines.
    environment: *shared_environment
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
            - "azure-sdk-mcp-azsdk_run_typespec_validation"
      - type: "run-command"
        config:
          command: "tsp compile ."
          expected_exit_code: 0
      - type: "file-matches"
        config:
          pattern: "model Employee is TrackedResource<EmployeeProperties>"
          path: "*.tsp"
      - type: "file-matches"
        config:
          pattern: "import\\s+\"\\./[^\"]+\\.tsp\";"
          path: "main.tsp"
      - type: "file-matches"
        config:
          pattern: 'age\?: int32'
          path: "*.tsp"
      - type: "file-matches"
        config:
          pattern: '@visibility\(Lifecycle\.Read\)'
          path: "*.tsp"
      - type: "file-matches"
        config:
          pattern: "ResourceProvisioningState"
          path: "*.tsp"
      - type: "file-matches"
        config:
          pattern: "ArmResourceCreateOrReplaceAsync<Employee>|ArmResourceCreateOrUpdateAsync<Employee>"
          path: "*.tsp"
      - type: "file-matches"
        config:
          pattern: "ArmResourceListByParent<Employee>"
          path: "*.tsp"
      - type: "file-matches"
        config:
          pattern: "ArmListBySubscription<Employee>"
          path: "*.tsp"
    constraints:
      max_turns: 5
      max_tokens: 1000000
  - name: 002005-ARM-define-the-resource-no-skill
    tags:
      suite: "armtemplate"
      mode: "no-skill"
    prompt: 'Define a Azure resource "Employee" under the namespace "Microsoft.Widget" using TypeSpec. Properties: age (int32, optional), city (string, optional), profile (bytes, optional), provisioningState (enum incorporating ResourceProvisioningState, optional, read-only). Ensure the definition meets TypeSpec Azure design guidelines.'
    environment: *shared_environment
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
      - type: "file-matches"
        config:
          path: "*.tsp"
          pattern: "model Employee is TrackedResource<EmployeeProperties>"
      - type: "file-matches"
        config:
          path: "main.tsp"
          pattern: "import\\s+\"\\./[^\"]+\\.tsp\";"
      - type: "file-matches"
        config:
          path: "*.tsp"
          pattern: 'age\?: int32'
      - type: "file-matches"
        config:
          path: "*.tsp"
          pattern: '@visibility\(Lifecycle\.Read\)'
      - type: "file-matches"
        config:
          path: "*.tsp"
          pattern: "ResourceProvisioningState"
      - type: "file-matches"
        config:
          path: "*.tsp"
          pattern: "ArmResourceCreateOrReplaceAsync<Employee>|ArmResourceCreateOrUpdateAsync<Employee>"
      - type: "file-matches"
        config:
          path: "*.tsp"
          pattern: "ArmResourceListByParent<Employee>"
      - type: "file-matches"
        config:
          path: "*.tsp"
          pattern: "ArmListBySubscription<Employee>"
      - type: "prompt"
        config:
          prompt: "Verify all five aspects: (1) Employee resource definition is written into a TSP file; (2) Employee model uses TrackedResource<EmployeeProperties> under Microsoft.Widget namespace; (3) EmployeeProperties includes age, city, profile, and a read-only provisioningState; (4) ProvisioningState is a union type incorporating standard ARM ResourceProvisioningState; (5) Employees interface includes full CRUD operations (get, create, update, delete) plus listByResourceGroup and listBySubscription."
          model: "claude-opus-4.6"
          scoring: "scale_1_10"
          threshold: 0.77
    constraints:
      max_turns: 6
      max_tokens: 100000

scoring:
  weights:
    prompt: 1
    run-command: 1
    skill-invocation: 1
    file-matches: 7
  threshold: 0.99

name: Kusto Query

on:
  workflow_dispatch:
    inputs:
      cluster:
        description: 'Kusto cluster URL (e.g., https://mycluster.kusto.windows.net)'
        required: true
        type: string
      database:
        description: 'Kusto database name'
        required: true
        type: string
      query:
        description: 'KQL query to execute'
        required: true
        type: string
      output_format:
        description: 'Output format: json, csv, or tsv'
        required: false
        default: 'json'
        type: string
      azure_subscription:
        description: 'Azure subscription name for authentication'
        required: false
        default: 'Azure SDK Engineering System'
        type: string
  workflow_call:
    inputs:
      cluster:
        description: 'Kusto cluster URL (e.g., https://mycluster.kusto.windows.net)'
        required: true
        type: string
      database:
        description: 'Kusto database name'
        required: true
        type: string
      query:
        description: 'KQL query to execute. Optional, will override kusto_query secret if both are provided.'
        required: false
        default: ''
        type: string
      output_format:
        description: 'Output format: json, csv, or tsv'
        required: false
        default: 'json'
        type: string
      azure_subscription:
        description: 'Azure subscription name for authentication'
        required: false
        default: 'Azure SDK Engineering System'
        type: string
    secrets:
      kusto_query:
        description: 'KQL query to execute from a secret'
        required: false
    outputs:
      query_result:
        description: 'Query result as JSON string'
        value: ${{ jobs.kusto-query.outputs.result }}
      result_file:
        description: 'Path to output file with query results'
        value: ${{ jobs.kusto-query.outputs.file }}

env:
  KUSTO_CLIENT_ID: 743af79e-ad6b-4e59-a3f5-fc4996ffe1d8
  KUSTO_TENANT_ID: 72f988bf-86f1-41af-91ab-2d7cd011db47

jobs:
  kusto-query:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      result: ${{ steps.query.outputs.result }}
      file: ${{ steps.query.outputs.file }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install azure-kusto-data==4.6.3 azure-identity==1.17.1
          pip install pytest==7.4.0

      - name: Run destructive query safety tests
        run: pytest eng/scripts/python/kusto-query-executor/kusto-query-executor-tests.py -v

      - name: Azure Login with OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ env.KUSTO_CLIENT_ID }}
          tenant-id: ${{ env.KUSTO_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Execute Kusto Query
        id: query
        env:
          KUSTO_CLIENT_ID: ${{ env.KUSTO_CLIENT_ID }}
          KUSTO_TENANT_ID: ${{ env.KUSTO_TENANT_ID }}
          KUSTO_QUERY_INPUT: ${{ inputs.query }}
          KUSTO_QUERY_SECRET: ${{ secrets.kusto_query }}
        run: |
          query="${KUSTO_QUERY_SECRET:-$KUSTO_QUERY_INPUT}"

          if [ -z "$query" ]; then
            echo "A Kusto query must be provided by input or kusto_query secret." >&2
            exit 1
          fi

          python eng/scripts/python/kusto-query-executor/kusto-query-executor.py \
            --cluster "${{ inputs.cluster }}" \
            --database "${{ inputs.database }}" \
            --query "$query" \
            --output-format "${{ inputs.output_format }}" \
            --github-output "$GITHUB_OUTPUT"

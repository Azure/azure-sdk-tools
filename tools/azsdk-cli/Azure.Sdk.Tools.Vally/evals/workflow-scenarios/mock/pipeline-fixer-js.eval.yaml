name: azsdk-mcp-tool-scenarios
description: |
  Evaluates how well the agent can fix pipeline failures from the Azure SDK JavaScript pipelines.
  Is given the initial azsdk-analyze-pipeline analysis output.
version: "1.0"
type: capability

tags:
  area: pipeline

environment: azsdk-mcp-mock

config:
  runs: 1
  timeout: 5m
  executor: copilot-sdk
  model: gpt-5.4

stimuli:
  - name: js-fix-stale-recording-unfixable
    environment:
      files:
        - src: ../../../fixtures/analyze-pipeline/compute_examples/code/compute_examples.spec.ts
          dest: sdk/compute/arm-compute/test/compute_examples.spec.ts
      commands:
        - git init -q && git add -A && git -c user.email=vally@local -c user.name=vally commit -qm "seed real pre-fix source"
    prompt: |
      My PR's pipeline failed and I need it fixed. Can you help?

      "azsdk-analyze-pipeline" Analyzed Output:

      ## Pipeline Analysis: 6452591

      ### Root Cause
      Recording-based tests are failing because session-record JSON files are missing from the repository. The test infrastructure is in playback mode and cannot find the pre-recorded HTTP interactions required to run tests in CI/CD without live service access.

      ### Failures

      #### 1. Missing Recording: Compute API Tests
      - **Category:** test failure (missing recording)
      - **File:** `sdk/compute/arm-compute/test/**/*.spec.ts`
      - **Error:** Test proxy cannot locate recording files for compute tests
      - **Fix:** Re-record test sessions by running tests in record mode against the live Azure Compute service, then commit the recording files
      - **Verify:** `npm run test:record && npm run test`

      ### Summary
      - 0 fixable failures (code changes not applicable)
      - Multiple test failures requiring re-recording (recording-based tests missing session files)
      - **Recommended Action:** Run tests in record mode against live Azure Compute service to generate missing recording files

      Package path: sdk/compute/arm-compute
    constraints:
      max_turns: 15
      max_tokens: 16000
    graders:
      - type: completed
      - type: skill-invocation
        config:
          required:
            - azsdk-common-pipeline-fixer
      - type: file-matches
        config:
          path: "**/compute_examples.spec.ts"
          pattern: '(?i)availabilitySets\s+(list|delete)\s+test'
      - type: output-not-matches
        config:
          pattern: "(?i)```(csharp|cs|java|typescript|ts|javascript|js|python|py)"
      - type: output-matches
        config:
          pattern: "(?i)(re-?record|recording|record mode|capture|live (service|mode))"
      - type: output-matches
        config:
          pattern: "(?i)(cannot|can'?t|can ?not|unable|impossible|not\\s+(auto-?)?fix|no\\s+code\\s+(change|fix))"
      - type: prompt
        config:
          model: gpt-5.4
          scoring: binary
          threshold: 1.0
          prompt: |
            Does the response correctly identify this as unfixable by code change
            and recommend re-recording against the live service? Answer "pass" or "fail".

  - name: js-fix-wmts-base64-decode-bug
    environment:
      files:
        - src: ../../../fixtures/analyze-pipeline/stacItemTiler/code/operations.ts
          dest: sdk/planetarycomputer/planetarycomputer/src/api/data/operations.ts
        - src: ../../../fixtures/analyze-pipeline/stacItemTiler/code/04_stacItemTiler.spec.ts
          dest: sdk/planetarycomputer/planetarycomputer/test/public/04_stacItemTiler.spec.ts
      commands:
        - git init -q && git add -A && git -c user.email=vally@local -c user.name=vally commit -qm "seed real pre-fix source"
    prompt: |
      My PR's pipeline failed and I need it fixed. Can you help?

      "azsdk-analyze-pipeline" Analyzed Output:

      ## Pipeline Analysis: 6454089

      ### Root Cause
      WMTS capability deserialization is attempting to base64-decode XML response bodies. The operations.ts deserializer incorrectly uses `stringToUint8Array(result.body, "base64")` when the server returns XML with content-type application/xml. The browser's atob() function fails because XML text is not valid base64, causing InvalidCharacterError in multiple WMTS capability tests.

      ### Failures

      #### 1. WMTS Capabilities Base64 Decode Error (STAC Item Tiler)
      - **Category:** code bug
      - **File:** `sdk/planetarycomputer/planetarycomputer/src/api/data/operations.ts:5993`
      - **Error:** Failed to execute 'atob' on 'Window': The string to be decoded is not correctly encoded
      - **Fix:** In _getItemWmtsCapabilitiesByTmsDeserialize, check content-type header; if application/xml, return body as UTF-8 text without base64 decoding
      - **Verify:** `npm test -- --grep "should get WMTS capabilities as XML"`

      #### 2. WMTS Capabilities Base64 Decode Error (Mosaics Tiler)
      - **Category:** code bug
      - **File:** `sdk/planetarycomputer/planetarycomputer/src/api/data/operations.ts:1880`
      - **Error:** Failed to execute 'atob' on 'Window': The string to be decoded is not correctly encoded
      - **Fix:** Same as above - remove base64 decoding for XML responses
      - **Verify:** `npm test -- --grep "should get mosaics WMTS capabilities as XML"`

      #### 3. WMTS Capabilities Base64 Decode Error (Collection Tiler)
      - **Category:** code bug
      - **File:** `sdk/planetarycomputer/planetarycomputer/src/api/data/operations.ts` (collection operations)
      - **Error:** Failed to execute 'atob' on 'Window': The string to be decoded is not correctly encoded
      - **Fix:** Same as above - handle XML content-type appropriately
      - **Verify:** `npm test -- --grep "should get collection WMTS capabilities"`

      ### Summary
      - 1 fixable code failure (remove base64 decoding for XML responses in WMTS deserializers)
      - 0 infrastructure issues
      - **Recommended Action:** Update WMTS deserializer to check content-type; for application/xml responses, return body as UTF-8 text instead of attempting base64 decode

      Package path: sdk/planetarycomputer/planetarycomputer
    constraints:
      max_turns: 15
      max_tokens: 16000
    graders:
      - type: completed
      - type: skill-invocation
        config:
          required:
            - azsdk-common-pipeline-fixer
      - type: tool-calls
        config:
          required:
            - name: azsdk_package_build_code
            - name: azsdk_package_run_check
            - name: azsdk_package_run_tests
          disallowed:
            - name: '^bash$'
              command: '(?i)(^|[\s;&|])(pnpm|npm|npx|rush|yarn|vitest)\s'
      - type: file-matches
        config:
          path: "**/api/data/operations.ts"
          pattern: '(?i)_getItemWmtsCapabilitiesByTmsDeserialize'
      - type: file-not-matches
        config:
          path: "**/api/data/operations.ts"
          pattern: 'stringToUint8Array\(\s*result\.body\s*,\s*["'']base64["'']\s*\)'
      - type: output-not-matches
        config:
          pattern: '(?i)(retry the pipeline|not fixable by (a )?code|unfixable|infrastructure issue)'
      - type: prompt
        config:
          model: gpt-5.4
          scoring: binary
          threshold: 1.0
          prompt: |
            Does the response change the WMTS capabilities deserializer in
            operations.ts so the XML text body is no longer base64-decoded
            (e.g. treated as UTF-8 text), avoiding the browser atob() error?
            Answer "pass" or "fail".

scoring:
  weights:
    skill-invocation: 1
    file-matches: 1
    tool-calls: 1
    output-not-matches: 1
    prompt: 1
  threshold: 1.0
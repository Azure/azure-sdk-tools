name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability # capability | regression

# Root-level environment
environment: azsdk-mcp

# Execution configuration
config:
  runs: 1 # Trials per stimulus
  timeout: "660s" # Seconds per trial
  model: claude-opus-4.6 #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk # Which executor to use

# Test cases
stimuli:
  - name: 001009-version-model-property-required-trigger
    tags:
      suite: "versioning"
      mode: "trigger"
    prompt: |
      In the TypeSpec project at `./Microsoft.Widget/Widget/`, make the `email` property required in EmployeeProperties only for version `2025-05-04-preview`.
    environment: &shared_environment
      files:
        - src: ../fixtures/001-share-version-new-feature/employee.tsp
          dest: Microsoft.Widget/Widget/employee.tsp
        - src: ../fixtures/001-share-version-new-feature/main.tsp
          dest: Microsoft.Widget/Widget/main.tsp
        - src: ../fixtures/Microsoft.Widget/Widget/package-lock.json
          dest: Microsoft.Widget/Widget/package-lock.json
        - src: ../fixtures/Microsoft.Widget/Widget/package.json
          dest: Microsoft.Widget/Widget/package.json
        - src: ../fixtures/001-share-version-new-feature/readme.md
          dest: Microsoft.Widget/Widget/readme.md
        - src: ../fixtures/001-share-version-new-feature/shared.tsp
          dest: Microsoft.Widget/Widget/shared.tsp
        - src: ../fixtures/001-share-version-new-feature/tspconfig.yaml
          dest: Microsoft.Widget/Widget/tspconfig.yaml
      commands:
        - 'node -e "const fs=require(''fs'');const t=process.env.FIXTURE_NODE_MODULES;if(t&&fs.existsSync(t)&&!fs.existsSync(''node_modules'')){fs.symlinkSync(t,''node_modules'',''junction'')}"'
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
            - "azure-sdk-mcp-azsdk_run_typespec_validation"
      - type: "skill-invocation"
        config:
          required:
            - "azure-typespec-author"
    constraints:
      max_turns: 5
      max_tokens: 1000000
  - name: 001009-version-model-property-required-forced
    tags:
      suite: "versioning"
      mode: "forced"
    prompt: |
      @azure-typespec-author In the TypeSpec project at `./Microsoft.Widget/Widget/`, make the `email` property required in EmployeeProperties only for version `2025-05-04-preview`.
    environment: *shared_environment
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
            - "azure-sdk-mcp-azsdk_run_typespec_validation"
      - type: "run-command"
        config:
          command: "tsp compile ."
          sub_path: "Microsoft.Widget/Widget"
          expected_exit_code: 0
      - type: "file-matches"
        config:
          pattern: "v2025_05_04_preview"
          path: "Microsoft.Widget/Widget/main.tsp"
      - type: "file-matches"
        config:
          pattern: '@madeRequired\(Versions\.v2025_05_04_preview\)'
          path: "Microsoft.Widget/Widget/employee.tsp"
      - type: "file-matches"
        config:
          pattern: "email: string;"
          path: "Microsoft.Widget/Widget/employee.tsp"
      - type: "prompt"
        config:
          threshold: 0.88
          model: "claude-opus-4.6"
          scoring: "scale_1_10"
          prompt: "Verify email property made required only in new version, only scoped edits made. Verify compile the project and fix any compilation errors if present."
    constraints:
      max_turns: 5
      max_tokens: 1000000
  - name: 001009-version-model-property-required-no-skill
    tags:
      suite: "versioning"
      mode: "no-skill"
    prompt: "In the TypeSpec project at `./Microsoft.Widget/Widget/`, make the `email` property required in EmployeeProperties only for version `2025-05-04-preview`."
    environment: *shared_environment
    graders:
      - type: "tool-calls"
        config:
          required:
            - "edit"
      - type: "file-matches"
        config:
          path: "Microsoft.Widget/Widget/main.tsp"
          pattern: "v2025_05_04_preview"
      - type: "file-matches"
        config:
          path: "Microsoft.Widget/Widget/employee.tsp"
          pattern: '@madeRequired\(Versions\.v2025_05_04_preview\)'
      - type: "file-matches"
        config:
          path: "Microsoft.Widget/Widget/employee.tsp"
          pattern: "email: string;"
      - type: "prompt"
        config:
          prompt: "Verify email property made required only in new version, only scoped edits made. Verify compile the project and fix any compilation errors if present."
          model: "claude-opus-4.6"
          scoring: "scale_1_10"
          threshold: 0.88
    constraints:
      max_turns: 6
      max_tokens: 100000

scoring:
  weights:
    prompt: 1
    run-command: 1
    skill-invocation: 1
    file-matches: 3
  threshold: 0.97
